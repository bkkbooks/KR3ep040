body:
  text: 跋一基自弱冠受業映廬夫子門下學夫子學心夫子心宜有以傳夫子也顧賦性魯鈍自少至壯迄無所成逮夫子云亡學愈荒心愈塞直不啻置身門外者昨歲杏園三世兄纂集夫子醫案而以鈔録委任於基基既樂夫子醫學可永其傳又樂杏園兄善為繼述有以慰夫子於地下於是孜孜研席窮再歲之力凡其字跡剝蝕難辨者悉為揣摩添補八易稿而書乃成嗚呼以夫子醫學之精治驗之神當此兵戈擾攘而得成其書以傳於後謂是天之厚愛吾夫子固也而豈徒厚愛吾夫子已哉受業劉紹基謹跋跋二映廬夫子珩姨表叔父也珩兄弟九衍行二先父特鍾愛知夫子精醫理俾珩受業門下其時夫子季弟啓明者與珩同筆硯讀靈樞經夜輒數十行夫子亦深夜督課不間寒暑珩羡啓叔之敏而感夫子之勤益奮力於經旨恆偕啓叔挑燈徹曉夫子為之嘆甚亡何啓叔體弱肝強因勞致疾遂以不起夫子大慟曰是天喪豫也自是珩獨侍門下閲三十餘載有延珩治病者夫子示曰病欲十全入門只先求無過肱當三折斯時莫道學有功嗚呼斯語也豈獨珩當永志哉間嘗觀夫子臨症始或蹙額繼乃舒顏其慎重為何如也逮道光辛卯始有得心集之著每一臨症必書之冊置諸篋中不下盈千纍萬咸豐丁巳慘遭兵燹夫子悲憤棄世集亦散佚過半大嗣君時若專舉子業惟三嗣君杏園侍學有年克承先業懼夫子著述湮沒爰與珩及同門紹基彙集抄出取其已效於世堪為準繩者編成六卷並附杏園一得集數十餘案於後我夫子失之弟而得之子天何嘗喪夫子哉珩既沐夫子訓迪深恩又忝襄校之末敢附數語以志淵源一脈耳受業汪士珩謹跋跋三竊憶丁巳遭亂先君憂憤棄世檢點行囊醫案纍纍嗚呼音容杳矣手澤猶存幸耶悲夫夫醫凡利於人者可以傳矧利人奕世宜奕世並傳霖家自先曾大父士駿公棄儒就醫兼通數學著有醫學數學說先大父職夫公繼其業亦善卜著有醫卜同源論逮先君映廬府君醫閲三世著述益富得心集其初稿也先君嘗謂霖曰異日者是集可附祖父稱醫學三世録意深遠矣亡何兵燹疊至事時頓非向所謂三世録者先曾大父之醫學數學說失矣先大父之醫卜同源又失矣存者惟府君是集耳顧亦散逸過半棼如亂絲脫並此久而湮沒霖罪滋大霖兄弟四其二與四皆新故惟三弟甘澍侍學有年克守先業去年春亟命纂輯編次而請勘於金溪孝廉姜真吾明經趙省庵皆博學通醫與霖為世交知先君深先君亦雅契之固知責有難謝亦心所樂從也十閲月而稿粗定十一閲月而門類標題告成案計二百五十餘首兼述治答問按類分附繕寫既竣三弟澍亦參差附一得集於分類之末以為流澤一證嗚呼奕世醫學利人多矣即合先代並傳何負顧只此戔戔劫灰餘燼慰府君萬分之一於地下幸耶悲夫男甘霖謹識跋四醫案者醫士據證議病治驗昭著可為法於後世猶老吏斷獄理法兼備可永著為例也先考映廬府君承先代兩世醫學之傳托業五十餘年臨症四十餘載讀醫書三百餘家一折衷於經旨不以偏僻任其治不以堅執行其意故凡經驗之症無不洞情中理動合古法然亦有非古法所能囿者殆所謂讀書能化因時以制其宜乎道光辛卯歲飢時疫大作諸醫專事發表攻裡多致不起先君獨謂荒年腸胃空虛何堪攻伐宜於溫補托邪一時活人無算金溪邑侯胡惺夫先生嘗亟稱之曰謝公能得病情而醫理通徹故治皆合法厥後解組以妙手仁心四字榜其室所以志愛慕者綦至是知醫貴學問尤資通變而又非可輕心為也澍幼侍先君日受望聞問切之訓及察其審病決治如士子為文必將前後反正推勘無遺而後直搗中堅刊落群言用心亦良苦哉先君座右銘云下筆雖完宜復想用心已到莫多疑其自勖也正可自見今者疊遭兵燹先代著述遺失殆盡惟先君得心集尚存然亦散佚過半長兄甘霖懼其久而湮沒謂澍仰承先業略知先君醫學淵源命纂集案稿已經裘葛再更裒然成帙固將藏之家孰以示孫子未敢遽以問世然而道之所寄無微弗彰業之所成有目共賞是案也其可法於後世否也果如斷獄者之可永著為例否也當必有能辨之者男甘澍謹識跋五上得心集六卷先伯父映廬府君遺稿也伯父幼穎異好讀書家落棄儒術繼先代業遂肆力於岐黃諸書問醫者日踵其門治之輒奏奇效暇則取所得於心者悉編之冊兵燹後懼散佚不復存三兄杏園謀梓於世棠蒙伯父愛幼善病五六歲體尤弱種痘時伯父多投參附諸藥體為之變尤喜棠讀書每於解館歸輒課棠呂詩文其王成夫棠者蓋如此今得心集告成基可無一言哉敢謹附數語於簡末侄甘棠謹識
