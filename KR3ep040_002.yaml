body:
  text: 卷二虛寒門寒毒中臟湯勝參傍山而居其地甚小以農為業時值暑月其家腹痛嘔吐老幼相似已亡數口病之傳染沿門合境而鄰族中死者病者更復不少其戚友以為天災流行不相探問近地諸醫咸遠迹不至及勝參自病醫巫交錯身已將危始托友求治於余至其村滿目淒涼覽其病舌紅口渴目泛神昏因問初起若何其家哭云起先腹痛嘔吐身熱肢厥余曰此陰毒也服何藥而至此乃將前醫之方遞出悉柴胡香茹芩連之屬余曰是矣不待診脈先取藥至疏以附子理中湯隨進附子理中丸於是湯丸互進晝夜不輟次早復視其濁陰駁劣之逆賴以潛消但微陽復返之象尚屬遊移遍身小泡攢發膚腠溱溱自汗濈濈發熱脈來浮大舌赤無津轉方以八味地黃湯加黃耆五味大劑緩進晝夜再周方得起坐思食膚泡漸退遍身復發小硬癤膚無空隙乃陰濁之毒內伏而外出也仍與八味小劑頻服於是合村顛連之家悉求治於余初起者多腹痛嘔惡發熱惡寒之候給以藿香正氣散加附桂溫中而通陽有陰寒極甚而格藥不入者與之白通湯加豬膽汁引導而通陽有陰寒入於血脈厥逆無汗者投以當歸四逆湯加附子吳萸溫經而通陽種種治法隨症而施匝月以來雖皆安好然愈而復發病風尚熾細揣必有其故因憶臨治以來各家之茶皆混濁不清初意以為不潔久而疑之因令取冷水一碗視之其色混濁嘗之其氣冷劣而味苦硬因嘆曰此地毒也豈天災乎即問水從何出衆曰屋後山下有土井一孔歷有年矣親往視之滿井混濁余曰毒也試問時值六月本當清泉澄映況一向酷暑未雨若非地毒此水安得混耶衆皆醒悟咸謂從無混水今若此或者山上舊冬所葬新冢之礙乎嗟嗟鄉愚昔清今濁顯然不識其斯地之數乎蓋六月天時陰氣在下人身陰氣在內再逢山脈之變陰毒侵臟釀成種種寒症急令他處掘地取水並制管仲甘草雄黃黃土各用斤許煎湯一斛與之皆啜更經半月病風遂息由此觀之凡為醫者水土不可不辨其鄉人議建祠立位以報因捐資維艱有志未逮焉附上案方成有二三同道來寓索覽覽畢問曰如斯治病用心苦矣但勝參之病子視其舌紅口渴目泛神昏人多認為陽毒何能直指為陰毒而又敢急進附子乾薑乎答曰大凡治病必當始終審察看書尤宜上下留心蓋此症全因誤治而致非病勢之自然也余初望之際亦尚駭疑不得不以問字繼之據述初起腹痛嘔吐身熱肢厥則厥之來也不為不暴矣經曰暴病非陽其厥為陰厥已無疑義況前醫既誤認其症肆進苦寒攻散重竭其陽逼其虛陽外越故舌紅口渴目泛神昏勢將立竭不得不以大劑薑附急挽殘陽而驅陰濁舍此安從治哉今諸君僅觀俚案明言顯語漫不加察其何以得經文之妙意乎又問曰子辨症敏捷足徵淵源有自肯與傳歟答曰自古傷寒諸書原有內外深淺傷中之別豈無傳乎要知此症初起原屬內傷直中之例故厥之來也暴若外感傷寒傳變之症乃熱深厥深熱微厥微其厥之來也必漸此陰厥陽厥最緊關頭務在揣摩有素庶危迫之頃一問了然余於斯道雖上古經典疑關達微通元之功自知未足而陰陽二義以靜而求頗為得心同道曰適來觀案既得治病之要復得辨症之訣更知博古靜求之功請録之以質來者記讀景嶽全書有刮痧新按云向豫荊人年及四句於八月終初寒之時偶因暴而後中陰寒沙毒之氣忽於二鼓時上為嘔惡下為胸腹攪痛勢不可當時值暮夜藥餌不及因以鹽湯探吐之痛不為減遂連吐數次其氣愈升其痛愈劇因而上塞咽喉甚至聲不能出水藥毫不可入危在頃刻間矣余忽憶幼時曾得祕傳刮痧法乃擇一光滑細磁碗別用熱湯一盅入香油一二匙卻將碗口蘸油湯內令其暖而且滑乃兩手覆執其碗於病者背心輕輕向下刮之以漸加重碗干而寒則再浸再刮良久覺胸中脹滯漸有下行之意稍見寬舒始能出聲頃之腹中大響遂大瀉如傾其痛遂減幸而得活瀉後得睡一飯頃復通身瘙癢之極隨發出疙瘩風餅如錢大者不計其數至四鼓而退愈後細窮其義蓋以五臟之系咸附於背故向下刮之則邪氣亦隨而降凡毒氣上行則逆下行則順改逆為順所以得愈雖近有兩臂刮痧之法亦能治痛然毒深病急者非治背不可也至若風餅疙瘩之由正以寒毒之氣充塞表裡經臟俱閉故致危劇令其臟毒既解然後經氣得行而表裡俱散也可見寒邪外感之毒凡臟氣未調則表亦不解表邪未散則臟必不和此其表裡相關義自如此故治分緩急權衡在人矣愚竊思寒毒中臟臟為里所以裡氣不達外受之邪表亦不散非溫經通脈鮮克有濟足與是案互相發明故特録出以公諸世男澍謹識附子理中湯附子乾薑人參白朮甘草四逆湯附子乾薑甘草冷服白通湯附子乾薑蔥白或加人尿豬膽汁當歸四逆湯當歸桂枝芍藥細辛甘草通草大棗或加吳萸生薑以上皆仲景方藿香正氣散局方藿香白芷茯苓橘皮厚朴白朮紫蘇半夏桔梗大腹皮甘草薑棗八味地黃湯熟地山藥茯苓澤瀉山茱萸丹皮附子肉桂內寒外熱胡生考成夜半潮熱頭腦暈痛脈來浮數舌心帶燥似表有熱邪然其平時面色失華聲音不揚知為中虛之體不敢清散姑以六君去朮加金叉與之是夜潮熱愈熾口出譫語次早再診脈仍浮數目赤舌刺汗出透衣開目譫語昏不知人小水赤色大便不通種種見症頗似實熱但潮熱雖重尚可覆被舌雖干刺不喜冷水與粥一杯便如虎嗜再啜發嘔參諸平時聲色而又發自半夜知其表雖熱而裡實寒若果陽明實熱見此症候便揚手擲足安得覆被昏睡耶又安得渴不消水啜粥輒嘔耶昔喻嘉言有謂熱邪既盛真陽復虛此是真陽既虛而熱邪復盛耳授以益元湯原方中薑附參草艾葉蔥白回陽補虛合乎甘溫能除大熱之旨浮火之泛有黃連折之陰氣下竭有知母滋之且二味苦寒更藉以制薑附之猛烈庶於口乾舌刺之症服之坦然無礙若夫大汗傷津有麥冬五味生精斂液仍以薑棗和諧營衛更入童便冷服者猶恐格陽之症拒藥不入合乎熱因寒用其始則同其終則異統而言之究歸清補之藥耳一劑諸疑悉減再劑熱退身涼但愈後難健調理之藥大劑養榮湯疊服數十劑始獲如原蓋由少年稟賦不足故耳益元湯活人附子艾葉乾薑麥冬五味知母黃連人參甘草薑棗童便蔥白冷服誤表戴陽二條陳怡太年老體弱辛苦勞力之人得傷風小病頭身作痛發熱畏寒醫者不以勞力傷風之例施治乃以敗毒散二服遂變大汗如雨舌乾如刺滿面赤色神志昏惑問其小便不利大解不通儼似極熱之症余固知為誤治所致老年陰氣既衰誤汗愈涸故舌刺口渴而泉源既竭二便必變診脈洪大按之寂然雖無急疾之象然恐誤表戴陽於面元氣隨汗立散意欲行真武坐鎮之法但津液內竭難受辛溫之亢味將欲與生脈救陰之意而甘酸之藥其何以回垂絶之元陽繼思獨陽不生蓋陽無陰則孤陽失所而飛越戴出矣必得扶陽之藥而兼濟陰可也處古益元湯回陽生陰藥一下咽果獲熟睡舌刺少減再劑熱退身涼汗收食進與理陰煎數服而康理陰煎熟地黑薑當歸炙草許晴霽室人患傷風咳嗽諸醫投以疏風清肺之藥漸至潮熱口渴尚不知誤更以柴葛知母花粉之屬進之遂變面紅目赤舌刺無津渴汗齊來譫語無次余臨其帷視之駭布固知其陽已戴於上也而前醫本所素信忽忽復至惘惘一視尚謂傳經熱症急取雪水服之蓋僅知其上熱而不知其下寒也知其脈洪而不知其大空也因令煎龍眼湯斤許遂疏八味丸合生脈散是晚進藥不輟次早復視俾無根飛越孤陽才得退藏於穴復追進附桂理陰煎數十劑全愈八味散方見前本門首案生脈散人參麥冬五味誤表亡陽二條陳南圃先生由京歸里舟泊許灣忽覺渾身麻痹自服靈寶如意丸得稍安日西渾身大熱譫語無倫昏夜邀視見其面色如妝硃紅熱勢沸騰脈雖鼓指重按全無上身躁擾下半僵冷知為腎氣素虛真陽浮越肌表恐其戰汗不止藩籬洞開勢必飛越而亡宜用表裡先後救援之法因處大劑真武湯與之坐鎮北方以安腎氣飲畢復預煎黃耆二兩附子二兩五味龍骨牡蠣各五錢沉香肉桂各一錢此畜魚置介之法以救既散之陽後藥方煎人事已清亥刻果然渾身戰栗魄汗不止叉手冒心即將預煎之藥亟為啜盡俾得戰止汗收蓋未絶之陽先已安堵而既散之陽復以駟追千金之身救援有數誠非偶然重服養榮湯而健真武湯附子白朮茯苓白芍生薑人參養榮湯人參白朮黃耆甘草陳皮桂心地黃五味茯苓遠志白芍當歸薑棗陳甫三內人灑淅惡寒倏忽潮熱時值夏初疫症流行余診其脈緩大而空舌白苔滑又詢其素有腸風便血經不及期且外雖肥盛內實不足察脈審症知中氣大虛病從飲食勞倦中來乃外耗於衛內奪於營之症與東垣益氣湯托裡散邪之法畏不敢服更醫謂是疫邪初起當服達原飲服後大熱譫語又見大便不通更與大柴胡湯連進二劑症變熱熾躁擾張目不眠譫語發狂且甚有力醫見其表裡皆熱更疏白虎合承氣一方甫三素與余契藥雖煎成疑未敢服就正於余余視其目紅面赤亂言無倫及診脈下指洪大按指索然此五臟空虛血氣離守之驗是日午刻以人參養榮湯武火急煎藥才下咽時忽咬齒兩手撮空余甚怵惕蓋崑崙飛焰挽救弗及旁怨莫解但審症既真自當極力處治時方申刻又將原方四倍加入附子二兩入釜急煎逾時服畢譫語未息而發狂少止似寐非寐與粥一杯大嘔稠痰其色青碧是又不得不先救胃陽戌刻復煎附桂理中一劑藥未下咽寒戰咬牙肉瞤筋惕此假熱一去真寒便生之應也只恐油汗一出脈陽立越幸藥已備亟與進服亥刻果汗厥齊來又與理中一劑遂得安眠片刻汗收肢溫復與粥飲不嘔差喜陰陽兩交胃氣稍蘇余亦安睡次早視之陽已不戴脈亦有根然昏迷困憊猶言見鬼目尚赤口尚干此陰火未熄虛陽未返津液未生神魂未斂以歸脾湯吞八味丸數日喜獲生全但口苦少寐與歸脾湯加山梔丹皮大便已閉十五日至此始得一通蓋胃氣素虛倉廩空乏經血不榮之故更與十全大補湯服半月方健愈後竊自笑昔吳又可先生治溫疫熱邪內盛一日三變急症急攻之條數日之法一日行之余今治虛寒真陽外越一日三變有急症急補之驗亦數日之法一日行之症治不同用意則一學者當於讀書之餘亟將陰陽真假之辨逆從反正之法殫力追尋極窮其奧日常閉目凝神討求至理有如懸鏡當空妖魔悉顯庶幾胸有定見不為假症所惑於以扶危拯溺救世之慈航也八味丸方見前虛寒門首案歸脾湯人參白朮茯神棗仁黃耆當歸遠志木香甘草龍眼薑棗十全大補湯方見卷一傷寒門同病異治人參養榮湯方見前本門誤表亡陽誤表氣脫二條陳祥光老年勞力感寒醫者不究其內傷色脈拘定潮熱咳嗽日與外感之藥極力疏散乃至氣急神昏煩冤莫耐與之以水可飲一杯與之以食僅嘗一口問其頭痛則雲頭痛問其胸緊便云胸緊此氣脫神昏與熱盛神昏者迥然不同余察其形羸色晦黏涎滿口二便如常按脈衝指忽散如湯沸騰知為虛陽上攻脫絶之候急與大劑附桂理陰煎吞黑錫丸數錢得安臥重服前藥而健附後其乃媳小産後感冒寒熱咳嗽余視其面白唇燥脈來虛大其熱忽有忽無此産後血虛感寒與補中益氣加熟地薑炭其家咸議恐補住寒邪瘀血更醫進發表一劑即變氣促大汗復延余治更見其面紅目赤耳聾譫語脈來如湯沸騰此陰虛陽越勢在險篤疏與八味地黃重附子加五味囑其急服尚可挽回豈知復疑不決且嫌言過激烈旋延一醫相商妄稱熱入血室競用四物柴胡一劑大汗發痙而逝豈非下井壓石者耶嗚呼病家固不識病又不識醫醫者産後藥禁不明兼症不考兩者俱昧每致傷生悲哉附桂理陰煎附子肉桂地黃乾薑當歸甘草黑錫丸附子葫巴沉香固脂小茴木香肉桂黑鉛肉蔻霜金鈴子陽起石硫黃一得集附陽虛自汗陳希正學博素稟陽虛時屆秋令偶傷於風寒熱間作脈來浮緩議用桂枝湯重加附子將疏方寒戰鼓栗熱汗驟至進藥少安越日咳嗽知汗後腠理空疏復召外邪遂將原方去白芍加荊防服下汗倍於前而寒熱咳嗽悉除後因口乾鼻熱類於火氣上炎自認秋燥焚金未審汗後津傷辛散耗陽之理誤進甘寒一劑熟睡良久越時口渴火愈上炎又誤進參葉湯一碗繼進稀粥二碗遂至胸腹飽脹汗出如雨復請豫視滿面紅赤脈來沖指內外一探陰氣瀰漫知為參葉稀粥陰壅之氣無由轉輸上衝心肺從皮膚而作汗也因悟搏激過顙逆行在山之理取五苓散加薑附以進俾得膀胱氣化小便長行汗止脹消而安未越日體間又津津自汗於是湯撲兼施按治不輟面紅雖息汗仍不止經云陽氣者若天與日失其所則折壽而不彰故天運常以日光明是故陽因而上衝外者也今汗止復出非由腠理空疏陽不衛外之咎歟遂用真武重加附子少佐收攝之味服下汗雖漸止而四肢漸厥口渴喜飲頻引熱湯自救其間有議伏瘧未分者有議口渴服燥藥太過者紛紛聚訟惟余獨唱無和堅執扶陽之法復以附子四兩人參一兩濃煎湯服服未終劑汗收渴止厥回諸症悉安無何越日汗渴厥逆交至是為去而復返必有所因經云欲伏其所主必先其所因可使氣和可使必已茲者疊投湯劑悉皆剛燥於陽不違於陰有乖宜其退而復返也乃進四逆湯加童便未甚效繼進白通加豬膽汁湯吞黑錫丸數錢藥方下咽忽然戰栗四肢漸溫陽氣得所頃刻間諸症如失所謂藥不瞑眩厥疾弗瘳是也善後之法一月未棄薑附並須按日兩劑逮至臥不受被有時手梗略冷或掌心作熱是皆陰陽和而不合之勢乃將歸脾養心十全大補進退酌用兼吞八味地黃丸又遵陰平陽祕精神乃治之旨調理而後全要內傷門五心潮熱周祥彩肌體肥盛慣服斑龍丸客秋在漢連餐炙爆復患傷風感冒微覺咳嗽氣急自進橘附湯得小愈但苦頭眩難支惟坐睡片刻少可深以暴脫為慮醫者又以內傷為詞參耆日用病勢日增漸至五心潮熱肌肉消瘦一日眩暈時忽飲龍眼湯一碗覺少可以後每發悉皆倚之病已逾年醫藥日費客囊殆盡帶棺買舟歸里坐以待斃其戚友知余循理治病請診而求治焉見其面額黧黑形似煙燻唇口齒舌乾燥異常時欲得食食已即便所泄完穀不化脈雖細澀然寸關徑指甚鋭余以千慮一得之悟直許可治疏方與之時門人在旁問曰周兄之病勢已趨危吾師許其可治必有奧旨可得聞乎曰此症始因飲食之火內焚後加風寒外束是內熱而復外寒也夫病之在身始先居肺肺為華蓋聳然居上經曰形寒寒飲則傷肺注云形寒傷外飲寒傷內今熱傷於內寒傷於外故病咳嗽氣急此際但取辛涼解表之劑豈不金徹水清耶奈何自服橘附之藥以致熱邪愈固肺失清肅無從輸泄由是身中之氣有升無降所謂氣有餘便是火其頭眩難支者氣升火亦升也醫者不揣病因大旨端守眩暈為虛日進參耆龍眼愈加錮閉無一外隙可通火既無出只得奔走空竅夫大腸者肺之合也下利奔迫辛庚移熱可知時欲得食消中之纍又萌至於完穀而下固屬火性急速不及變化正嘉言所謂其土已為火焚之焦土而非膏沐之沃土安可望其生化耶經云暴病非陽久病非陰今病經年餘洞泄半載其為陽火甚明其火屬陽其陰必傷急救其陰夫復何疑豈可再用參耆復蹈前轍乎且吾之許以可治者有二兩目尚明瞳神光亮上焦之陰未絶一也下利雖急小水猶長下焦之陰亦未絶二也況下利奔迫胸中不實身體和溫即五心潮熱尚未至於大熱躁擾可見所稟陰氣豐厚即腸胃空洞奔迫而粥飲飯食尚能繼進不輟吾乘此一線生機仿壯水鎮陽之法使無上僭下竭之虞效瀉南補北之意而無金熱土傷之慮爰引一派甘寒潤濡之味清肺瀉火救陰抑陽如仲景立黃芩湯治協熱下利雖清火迥殊而存陰則一也彼因膽火肆虐移熱於脾故用苦甘之劑直清膽火而存陰此因肺火肆虐奔迫大腸故取甘寒之味端清肺火而存陰取用萎蕤為君端清肺熱乃水出高源象乎天也地黃為臣壯水保金乃子母相生象乎地也佐以梨汁蔗漿蜂蜜竹瀝除腸胃激烈之燥濟經絡津液之枯象乎人也無論其邪火正火君火相火陰火陽火得此甘霖霢霖如飢人求食到口便消吾故直許其可治也下咽未久便覺神魂返宅安睡一晚繼進二劑不飢不泄矣至善後之法仍從肺胃立方即養百日沉疴頓起仲景黃芩湯黃芩芍藥甘草大棗寒熱如瘧三條吳俊明年二十咳嗽多痰微有寒熱纏綿數月形體日羸舉動氣促似瘧非瘧似損非損溫涼補散雜投漸至潮熱時忽畏寒嗽痰食少臥難熟睡醫者病家咸言癆瘵已成委為不治聞余精究脈理姑就一診以決死期因見形神衰奪知為內損脈得緩中一止直以結代之脈而取法焉此陽衰陰凝之象營衛虛弱之徵衛陽虛則發熱營陰凝則畏寒蓋肺衛心營之機阻滯氣血不得周流故見為結代時止之脈諦思結代之脈仲景原有復脈湯法方中地黃阿膠麥冬正滋腎之陰以保金乃熱之猶可也人參桂枝棗仁生薑清酒正益心之陽以復脈乃寒亦通行也用以治之數月沉疴一月而愈按結代之脈須知必緩中一止方為可治若急中一止便為參五不調乍疏乍數安可治乎故古人有譬之徐行而怠偶羈一步之語旨哉斯言堪為結代之脈傳神矣世人惟知仲景為治傷寒之祖抑知更為治虛勞之祖乎炙甘草湯仲景甘草生薑桂枝人參阿膠地黃麥冬麻仁大棗水酒傅嫗年逾七旬素屬陰虧今春初起微寒微熱余以二陳加麥冬與之一劑頗安次日耳中忽流血水耳傍筋痛余曰耳門屬腎老年下元先衰非濕熱停耳之症乃腎氣上奔之象易曰龍戰於野其血元黃議早與金匱腎氣湯晚進當歸枸杞萸肉牡蠣菊花熟地各二劑筋痛血水齊愈比晚寒去熱來是為陰陽不和致令偏寒偏熱非瘧症也法當人參養榮湯為陰陽兩補之劑囑之曰藥固大劑必多服乃可豈知只投兩劑症未增減更醫誤服升柴陳半之屬是夜大寒大熱大汗陡然人事昏沉幾欲脫矣再延余診脈來鼓指洪大無倫聲微息促氣高上迫危在頃刻細思此寒此熱固宜調陰陽而值此氣脫又當收陽為主以大劑六味回陽散加耆朮龍眼鹿茸連進二劑徐徐與服次日人事清爽寒熱亦除而健六味回陽飲人參熟地附子當歸黑薑甘草人參養榮湯方見卷前虛寒門誤表亡陽彭紹英年十八向有咳嗽曾經失血客臘婚畢新正病瘧延醫數手瘧未減而神大衰咳嗽仍作夜不得寢每巳午時寒去熱來寒少熱多熱止無汗間日一發逮至人事昏困肌膚削極飲食減少始就余診脈得浮大而空兩關甚急余知其失血也視其舌乾發稿面色枯焦更知其陰虛也因謂曰此冬不藏精腎水愈涸至春地氣上升肝木發榮全賴腎水灌其苞根則枝葉暢茂今水泉將竭何供所乘以致木鬱不舒發為寒熱漸至枯稿豈細故哉奈何醫者以柴芩斧斤之藥愈伐其生見其人事昏困涼散不效更投補中益氣耆朮助火其陰愈爍今議端以滋陰為主又忌滯濡而胃愈戕清營為佐更忌苦寒而陽愈損經曰損其肝者緩其中損其腎者益其精緩肝益精四字盡之矣隨症處方因人而施以一派生津甘緩之藥頻服而健咳嗽喘促五條陳東正辛苦勞力之人年近五十一向時寒時熱咳嗽氣急而蘇子桑皮枳桔之藥恣投屢矣逮至兩足浮腫氣急上衝膠痰滿口臥不著席醫者見其小水涓瀝不知其腎陽不化之故尤泥其大腸壅滯未識其肺氣不輸之因復誤進滾痰丸氣愈急痰愈鳴及延余視肩聳目直脈辟辟然如彈石勢難逆挽余憫其貧求生無法辭去不忍姑疏腎氣湯以附子為君互進黑錫丸五錢私與其戚徐劉二友及乃郎曰病本不治只因尊翁垂危之際尚有必求余劑死無憾之語吾益不忍坐視其困細按僅得一線生機以小便不長大解滯澀蓋上欲脫而下未遽脫也所訂湯丸竟乃郎復與前醫相商其醫曰前後俱祕豈有可投補藥之理復給丸藥一包約重兩許囑其急服乃郎方進藥時適徐劉二友見而擲之怒曰競聞謝氏生平謹慎特因病勢已極故不肯擔此重任然視病反復論症精詳足徵持重有識遂將余訂湯丸亟進次早復視症未增減脈亦如故病之安危猶未敢許復將腎氣湯加五味大劑以進每劑吞黑錫丸五錢令其晝夜三劑是晚雖未能安枕然輾轉反側尚可著席知其氣已返矣越日復診指下辟辟彈石之脈方得柔軟於沖和再進三日二便如常臥可安枕其後或投真武湯或進景嶽右歸丸亟培土金水三臟之本經月之久方得散步於外而起一生於九死者皆徐劉二友之功也乃歸功於余因為記之金匱腎氣湯熟地山藥山萸茯苓丹皮澤瀉附子肉桂車前牛膝黑錫丸方見前虛寒門誤表氣脫右歸丸熟地枸杞山萸山藥菟絲鹿膠杜仲當歸附子肉桂真武湯方見前虛寒門誤表亡陽傅孔翁於憂怒後旬日鼻塞聲重咳嗽多痰來寓索方余知其元陽素虧擬是肺胃虛寒因與真水六君子煎一劑咳嗽更盛臥不安枕氣喘痰鳴端人請診余思日間所服之藥其不疑陳皮之散必議熟地之滯再診之脈得尺部浮大而空氣促面赤喉中痰響元海無根真陽上脫急與黑錫丸服後氣略平痰亦少止隨進大補元煎加桂附一方衆曰熟地滯痰萬不可用余曰下部之痰非此不可令服之遂安臥氣亦歸源猶然鼻塞咳嗽以原方加骨脂而痊又越月行房後入水脅傍微痛發熱惡寒誤投發汗之藥服後身熱大汗不止囊莖俱縮脅肋脹痛愈盛咳嗽帶紅危在頃刻不知仲景先生有動氣在下不可發汗之戒汗則肝腎陽亡夫其肋痛者腎氣奔也咳血者龍雷動也身熱大汗虛陽發外也玉莖痿縮陽氣敗也法當鎮攝封固外用回陽火救之內服黑錫丸鎮納真氣疊服後方而愈附方回陽火圖見卷三吐瀉門陰寒直中人參白朮附子熟地枸杞當歸牡蠣肉桂沉香金水六君煎景嶽熟地當歸半夏茯苓陳皮甘草大補元煎人參熟地當歸山藥杜仲山萸枸杞甘草歐生石匠夏間咳嗽秋初益甚但云胸緊氣促似屬傷寒感冒之症然無寒熱舌苔之據且聲音面色俱屬不足此勞傷中氣土不生金金氣衰餒氣耗咳嗽無疑惟胸緊氣促參朮難以驟進姑先與建中湯三服稍安再加參耆當歸薏苡數劑而痊建中湯方見卷一傷寒門汗不得法楊明質三載勞損咳嗽多痰大便常滯呼吸急促臥不著席買舟訪治於余診得右脈數急左脈遲軟系陰液虛也仿古救陰液須投復脈因與炙甘草湯令服百劑逾年來寓謝曰賤軀微命自分必死幸叨再造感德不朽矣炙甘草湯一名復脈湯方見前本門寒熱如瘧泄瀉不食胡曉鶴孝廉尊堂素體虛弱頻年咳嗽衆稱老癆不治今春咳嗽大作時發潮熱泄瀉不食諸醫進參朮之劑則潮熱愈增用地黃鹿膠之藥而泄瀉胸緊尤甚延醫數手無非脾腎兩補逮至弗效便引勞損咳瀉不治辭之時值六月始邀豫診欲卜逝期非求治也診之脈俱遲軟時多歇止如徐行而怠偶羈一步之象知為結代之脈獨左關肝部弦大不歇有土敗木賊之勢因思諸虛不足者當補之以味又勞者溫之損者益之但補脾腎之法前轍可鑑然舍補一著又無他法可施因悟各臟俱虛之脈獨肝臟自盛忽記潔古云假令五臟勝則各刑己勝法當補其不勝而瀉其勝重實其不勝微瀉其勝此病肝木自盛脾土不勝法當補土製肝直取黃耆建中湯與之蓋方中桂芍微瀉肝木之勝甘糖味厚重實脾土之不勝久病營衛行澀正宜薑棗通調而薑以制木棗能扶土也用黃耆補肺者蓋恐脾胃一虛肺氣先絶連進數劑果獲起死回生但掌心微熱不除且口苦不寐咳瀉雖止肝木猶強原方加入丹皮重瀉肝木之勝再進而安黃耆建中湯黃耆芍藥肉桂甘草煨薑飴糖大棗腎虛不寐錢贊府客秋患脫症下元屬虛疊進耆朮地歸桂附頗效而左脅氣煽夜難成睡至今未除服盡歸脾養心之劑不應面色㿠白舌尖深紅肢體怠倦脈來虛軟此乃心脾肝腎俱病前服歸脾養心之劑未能療及肝腎而不寐由於氣扇氣扇由於陽明脈絡空虛肝風得以內鼓是填納封固之法萬不可少今議端以甘溫填納封固之品服至十劑飲食倍常夜寐得安乃二十劑左脅之氣亦不鼓矣可見醫者得心應手之妙務在分清病源而已附方熟地白朮山萸當歸石脂牡蠣棗仁山藥肉桂附子甘草枸杞述治六條與許勳翁論失血書嘗觀萬物生成之道惟陰與陽而已蓋非陽無以生非陰何以成有陰陽即為血氣陽主氣故氣全則神旺陰主血故血盛則形強人生所賴惟斯而已尊閫玉體違和前承不鄙冒雨赴召脈證相參由來者漸先天稟賦已為薄弱之體客臘分娩調理不無失宜心旌搖搖內爍真陰陰血既傷則陽氣偏盛而變為火矣是謂虛火勞瘵之萌也前經治數手不過見症投劑未探真情見其潮熱概行清火目睹形羸即為補血孰知陰精日報食飲無味轉勞轉虛轉虛轉勞脈從內變色不外華而鼻血輒溢食少力稀正大易所謂龍戰於野其血元黃乃亢龍有悔之象非一二法所能療僕雖不敏既叨不鄙用敢直陳顛末稍能深信何辭病勢之重藥進數劑當有應驗之功足下勿以愚一管之見視為泛常幸甚復馮曉南先生論氣喘書閣下病志情形愚心洞悉然藥之不愈何也請推言之蓋天地陰陽之道得其和平則氣自調而萬物生此造化生成之理也故道家曰分陰未盡則不仙分陽未盡則不死可見陽為生之本陰實死之基閣下先天稟賦薄弱而後天又暗調殘故客冬病之將萌即見氣短喘促一身之中百體之內陽氣殞滅陰氣混擾霧云遮蔽日月無光中州先失脾腎兩傷以致木無所滋金無所養至今木帝司天之際肝已告困脾亦言傷欲其不筋粗囊縮其可得乎設使脾氣強健尤賴施布藥力以養生今病勢已劇胃氣日竭湯藥縱下胃氣不能施化雖有神丹亦難為力矣所以疊進辛熱之味甘溫之品究竟呼之不應遣之不靈而桂附理中之補黑錫丹之燥兩者之力量素稱猛將今用之於此亦毫無功忝在相契愚不能袖手旁觀姑為竭力疏方稍盡知己之誼倘能藉此挽回萬一此固愚之私願亦閣下之厚幸也論治薑吉甫翁丸藥善後方啓尊體陰陽均虧五臟皆弱中焦困鈍氣機不宣故以術苓山藥大培土氣建立中宮以運四旁則脹滿可磨嬌金可旺熟地枸杞女貞質純能滋陰使水源充足庶腎家有歸藏之安附子肉桂小茴氣厚能扶陽俾火宅溫煦中州無壅塞之患鹿茸助陽而精府常富鹿膠補血則形骸自強斯中焦運而四臟和水火交而陰陽偶身中元氣豈不太朴淳全乎或議地丹之寒附桂之熱抑知非剛不足以化氣非柔何以濟剛且非從陰何以引其陽亦非從陽何以引其陰於理固合於法不悖謹啓其端附呈明鑑此番已驗宿年之脹今日之痢緣補中固腎而解康健月餘諒無返復但七情之郁臟氣之衰必善調攝歷歲一周寒暑再經方可無憂倘加情志感觸不遵戒忌輕則痰咳復起重則脹勢復萌莫謂贈言之不詳也胡石泉先生見余治周祥彩之病心竊敬重無病索診得兩尺蹇滯如刀刮竹之狀挺挺而現於指似艱嗣之脈知為氣血衰殘之候因詰之曰足下欲求房中之治乎石翁曰然余曰夫五臟之色有諸內必形諸外占其表以知其里今觀先生明堂眼下青色發露於外且滿面黧色獨天庭火光炎炎是為陰陽亢戰之象夫腎屬水水涸則面黧又水涸則火必亢火亢則離宮自燃君相爭權房中舉而不耐臨戰即泄可知實陽強不能藏密之故耳且腎司精血之臟君本形盛之軀宜見兩尺泥滑今乃滯澀異常勢如刮竹勒指枯稿已極所以關睢雖詠而麟趾難賡以精枯血少也石翁怫然曰吾聞丈夫以陽強為美信如君言則陽不宜強乎余曰陽以亢悍為畏以潛藏為貴值此衰殘之候當以寡欲為最夫寡欲之善一舉兩備一則寡欲保身一則寡欲多男內經明言陰陽之道陽密乃固謂陽氣祕密而陰氣自固也若陽強不密陰氣乃絶正陽根於陰無陰則孤陽不生矣至用藥之法必遵陰平陽祕精神乃治之旨合陰陽而兩和之而後雨澤降也言時適一貴戚至石翁藉口辭曰先生言皆金石今有俗冗願俟異日余甚惜其不納也徘徊其間索筆記案以冀其悟其婢輩私指背笑者有之豈知余愛友之苦衷哉後石翁卒惑於方士之偽力求房中術方士日進之藥假名固本養元膏又謂久戰不泄丸更炫名扶陽不老丹種種妖誕實堪髮指究竟內有硫黃鴉片麝香蟾酥毒烈藥物用之提拔陽氣以供一時之藥數月不輟漸至徹夜不寐兩肩高聳玉莖不痿交接出血此乃矯陽獨升真陰欲盡之候醫者尚不知急行壯水鎮陽之法以少折其炎赫之威乃日用人參麥冬徒竭重資曠日緩治顛沛半載真至大肉盡削肌膚甲錯皮焦筋屈百苦交煎又以芩連知柏苦寒雜投以致胃氣日戕後復求診於余余因未病先鑑堅辭不往越旬日而先生訃至矣陳鴻儒年二十時值春月滿面青白步履不前咳嗽多痰聲短語促知其內傷甚重余念世誼謂乃尊曰郎君青年當此春生反見尪羸之象大有可慮乃尊唯唯匝月其病益劇不能出戶始邀余治診得脈來弦數時忽一止自云別無所苦只是少腹之氣不上則已上則心中戰栗周身寒冷片刻內外皆熱衝至咽喉必咳嗽不安數月以來請醫專治服疏表藥則汗多熱重服補脾藥則胸緊咳促服滋陰藥則食少多痰服降氣藥則氣愈升逼余知其誤恐鄙見難以取信因索紙書云謹按脈來弦數停止訣稱乍疏乍數三五不調謂之死脈但數而不急此處尚可轉旋據云氣上寒熱咳嗽等證乃厥陰傷寒病也緣陰精素弱腎氣衰微不能領邪外達僅依臟氣推遷靈樞經云厥陰之脈自少腹上貫膈循喉嚨病則氣上衝心惟其沖觸不已故心主不安其位見為悸動夫心主血脈因營衛不調遂悖亂失常寒熱頓起且脈來結代矣若逆沖咽喉乃肺腎脈絡之所肝氣乘水侮金故為咳嗽多痰實肝威猖獗心主失權之象也內經又謂主明則下安主不明則十二官危可不畏哉今欲治此必滋腎之陰以補金益心之陽以復脈非剛不足以去暴非柔何以制剛能識此意方可言治擬以炙甘草湯滋陰和陽養肝益心庶肝火息而不升則心主安而血脈復其常矣其寒熱咳嗽不治而治也方中地黃阿膠麥冬麻仁一派柔藥濟肝之剛乃乙癸同鄉熱之猶可之義也人參桂枝生薑清酒一派剛藥去肝之暴乃木火相生寒亦通行之義也謹將病機傳變並用藥大旨一一陳之願高明垂鑑焉乃尊世全見余議論精詳亟將藥進甫投三劑諸苦減半寒熱悉瘥藥已顯有明效矣詎知前醫適至大訾其藥閲余案反議迂儒之言何足為信又議癆症尚不能識豈有厥陰傷寒之書旦議桂枝薑棗之藥大非癆症所宜於是停藥數日寒熱復起諸苦復增值余歸里復延他醫俱議桂枝薑酒癆症最忌每日令服人乳數甌其家戚友咸稱穩當按日不輟豈知人乳滑腸膩膈卒至食少便溏尚不知悟猶以養陰清肺之藥臥床滑泄竟致不起嗟嗟投珠按劍詫為不祥道窮於遇可慨也已王玉溪先生蒞任之初適報海寇滋擾緝究為艱復值飢饉凶歲亟籌賑救數載以來辛苦百倍突增太翁之變驚憂備集因而成病語言慌惚步履欹斜頗似顛狂春杪至家其病益甚走書托治於余因見人事瞀亂兩目左右顧盼有時發怒亂走胡言然禁之即止是不明中尚有明機也且時以手按摩心胸可知膻中之地必有鬱結怔忡之苦診脈浮大而軟夫浮軟為虛大則病進僕合脈審症知先生病從七情憂勞中來也訂歸脾湯加龍齒五味其戚友知醫者多悉皆詫異且謂此顛狂之病城中諸醫悉稱痰火閉竅已服竹瀝鐵落火且不衰若投人參耆朮則不可救豫復詳為辨曰狂之為病陽郁太過挾膽胃兩陽之火上炎故越人稱為重陽發之甚則水火不避笑罵聲強登高逾牆迅速非常其脈來或弦徑有力或鼓激沖指故有唇焦齒燥胃實不便諸症是以有鐵落石膏之治乃制膽清胃重而抑之使下也此則不然其有時發狂不過有狂之意中無所恃故禁之則止若謂痰火閉竅則竅便塞矣豈能禁之即止乎又果重陽之病豈無鼓指之陽脈乎蓋先生之纍始於憂思不遂抑鬱不舒漸至心精日耗神明喪失矣君主之宮自燃謀慮之舍乃枯如木將朽何堪斧斤內經有言嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精曰失曰脫收攝之法其可緩乎坐談一午衆皆唯唯孰意執迷不返余藥未投厥後或服當歸龍薈丸或進礞石滾痰丸其病日篤大便溏泄至六月醴香少君抵家省視復邀余診脈來如火發燃殘陽盡逼指下乃知心精已奪告以事不可為因問逝日余以霜降為斷至期果卒答門人問死期脈解門人問曰王溪先生精營脫失之病吾師朗若明鏡某等業已解悟矣至死期之驗猶有未明請更示之答曰素問篇云脈至如火薪然是心精之豫奪也草乾而死又曰君火之下陰氣承之今脈來如火薪然然者燃也是洪大已極之脈也久病見此乃真臟之脈盡發於外豈非心精已奪乎夫心為陽夏令赤帝司權天時之陽猶在是內絶而外未遽絶非死期也草乾之時秋令金氣已深陽氣已消萬類咸萎殘陽之脈已極極則必盡再合天時之陽氣並消安得生乎門人曰唯唯然某等尚有一疑請並示之經又謂脈至如弦縷是胞精之不足也病善言下霜而死不言可治夫既言胞精不足又安能善言既能善言又安得主死耶又不言為機關已阻不曰主死而曰可治者何也答曰讀內經之法當字字推想且上古文字古奧尤宜貫通庶得其真弦縷之脈其體雖細最當玩其弦字縷者乃絲縷之謂如弦縷便伏有絞緊急疾下墜之象此心陽已有亢熯之機故言胞精不足也胞精不足殘陽有喪亡之漸神明失守之徵夫言自心發其言必妄善字當作妄字解故云病善言下霜之時乃冬令水帝司權正水來剋火之候殘陽豈不消滅乎故云下霜而死若不妄言則雖見胞精不足卻無神明喪失之症城廓雖病而君主尚安亟以養營補心之類尚可頻施救援之法故云不言可治也某等躍然領悟余因喜其明而復語之曰前條蓋言豫奪故必無可生之望後條但言不足故或有可治之症此千古奧義為爾輩筆之以志一堂授受之心法云痿證門肺熱葉焦黃守基年二十歲客漢陽當秋寒熱咳嗽足跗浮腫延瘍科醫治誤用敷藥足大指潰爛瀝瀝又誤用燥血藥煎熬津液勉強收功漸至足不能移肌膚益削已成癱瘓歷醫不瘳皆以不痛為不治次年六月買舟歸里求治於余兩人抬出診視余視其形羸發脫脈象細數腿股大肉已盡腳垂縱緩廢弛因思經云大筋軟短小筋弛長為痿又曰陽明虛則宗筋失潤不能束骨而利機關法當端取陽明且起自秋間寒熱咳嗽肺失清肅誤進燥藥津液枯焦此燥氣焚金當以肺熱葉焦則生痿躄論治蓋痿者枯萎之象非滋血液何以得生惟胃為生血之源又為金之母故曰治痿獨取陽明也況寒暑交遷又值燥金用事宜清金潤燥佐以甘淡益胃之藥於是以二地二冬石斛薏苡梨汁蔗汁之屬日進大劑按治十日飲食稍加改進虎潛丸加黃耆白朮薏苡桑枝茅根補助陽明自秋至臘按日不歇僅得肌肉稍充筋骨稍束尚未能開步次年繼進前藥百日至夏乃愈計治一載始獲全功虎潛丸黃柏知母地黃虎脛龜板鎖陽當歸牛膝白芍陳皮羊肉火爍金傷何國開乃媳得足痛病醫謂為血虛生風凡疏風養血之藥自春至夏任服無間逮至七月燥金用事足不能移形體羸瘦又加痰飲嘔逆不已此火爍金傷兼之陽明失節以致機關不利與丹溪大補陰丸及虎潛合法重加石斛桑葉汁三十劑全愈大補陰丸黃柏知母地黃龜板豬脊髓蜜丸風火內淫傅嫗四肢疼痛不能運動醫進驅風燥濕清火補血之劑煩熱大作汗出淋漓耳聾口燥胸緊氣促四體不知痛癢前醫仍認為筋骨之病投附子草烏秦艽獨活牛膝木瓜等藥愈治愈篤延豫商治乃翁問曰服藥兩月愈見沉重果是何症余曰此症原由形體肥盛素多痰火痰火盛於內而召風以入風入空竅痰火隨之共入經絡初猶不覺逮至機關不利而痰火與風聚結一家矣書曰肺主周身之氣雖痰火風雜併為病無不關乎肺臟正內經所謂肺熱葉焦則生痿躄是也夫風藥多燥豈非助熱而加其痿躄乎內經云風淫於內治以甘寒夫甘寒清火人所共知而熄風誰能深信不知風走空竅原由火召非甘寒厚味監督其間不能填塞其隙開方服二劑潮熱減半汗止大便艱卻無痞滿尚屬枯焦未敢議下更方又服二劑潮熱蠲除人事始清但時言痛楚非病進也蓋經脈流通之佳兆耳復立第三方服至五劑手足運動再服五劑形骸如常人皆渭奇實非奇也後七月餘訪友至高姓治一婦悉同此症但初起多服耆朮龍眼等藥筋加短縮與以前第三方每劑加倍半月而愈可知醫貴洞悉病情運巧思以制方毋按圖以索驥斯得之耳初方歌風淫於內痰火倒顛肺葉熱焦發為痿偏醫用辛燥病益迍邅古哲立法澤枯為先藥與病埒庶幾其痊毋具滯膩休使油煎香蔬茶飯苦茗相兼從茲調攝永保天年第一方桂枝白芍檳榔薄荷黃芩石膏麥冬芥子甘遂竹瀝寒水石第二方生地丹皮白芍薄荷枇杷葉礬石牙皂石膏芒硝薏苡仁膽南星竹瀝第三方生地石斛萎蕤麥冬薏苡仁天冬石膏地骨皮黑芝麻竹瀝蔗汁表裡風熱江嫗下元素虛今秋四肢十指腫痛手足不能運動有時右邊腫甚即右邊痛加似惡寒或微熱舌苔灰白二便略通面色枯黑口不作渴有以血虛為治者有以風濕為治者有以痰飲為治者竟無一效臥床貼席轉側維艱其兄光裕來寓請診脈得弦緊而數時徑於指認定為表裡風熱之症躊躇良久乃得其方病者蹙額問曰賤軀可活否曰三日之內即安與防風通聖散每日連進二劑一劑而大便通腫消肢軟二劑連泄黑糞兩次遍體得汗痛止身輕次早下榻向家人云昨服藥後懵懂一日至晚汗出始清今晨周身輕快但許久未經盥面方取水間乍聞余至即出房診脈惟步履尚艱猶須扶持舌苔變黃頗思飲茶仍令原方再進一劑復泄二次下午速求止泄之藥余於原方中除硝黃加葛根服之泄止渴住安睡進食其病如失病者急求補養之藥令買白皮梨每日啜四五枚十日外更取熟早米煮稀粥調養兩旬諸症悉痊後其兄光裕來寓問曰舍妹之病幾致廢弛先生一視預限三日成功果符所言必有奧祕可得聞乎余曰令妹之症必先有飲食之熱後受外入之風因其體虛不先傷衛所以不病身熱拘急而直入於營發為筋攣腫痛與身中向有之熱凝聚經絡夫風無定所走注疼痛或左或右流注關節風入既久鬱而成熱未經解散久之必入於胃夫陽明胃者主束骨而利機關陽明既病機關不利手足豈能運動惡寒發熱者表邪之徵也舌苔灰白者伏熱之驗也合推此症是上中下三焦表裡俱實有非輕劑所能療者又風邪散漫非僅苦寒可以直劫兼之下元素虛即用重劑又恐其放逸更當以固護駕馭其間由是觀之發表攻裡之外尤當寓一補字於中然余自幼從不肯用錯雜之方追思古人表裡門中成方而得防風通聖散此蓋劉氏河間所制雖非為此症而設然與用旨默合是以借之取效方中麻黃荊防等藥能逐在表之風熱從皮毛而出石膏硝黃等藥能驅在裡之風熱從二便而出風熱深入於營有歸芎引表之藥而入於營風熱淫聚於中有術芍引里之藥而入於中而芎歸術芍又賴以扶持正氣使上中下表里之邪悉從上中下表里而出雖經絡空隙之所盡皆驅逐何致久羈遷延兼之汗不傷表下不傷里非比世俗補瀉雜投之治余是以知效可計日而獲耳至病人藥後而大便得通者人皆知其攻裡之驗其自云藥後懵懂一日汗後始清者人尚不得其解夫懵懂者冒悶之謂乃身中作汗使然譬之天欲雨必地氣蒸上為云云升於天雨施於地而天地清矣所以冒悶發汗者發表之驗也至泄多而方仍不變全不慮其虛者此時補劑難投只於原方除硝黃以防身中在表之氣因鹹寒而墜下而加葛根升提使身中清氣上升自然泄止渴住矣以後不再製方者以病雖至重而表裡未傷隻身中風熱既久津液必然受灼故但以梨汁粥飲灌溉之飲食消息之此余自始至終毫不紊亂如此夫祕理深奧化裁生心本難言喻今因吾兄願聞奧祕一言特一一剖之光裕曰醫理真玄治法果奧請為立案因詳記之後雙某之子亦患是疾未費深思按法而愈此與前治傅嫗一案大同但病變稍異故治法略殊學者當合觀之防風通聖散河間防風荊芥連翹麻黃薄荷川芎當歸白芍白朮山梔大黃芒硝黃芩石膏桔梗甘草滑石薑棗陽強足痿二條吳新祺沖年困於酒色陽道強而不痿股脛痿而不堅呻吟床褥百治不效籍居崇邑就治於余余謂此症始則陽勝陰傷金被火煉今則矯陽獨升真陰欲盡所進苦寒固謬而溫補尤非所宜記古降心火益腎水法惟三才封髓丹於此最合按方大劑令服喜胃氣尚強每日納藥二碗服至六十劑兩症始痊因憶向治龔生初起便血漸至兩足痿弱不能稍移服歸耆參朮其血愈下其足愈軟買舟由撫來灣就治於余兩脈細徑面黑耳聾余曰肝血大傷腎水漿竭也然從來補陰之藥難期速效疏與虎潛作湯令服百劑許以病根可拔殊伊服至五十劑腳可趨步便血已除吝費停藥逾年腸紅復來乃將前方再服稍愈又停以致便血不息竟至不起惜哉世之剖腹藏珠者可以為鑑虎潛丸方見前本門肺葉熱焦三才封髓丹拔萃天冬地黃人參黃柏砂仁甘草陽痿不起陳鳴皋體豐多勞喜食辛酸爽口之物醫者不知味過於酸肝氣以津脾氣乃絶以致形肉消奪輒用參朮培土不思土不能生徒壅肝熱故復陽痿不起顛沛三載百治不效蓋未悉內經有筋膜乾則筋急而攣發為筋痿之例余診脈左數右澀知為肝氣太過脾陰不及直以加味逍遙散令服百劑陽事頓起更制六味地黃丸十餘斤居然形體復舊此種治妙惟智者可悟內經一書豈尋常思議所可到哉逍遙散局方柴胡當歸白芍茯苓甘草薄荷煨薑或加丹皮山梔六味地黃丸地黃山藥丹皮澤瀉山茱萸茯苓陽縮不伸二條陳春初乃郎將婚服補養丸劑半月反致兩足無力陽痿不舉醫謂當用大補加附子鹿茸服之無算漸至兩足難移玉莖盡縮診得腎脈獨大右尺尤甚與滋腎丸一斤服至一半陽事已舉藥畢步履如舊此孤陽不生之義也滋腎丸黃柏知母肉桂蜜丸黃欽三病發時渾身灑淅麻痹腹痛囊脹莖縮一時燈火薑附亂投得少安其後屢發更醫數手無非前法蓋醫者總以陰症為治而病者刻以縮陽為慮緊持玉莖誠恐縮完診得弦緊異常目紅唇燥余知其誤以寬言慰之令急服左金丸合溫膽湯數劑頓安後以一派養血濟陰鎮心潛陽之藥調理而健同道不解其故余曰吾人身中惟色膽最大腎家之強均由膽家之旺請鑑諸好色之流有逾垣乘隙高深不畏之膽夤夜私奔神鬼無懼之膽而後能遂其欲是凡潛蹤入房其膽家之火必先燃而腎家之火乃盛當其欲火初起但制之以恐懼其陽必頃刻而痿豈非腎強由膽旺之驗乎故肝為陰臟緣膽藏於中相火內寄其體雖柔其用實剛其性也主動主升其氣也徹上徹下臟腑表裡為寒為熱身中內外或現或隱高自頂巔深至血海變幻莫測病害最多至其脈絡陰器尤喜疏泄茲診欽兄脈盛筋強目紅唇燥乃肝膽俱旺血燥不榮且常有遺泄一病明明肝火激動精關諸醫不察其遺泄之故只想匯聚澀精補陽之藥豈非熾火涸血之弊乎夫火愈熾血必愈涸血愈涸火必愈熾由是筋脈失滋遂成結束乃筋疝之象非真縮也加以驚恐不縮亦縮矣吾以寬言慰之釋其驚恐之縮繼以苦藥清之解其筋脈之結補之以氣補肝即是補膽養之以潤養腎便可養肝吾臨斯症實非偶然法參乙癸同鄉之義推觀好色之原絲毫不爽所以獲效較諸陰症縮陽面青脈靜肢冷息微者不大相徑庭乎左金丸黃連六兩吳萸一兩水丸溫膽湯方見卷一傷寒門誤治傳經答門人問足弛治法門人問曰曾視一症病後足膝痿弱其機關骨節俱如平人惟軟不能舉難以行立所進皆氣血兩補加疏風之藥本古人治風先治血血行風自滅之旨然調治一載絶無效驗意疑藥力不及更進十全大補加鹿茸服數十劑病亦如故豈藥猶未及乎抑尚有説乎答曰焉得無説夫血非氣不行氣非血不化凡血中無氣則為縱緩廢弛氣中無血則不能靜不能靜則不能舒矣故筋緩者當責其無氣筋急者當責其無血今子所論乃軟弱不舉之症是為縱緩廢弛之疾與血無與但當偏益其氣所進十全大補乃氣血平補之藥猶是氣不勝血所以不能取效法當四君子加黃耆附桂可收全功如法治之果愈一得集附風淫於內汪寶泉時屆長夏夜臥當風值夢遺後得風痹病始苦左足腫痛難以移立即邀豫視亟祈補劑診之脈大舌黃身有微熱雖初起其勢已重頗類腳氣病但無惡寒發熱胸滿嘔吐之症且脈大舌黃必是風痹因告之曰此風濕內蘊久而化熱萃於經脈之中法當輕揚辛涼之藥宣通經隧兼以甘寒味淡之屬息風滲濕但濕凝為腫風勝為痛而風為陽陽主動勢必流走經隧恐身中四肢關節處難免流注之苦以風性遊移非比寒濕之邪僅著一處留而不散是以內經有周痹行痹之稱即此症也必邪去然後正安不可謂因遺精而病輒與溫補助邪疏與杏仁桂枝防己防風蠶砂羚角桑葉通草之屬日夜連進二劑左足稍愈身熱已除果然右腳腫痛更加薏苡萆薢以利濕按服三日兩足腫痛雖輕忽又肘腕掌節肩髃各處逐日遊移腫痛不堪又以前方參加石斛黃柏天冬玄參茅根桑枝梨汁竹瀝便閉稍加明粉蓋遵內經風淫於內治以甘寒熱淫於內治以鹹寒半月之久按日兩劑其功始半續進地黃丸一斤乃奏全績原自古風痹痿厥之症治不得法常多殞命治或稍差亦成痼疾總由不知風痹痿厥該何證寒熱虛實從何據撿方試病誤人良多夫四末之疾必識動而徑者為風不仁或痛者為痹軟弱不舉者為痿逆而寒熱者為厥況風者必多風熱相兼痹者必風寒濕相合痿者必火乘金厥者或寒或熱皆從下起而逆上也然又病機變化寒熱虛實皆從人之臟腑轉移表寒裡寒表熱裡寒陰虛陽虛自有分別或曰風淫四末之症案中分析甚明但所言寒熱虛實皆從人之臟腑轉移者何答曰凡邪之所湊必乘人身之隙而入內外相召也如其人身中素有蘊熱外風一襲則風為熱風若其人身中素有虛寒外風一襲則風為寒風古之三化湯防風通聖散皆為治實火之風而設八珍十全地黃飲子之類皆為治虛火之風而設經曰風者善行而數變正為變虛變實必從人之臟腑虛實轉變也其間祛邪養正必察其臟氣之偏勝究其邪氣之深淺庶幾瞭然在望投劑無差耳燥氣焚金劉瑞奇余草角交也經營異地奔走長途有年某年秋末患足疾初起咳嗽筋痛步履艱難兩腿尤痛並無紅腫或治以燥濕利水益劇更醫疑為氣血虛損與以歸脾養心初獲微效繼進無益漸至腰屈不伸夜多夢寐深虞身廢次年春盡買舟歸里邀余視之面色憔悴形容枯稿毛髮脫落大肉盡削余細詢病源復驗其兩腿膝筋浮於外抽束一團駭嘆之余沉思再四念此症發自秋末彼時肅殺氣深水虧之體必挾時序之燥氣而肺先受病故初起見咳嗽若是時以喻嘉言清燥救肺投之豈不金徹水清耶無如誤投燥濕利水之藥焚肺劫陰加以耆朮疊進壅塞機關雖曰補氣生血而實助火耗津所以身中百骸之筋無陰養榮遂至抽束結聚計惟清火為先而清其火又慮其虛則補陰清肺尤為緊要水果充足火自平矣且此症余心所恃者尤在胃旺便得生氣甘藥亦可多投疏方每日三劑服至二十劑筋舒痛除三十劑腰伸闊步五十劑肌膚充盛面容澤潤矣附方萎蕤首烏當歸狗脊薏苡仁石斛麥冬丹皮黑芝麻黑阿膠或加早米茅根補助陽明或減麥冬丹皮防損胃氣或加竹瀝桑枝通經達絡嘉言清燥救肺湯治諸氣膹郁諸痿喘嘔桑葉經霜者得金氣而柔潤不凋取之為君去枝梗三錢石膏煅稟清肅之氣極清肺熱二錢五分人參生胃之津養肺之氣七分甘草和胃生金一錢胡麻仁炒研一錢真阿膠八分麥門冬去心一錢二分杏仁泡去皮尖炒黃七分枇杷葉一片刷去毛蜜塗炙黃水一碗煎六分頻頻二三次滾熱服痰多加貝母瓜蔞血枯加生地黃熱甚加犀角羚羊角或加牛黃癇厥門內熱生風吳元東之婦形瘦多火患風熱病頭疼身痛發熱畏寒醫者不知風為陽邪寒為陰邪誤用辛溫發散汗出昏厥不醒人事迫切求治視之面紅脈大知為火氣焚灼以血液衰弱之體又值汗出過多之變決非清降可投蓋人身陰陽相抱乃能動靜有常今陽失陰守是以陽氣獨上而不下而為厥逆之症又與亡陽之症有別法當生陰以維陽古有此例處用白薇湯以白薇達衝任而利陰參歸生血液而固氣合甘草以緩火勢許其必效藥下果然白薇湯白薇一兩當歸一兩人參五錢甘草錢五分按訒庵先生云陰虛火旺則內熱生風火氣焚灼故身熱支滿痰隨火湧故不知人又曰汗出過多血少陽氣獨上氣塞不下而厥婦人尤多此症宜白薇湯愚竊謂此方之妙後人罕識其旨且方載於本草小注每多泛泛讀過今先君用治斯症隨手取效殆所謂讀書能化因時以制其宜乎男澍謹識風火內淫傅孚遠女孫形體清瘦前夏月遍身發出紅塊大小不一醫以丹證治之用草藥搽敷而愈至秋初忽然仆地神昏不醒喉內痰鳴片刻復清一日數發請醫數手通用化痰順氣等劑毫無寸效日夜數十劑舉家慌亂急請余診脈得寸口洪大兩尺弦緊自云腹中如焚欲飲冷水言未畢卒然昏倒口開手撒身涼默默面白唇紅任捏不知頭仰垂下因思此症雜出擬是腎陰枯稿水火相錯發為痱中陡進地黃飲子服之未效推原其故中寒條中決無此例夏月君火專權之令發出遍身紅塊未經清解誤用草藥搽敷逼毒入內留於心胞況且素稟木火之質腎水不足可知心火過亢肝木有餘木盛生風風火相煽兩淫於中先哲有云心火內蘊膻中如焚涼膈清心功見一斑又內經有云風淫於內治以甘寒理宜先進清心散後服二丹丸庶為合法於是疏方連翹薄荷清上焦之熱大黃芒硝救北方之水芩連竹葉清心肺而治風甘草山梔通三焦而瀉火調以蜂蜜合為一劑服之安睡一頓醒起更衣其病如失仍令二丹丸調理而健二丹丸方丹參丹砂天冬麥冬地黃人參菖蒲云神遠志甘草寒痰堵塞越日復治傅孔嶽乃孫忽然默默手足抽搐口開眼閉面白痰鳴一日十數發此症原因小兒脾氣未健寒痰堵塞經隧治宜健脾暖痰於是以星附四君子湯與之衆云此兒之病與伊女之症相符昨先生大黃一劑而愈茲未周之見敢用附子乎余嘆之曰昨之痰熱痰也今之痰寒痰也寒熱迥別豈曰相符寒熱不知何復言醫遂令服之一劑不發二劑神爽衆皆稱奇余曰醫者理也憑症望色又何奇哉姑筆之以為後學法耳肝火生風王作儀先生之內人形長肌瘦平時喜進溫補時值暮春乳房脅肋漸次作脹初尚不以為意一日忽牙關緊閉不知人事手撒遺溺張目精搖諸醫咸稱手撒脾絶遺溺腎絶疊進補劑欲圖固脫淹治旬日漸至筋斂抽掣始延余診各部應指急數有力唇齒乾燥大便不通乃知雖屬煩中實為肝火厥逆之候也若果脫結之症五臟凶例全見當頃刻告變安得尚延旬日且六脈俱有力耶緣紊稟木形兼挾內火且令當木旺肝氣燥急故乳脅作脹夫肝主筋筋脈不縈故四體不用木火生風故目精動搖筋脈不和頰車不開故牙關緊閉肝威沸騰津液妄泄故汗大如雨肝邪熱熾陰挺失職故小溲自遺津液被劫故筋斂抽掣統計之悉皆肝火為患處龍膽瀉肝湯合當歸龍薈丸連進二劑病勢大減後進犀角地黃湯兼龍薈丸進食能言隨用八珍湯除川芎重加白芍丹皮調理而健龍膽瀉肝湯局方膽草黃芩梔子澤瀉木通車前當歸地黃柴胡甘草犀角地黃湯方見卷一傷寒門同病異治當歸龍薈丸當歸膽草梔子黃連黃柏黃芩大黃青黛蘆薈木香麝香蜜丸中食二條李婦胸腹大痛忽然昏倒手足逆冷口不能言兩手握固兩尺脈細先一醫斷其脈絶必死已煎就附子理中之藥希圖援救適聞余至請視診得兩尺果無而症與脈反若果真脫豈有不面青大汗之理書云上部有脈下部無脈其人當吐不吐者死似此必傷食所致以故胸中痞塞陰陽不通上下阻絶理宜先開上窗俾其中舒因問曾傷食否伊姑應曰曾到戚家賀壽油膩肉面頗為大啖因放膽用法而不用藥令炒食鹽一兩熱水灌服兼用通關散吹鼻大嚏大吐頃刻而醒吐出完肉數塊面蛋帶痰數碗其病如失陳茂初年壯體強早膳後忽然胸膈大痛叫喊數聲臥地不省人事四肢逆冷身體仍溫余診尺脈雖無而寸關甚堅且面色未變喉無痰聲如此卒暴之恙決非中風中寒中氣之症意揣食前無恙食後即胸膈作痛蓋胸中陽位食物猶在賁門阻遏陽氣不得下行合乎尺脈不至古人原有食厥之條當作中食之症至於治法有上部有脈下部無脈其人當吐之訓於是燒鹽一兩煎水一碗灌之湧出痰食二升而愈一得集附七情鬱結記昔先君授澍曰病欲十全入門只先求無過肱當三折斯時莫道學有功臨症無論大小緩急總當於望聞問切四字加意不中不遠旨哉言乎何敢一日忘諸昨視徐婦中氣一症素無他病頃刻仆倒目閉口噤手撒腳僵其夫曰早吃胡椒湯一碗身戰作寒午吃龍眼湯一碗噯氣不舒因而仆倒余忽忽一視以為龍眼壅滯用神香散調灌不效診脈上浮下伏與經言上部有脈下部無脈其人當吐之例相符又以鹽湯引之不吐再掐太衝穴身略動自以兩手捫胸知心地尚明無非會厭機樞不利轉瞬依然四肢僵冷細聆呼吸狀如死人再診脈伏乃靜念曰面色青白必挾肝邪為患脈來緊伏可是經絡皆痹今日不過服湯兩碗倉廩之官久已運化而下故引之無吐想非風非痰非食非火其閉不通者氣而已矣再問素性好怒否家人曰多氣多怒曾因喪子悒鬱至今夫鬱氣素橫於胸加以椒性助肝龍眼壅氣肝愈橫郁愈結膻中之氣無由轉輸安得不猝然仆倒然則斯症雖危自有斡旋之法用烏附散香附烏藥沸湯調灌方下咽喉間汩汩有聲即嘔稀涎一口而蘇惟苦胸悶不舒噫噯自揉繼進越鞠丸一兩氣暢郁舒安睡復舊越半月胸緊頭昏復倒無知目瞪口張勢似已危脈象又伏知非死候余與伊夫常聚首因謂曰前番目閉口噤脈伏今脈同症異當從原意變通言未已開聲知人並雲頭暈目眩重如石墜面如火燎轉盼間狂言見鬼歌笑呻哭衆皆詫異竊思中氣之後因思復結仆倒無知固其宜也然面赤神昏妄見妄言必因郁久化火挾肝邪為患應用清肝瀉火之劑又胸緊氣急頭重如墜必緣鬱氣固結經道久閉故脈沉伏與內經血並於上氣並於下心煩惋善怒之旨合符遂疏方以逍遙散加丹參牛膝玄胡降香兼進當歸龍薈丸服下未久神識頓清諸症漸減按方再服諸症悉除越日復診脈轉沉數沉無固結之患數有流動之機矣再詢經期果閉四月有餘本擬速行決津之法但昨議已效仍仿原意再投後更方未費思索直以解結通經而愈逍遙散方見卷二痿證門陽痿不起當歸龍薈丸方見前本門肝火生風
