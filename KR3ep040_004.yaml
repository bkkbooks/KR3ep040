body:
  text: 卷四沖逆門噎膈嘔厄氣急衝咽七情鬱結三條吳發明得噎食病咽喉阻塞胸膈窄緊每飯必嘔痰水帶食而出嘔盡方安遍嘗諸藥竟無一效粒米未入者月餘審其形氣色脈知為痰火素盛加以七情鬱結擾動五志之陽糾合而成斯疾疏與四七湯合四磨飲而安蓋察其形瘦性躁色赤脈滑且舌旁雖紅而白苔涎沫如粉堆積其中也次年復發自以前方再服不應余以四七湯除半夏加石斛桑葉丹皮蔞皮數劑復安蓋察其脈雖滑而帶數且唇燥舌赤故取輕清之味以散上焦火鬱也越年又發又將舊方服之病益加甚余於五磨飲中用檳榔烏藥加白芍七氣湯中用厚朴蘇梗加入旋覆花鬱金橘紅淡豉山梔治之二劑而安蓋察其脈來浮滑加以嘈雜胸痞知其胃之上脘必有陳腐之氣與火交結也後因七情不戒飲食不節藥餌不當調理不善逾年仍發自與知醫者相商謂余之治無非此意遂將連年諸方加減湊合服之愈服愈殆余又用蘇子芥子萊蔔子巨勝子火麻仁擂漿取汁合四磨飲服之頓安蓋察其脈轉澀而舌心燥粉堆積加以氣壅便祕也吳問曰世云古方難以治今病謂今病必須今方今以今方今病且本症本人而取效不再者其故何哉余曰本症雖同兼症則異此正謂景因時變情隨物遷耳夫藥猶兵也方猶陳也務在識機觀變因地制宜相時取用乘勢而舉方乃有功若不識地勢不知時宜敢任戰伐之權哉吳恍然曰若是真所謂膠柱不可鼓瑟按圖不可索驥矣因請立案以為檢方治病之鑑四七湯局方亦名七氣湯以四味治七情也人參官桂半夏甘草薑七氣湯三因亦名四七湯半夏厚朴茯苓蘇葉薑棗四磨湯一方人參易枳殼一方去人參加枳實木香白酒磨服名五磨飲子治暴怒卒死名曰氣厥人參檳榔沉香烏藥等分濃磨煎三四沸溫服吳敬倫先生年近六旬得噎食病每食胃中病嘔痰飲上泛欲吐甚艱嘔盡稍適久投香砂六君丁蔻理中等藥毫無一效計病已五閲月矣諸醫辭治肌膚削極自分必斃其嗣君姑延一診欲決逝期診得脈無緊澀且喜浮滑大腸不結所解亦順但苦吞吐維艱咽喉如有物阻胸膈似覺不開因謂之曰此症十分可治古云上病過中下病過中皆難治今君之病原屬於上數月以來病猶在上故可治耳以四七湯合四磨飲一服而胸膈覺開再服而咽嗌稍利始以米湯繼以稀粥漸以濃粥進十餘劑始得納穀如常隨以逍遙散間服六君子湯調理兩月形容精彩視素日而益加焉門人疑而問曰自古風勞蠱膈四大重症法所不治而吳翁噎病先生一視極言可治用藥不奇而取效甚捷何也答曰昔先君嘗誨余曰人身有七門唇曰飛門齒曰戶門喉間會厭曰吸門胃之上口曰賁門胃之下口曰幽門大小腸之下口曰闌門肛腸之下曰魄門凡人納穀自飛門而入必由魄門而出原噎食一症始則喉間阻塞繼則胸膈不舒涎食湧吐而出推其原多由七情氣結或酒色陰傷或寒熱拒隔或蛔蟲貫咽或凝痰死血或過飲熱酒雖所因不一而見症則同以賁門上至飛門俱病矣由是津液日涸腸胃無資幽闌漸窄糞結彈丸者勢所必至脈或弦數徑指甚則緊澀堅搏無非陰枯而陽結也至此不究所因而不治則一以賁門下至魄門俱病矣故善治者必先乘其機察其因而調其上務期速愈為工倘賁門一廢雖有靈芝亦難續命而況庶草乎此千古未發之旨獨先君悟徹病情不以五臟六腑定安危而以七門決生死更分可治不可治之例其亦神矣今吳翁之病喉間若塞胸膈若閉而脈來浮滑大便甚快是病尚在賁門之界故許其可治余乘機投以辛溫流利舒氣降逆則陰陽自為升降七門運用如常亦先君乘機速治遺意也至吞之不入吐之不出此七情氣結方書所稱梅核症耳張雞峰先生云噎症乃神思間病惟內觀善養者可治四七湯四磨飲二方俱見本門前案逍遙散方見卷一傷寒門陰陽易症傅光廷令堂年逾七旬時微發熱躁擾呻吟大扇扇之或可稍安口渴飲湯輒嘔稠痰醫以發汗藥治之遂時熱時汗飲食藥物入口即吐大便阻格又以攻下藥治之僅得一解仍然祕塞面浮腹脹胸緊氣促心煩口苦日夜不寐身軟難支有議下者有議補者其家惶惑無主求正於余診其脈流利平和余曰用補者因其年老已經汗下也用攻者因其腹脹便祕也究屬見病治病不察其因不辨其症其因者內因外因不內外因是也其症者六淫七情之屬是也夫其初起之際時微發熱已非外感熱甚可知身可受扇其骨蒸內熱又可預擬兼之先病嘔吐後加汗下之劫劑宜乎困倦神昏口淡無味而心煩口苦日夜不寐者知其肝膽相火上升也又病纏日久表裡俱傷脈宜細數短澀今流利平和其先天之厚可知由是推之其所以脈流利者痰也心煩口苦者火也胸緊嘔吐者痰也腹脹便閉者氣也發熱受扇者內熱也口渴飲湯者痰逢冷則愈凝遇湯則暫開也合觀諸證顯系內因七情之病必因素有思慮鬱結之情蓋思慮則火起於內鬱結則痰聚於中而五志厥陰之火早已與痰飲結為一家夫火動則陽亢痰聚則陰涸乃病勢所自然今陽氣結於上所以嘔吐不食陰液衰於下所以腹脹便祕若誤補則陽愈亢誤攻則陰愈涸此定理也然則治之當何如余思病既由於七情鬱結痰火內生下祕上吐九竅已屬不和經曰九竅不和都屬胃病但胃屬陽土較治陰土不同蓋太陰脾土喜剛喜燥陽明胃土宜柔宜和故陽明無壅補之條太陰有忌下之禁此陰土陽土最緊疆界世醫不察者多斯疾陰枯陽結嘔吐便祕發熱不寐凡此皆陽明不和之本症法當清胃和中但久病陽氣亦憊是清胃又忌苦寒滯膩老年陰精已竭故和中尤非香散可施惟有溫膽湯可用內加烏梅一味取其和陰斂痰一劑嘔吐略止稍能納粥大便亦通腹脹頓減再劑食己漸進夜寐亦安後以生津濟陰藥洋參麥冬石斛萎蕤之屬頻進而痊溫膽湯方見卷一傷寒門誤治傳經肝木剋土聶鏡章嘔吐拒食時平時篤已十載矣今春喪子憂愁病益日進每食氣阻格咽翻湧而吐甚至嘔血數口肌肉枯稿衆議勞傷噎食不治余曰非也此人全因操勞性急稍拂意必怒怒則傷肝所以目久欠明者皆肝病也至於每食氣阻乃肝木剋土之象此屬七情中病當以七情之藥治之仿古四磨飲以治氣結氣結必血凝以玄胡鬱金破宿而生新久病實亦虛以歸芍養肝而補血合之成劑氣血交治蓋氣病必及於血血病必及於氣並囑靜養戒怒竟以此方服至半月告余曰嚮者胸前覺有一塊今無之何也余曰木舒而鬱散耳服至一月食欲倍常形體充盛此則揆之以理並因其人而藥之之一驗也附方烏藥檳榔枳殼木香沉香上四味濃磨汁各一匙衝入後藥當歸童便洗白芍各三錢鬱金延胡索各一錢五分水煎去滓和入前汁同服痰火上攻傅定遠得痰膈病發時厄逆連聲咽喉如物阻塞欲吞之而氣梗不下欲吐之而氣橫不出摩揉撫按煩惋之極醫治兩月溫胃如丁蔻薑桂清胃如芩連硝黃絶無寸效延余診視其氣逆上而厄聲甚厲咽中閉塞兩肩高聳目瞪口張儼然脫絶之象勢甚可駭然脈來寸口洪滑上下目胞紅突辨色聆音察脈審症知為痰火上攻肺胃其痰也火也非氣逆不能升也遂處四磨湯加海石山梔芥子瓜蔞竹瀝薑汁連投數劑俾得氣順火降痰消再以知柏地黃湯加沉香以導其火而安肺氣不降黃達生食犬肉大熱腹痛服巴霜丸數次潮熱不退口渴妄言更醫進柴葛石膏大黃芩連之屬忽發厄逆又用丁香柿蒂湯厄逆愈甚前醫束手延余視之目赤舌乾便閉本屬實火正思議間忽聞大厄數聲睜目直視滿面紅赤昏不知人舉家大哭適悟天氣不降地道不通之旨惟有苦辛開降肺氣一法乃用杏仁八錢枇杷葉三錢忙煎與服下咽未久噯氣一聲腹內雷鳴再與前藥二便通利遂安竊思此症暴厲驚人若非胸有定見殊難下手內經云欲伏其所主必先其所因可使氣和可使必已一段經旨不正可為此治之明證乎肝火上僭黃大亨先生乃郎忽患噯氣上衝似厄逆之象醫進藿香二陳之屬更加嘔逆不已又用柿蒂香砂丁蔻之藥遂至噯逆不休余診之曰吾一劑立愈以左金加大黃柴胡丹皮藥下果平次除大黃重加石斛而安此諸逆衝上皆屬於火所謂欲求南風須開北牖也左金丸方見卷二痿證門陽縮不伸陰火上衝梅生藎臣得沖氣病醫人不識自分必死每發氣上衝咽喉窒塞一身振戰不已聳肩目突不能出聲家人意擬為脫一日數發延醫叢集亦稱氣脫日進理中黑錫纏綿數月竟服黑錫丸斤許其病愈進諸醫辭治豫診其脈右尺數盛人迎亦大因思內經有諸逆衝上皆屬於火之例遂制滋腎丸煎金匱腎氣麥門冬湯吞服旬日始見微功一月乃奏全效未嘗更變藥味也滋腎丸方見卷二痿證門陽縮不伸金匱麥門冬湯麥冬半夏人參大棗甘草粳米金匱腎氣丸方見卷二內傷門咳嗽喘促陰濁上干周維友高年體盛素多酒濕時值嚴寒飲食未節濕邪不走始則胸緊咳嗽醫以陳半枳桔消導之劑繼則氣急痰鳴更醫又謂年老腎氣不納而薑附沉術二香之類疊進病漸日篤延余視時氣急上衝痰響窒塞阻隘喉間日夜不能貼席尤可畏者滿頭大汗如雨氣蒸如霧時當大雪之際不能著帽問其二便大解數日未通小水涓瀝難出滿舌痰沫引之不透及診其脈沉而徑指知為陰濁上攻雷電飛騰之兆正內經所謂陽氣者若天與日失其所則折壽而不彰法當通陽泄濁連進半硫丸俾得冷開凍解二便稍利陽光復闢陰濁下行胸膈始舒而痰壅頭汗氣蒸諸急不覺如失亦陽氣得所則壽考彰明之驗也後與冷香飲數服而安冷香飲附子生用草果橘皮甘草炙各一錢生薑五片水煎冷服述治龔後翁乃內未診問方據述咳嗆口苦咽喉如有物阻時嘔清涎臥難安枕兼之經候愆期紫黑成塊余斷以肝火痰飲經曰諸逆衝上皆屬於火以此觀之雖經停三月難斷有孕前醫所用杏芥枳桔法非不善但徒有開金化痰之力卻無清火伐木之能茲以病因大旨兼以經義酌方大抵此症根原多由情懷抑鬱必須怡情開懷庶可速愈附方當歸膽草黃連赤芍枳實蔞仁茯苓黃芩半夏薑汁按此乃小半夏湯合當歸龍薈丸之意以夏芩積薑去飲劫涎以歸芍芩連膽草入血分而清火加蔞仁以潤下庶幾金安木平而愈男澍謹識一得集附中虛氣怯余啓初捕魚為業患厄逆病醫以丁香柿蒂湯疊服如故復就原醫診曰丁香柿蒂湯為止厄神方連服數劑毫不見效且脈已離根病在難治因而辭去始請余診診得脈來遲細重按乃得滿面浮氣狀如通草糊成厄聲甚長似空器中出謂曰此症之可望生者正得脈之遲細耳且細玩有神毋容懼也遂用代赭旋覆湯與服藥方下咽厄聲即止繼進二劑厄聲復起越日又診脈症如前厄則抬肩聲類牛吼溯仲景設代赭旋覆湯原為重以鎮怯立意今聲如牛吼中虛可知故一服厄止者乃得重鎮之力再服又厄者足徵中州之虛而倉廩空乏尤恍然悟矣因詳詰之啓曰始因感冒風寒來求先生數次未遇向藥鋪問服一劑寒已除清後因胸前不舒得食身重復問一劑不識何藥只見有花色如檳榔者服下未久五臟翻裂有如刀割腸斷之苦始知以往之誤於是以理中加赭石當歸鎮中安臟日進兩劑厄漸休脈漸充按方再服諸症皆平惟面部尚浮以脾虛失統治之而安按此症因胸不舒得食身重理當健運脾陽或辛溫助胃亦可奏效夫厄逆一總名也有因寒因熱因虛因實者治以清火溫寒降氣理虛之法種種不同敢曰柿蒂一方遂足以畢斯症之能事乎諸痛門手足肩臂肘膝腰脅心腹四肢腫痛王氏婦年近三十孀居十載今春四肢腫痛手掌足跗尤甚稍一觸動其痛非常逮俯仰轉側不敢稍移日夜豎坐者業經兩旬身無寒熱二便略通但痛經數月而面色不瘁閲前醫之藥盡是養血驅風服至茸附亦不見燥惟是腫痛漸加余診兩尺弦數兩頰赤色且肢體關節近乎僵硬而痛楚徹骨手不可摸若果氣虛血少安得不可摸觸乎且數月之苦而神色不為病衰耶此必熱傷營血血液涸而不流正丹溪所稱敗血入經之症名為痛風是也緣寡居多郁鬱則少火變壯火壯火食氣鬱火焚血惡血結而不行失其周流灌溉之常故關節腫痛處龍膽瀉肝湯加桃仁澤蘭清火逐瘀同入竹瀝薑汁通經入絡外以澤蘭兜搗敷腫處內服外敷按治十日腫痛乃除然尚關節不利步履維艱日與清肺之藥緣秋令將至恐燥氣焚金痿軟無力且肺主周身之氣必得肺氣清肅則關節清利矣又肝強徑急藉金以制之也調治半月乃得全瘳龍膽瀉肝湯方見卷二癇厥門肝火生風肩胛腋痛汪綸詔患左肩胛疼痛自肩入腋至脅覺有一筋牽引作痛晝夜叫喊無少休息凡攻風逐痰歷嘗不應延余視時病已極然雖痛悶口不能言脈尚不停且弦大洪數之至明明肝火為病曾記丹溪云胛為小腸經也胸脅膽經也此必思慮傷心心臟尚未即病而腑先病故痛起自肩胛是小腸經已先病也及至慮不能決又歸之於膽故牽引胸脅作痛是膽經又病也乃小腸火乘膽木子來乘母謂之實邪與以人參木通煎湯吞當歸龍薈丸應手而愈當歸龍薈丸方見卷二癇厥門肝火生風肘膝痠痛王國翁少年嗜酒過度致經隧凝痰近來嗔怒頻生木火熾盛今春肝陽暴升肘膝痛楚重墜寐難成睡面白而光舌黃而裂鼻煤眼淚腹痛便祕舊痔復作惡寒鼓栗玉莖痿縮脈得關弦尺數洪而有力固非陽絶亦非陰虛細按諸症叢雜由乎肝陽拂逆木盛生火生風內經病形篇曰諸禁鼓栗皆屬於火於是以左金丸為君加入山梔蒼朮白芍瓜蔞連進十劑接服搜風順氣丸而愈搜風順氣丸大黃牛膝火麻仁郁李仁山藥獨活山萸肉菟絲子防風檳榔車前子枳殼蜜丸左金丸方見卷二痿證門陽縮不伸腿縫腫痛胡墉生初起寒熱交作次日右胯腿縫腫脹狀如腰子痛悶難忍自疑癰毒延外科治瘍醫云外須用藥爛開內服解毒之劑墉生母子惶惑不敢用伊敷藥惟服其敗毒之方是夜徹痛非常次早邀視余曉以橫痃之疾乃酒醉入房忍精不泄之因以致精血凝結挾有肝經鬱火而成決非毒也授以龍膽瀉肝湯加山甲桃仁肉桂連服數劑乃消此症若淹纏日久用藥外敷不為解散內結必成魚口便毒矣龍膽瀉肝湯方見卷二癇厥門肝火生風濕熱腰痛徐伯昆長途至家醉飽房勞之後患腰痛屈曲難行延醫數手咸謂腰乃腎府房勞傷腎惟補劑相宜進當歸枸杞杜仲之類漸次沉困轉側不能每日晡心狂意躁微有潮熱痛楚異常臥床一月幾成廢人余診之知系濕熱聚於腰腎誤在用補妙在有痛使無痛則正與邪流已成廢人此症先因長途擾其筋骨之血後因醉飽亂其營衛之血隨因房勞耗其百骸之精內竅空虛濕熱擾亂血未定靜乘虛而入聚於腰腎之中若不推蕩惡血必然攢積堅固後來斧斤難伐矣以桃仁承氣湯加附子玄胡乳香數劑下惡血數升而愈桃仁承氣湯仲景桃仁大黃芒硝甘草桂枝蓄血腰痛黃紹發腰屈不伸右睪丸牽引腫痛服補血行氣之劑病益日進余診脈象弦澀帶沉詢其二便小便長利不及臨桶大便則數日未通知為蓄血無疑處桃仁承氣湯加附子肉桂當歸山甲川楝下黑糞而愈肝鬱脅痛二條劉氏婦青年寡居多郁素有肝氣不調之患今秋將半大便下墜欲解不出醫用疏導之藥並進大黃丸重閉愈增氣虛可驗兩脅滿痛非補中可投診脈浮大而緩是風邪確據飲食不進四肢微熱中虛可知小水甚利月經不行又是蓄血之症據此諦審不得其法細思獨陰無陽之婦值此天令下降之時而患下墜之症脈來浮大且緩系中氣久傷繼受風邪入臟無疑兩脅滿痛肝氣鬱而不舒惟有升陽一著四肢獨熱亦風淫末疾之義月經不行乃風居血海之故執此陽氣下陷用三奇散加升麻以提陽氣復入當歸少佐桃仁以潤陰血果然應手而痊三奇散黃耆防風枳殼萬海生腹脅脹痛或嘔或利而脹痛仍若醫者不察誤與消食行滯之劑遂腹脅起塊有形攻觸作痛痛緩則泯然無迹自冬迄春食減肌削骨立如柴唇紅溺赤時寒時熱診脈兩手弦數似屬木邪侮土之證究歸陰陽錯雜之邪正內經所謂胃中寒腸中熱故脹而且瀉處仲景黃連湯加金鈴吳萸白朮川椒數劑而安隨進連理湯乃健黃連湯黃連乾薑人參桂枝半夏甘草大棗連理湯方見卷三吐瀉門胄寒腸熱少腹脹痛汪慎余由蘇州歸時當酷暑舟中夢遺旋因食瓜繼以膏粱致患小溲淋痛此濕熱乘虛入於精道之據途次延醫投利濕清火之藥淋痛雖減又加少腹脹急舟至許灣左睪丸偏墜胯脅牽痛而少腹之脹日益甚小水清利大便不通連延數醫俱以五苓散合疝氣方更增車前木通顛連兩日少腹脹不可當左腎腫大如碗煩躁悶亂坐臥不安急切邀治脈得沉弦遂處桃仁承氣湯重用肉桂加當歸一服大便下瘀黑二升而愈夫邪結膀胱少腹脹急之症原有便溺蓄血之分在氣在血之辨蓋溺澀症小便不利大便如常蓄血症小便自利大便黑色此氣血之辨古訓昭然今者少腹脹急小便自利則非溺澀氣祕顯然明矣獨怪市醫既不究邪之在氣在血且已知小便自利反以利水耗氣之藥其何以操司命之權耶此症愈後繼以後一方連服數劑以杜其根附方當歸附子肉桂山甲元胡桃仁按傷寒論云蓄血症少腹硬滿小便自利大便黑色桃仁承氣湯主之水氣症頭汗出大便如常小便不利五苓散主之十棗湯亦主之燥糞症腹滿痛大小便俱不通利承氣湯主之男澍謹識冷積腹痛江發祥得痃癖病少腹作痛左脅肋下有筋一條高突痛楚上貫胃脘下連睪丸痛甚欲死或嘔或利稍緩若無嘔利則痛苦迫切連宵纍日絶粒不進或得腹中氣轉稍覺寬舒醫人不識輒以治疝常法苦辛之味雜投不已有以腎氣不藏者或以衝任不固者而金匱腎氣青囊班龍疊投益甚誤治兩載疾已瀕危視其形瘦骨立腹脅貼背知為誤藥減食所致按脈滑沉且覺有力審病經兩載形雖瘦而神不衰擬是肝胃二經痼冷沉寒積凝膠聚綢繆糾結而為痃癖之症蓋痃者玄妙莫測之謂癖者隱闢難知之稱察脈審症非大劑溫通何以驅陰逐冷於是以附朮薑桂骨脂葫巴丁蔻大劑稍加枳實金鈴以為嚮導兼進硫黃丸火精將軍之品用以破邪歸正逐滯還清冀其消陰回陽生魂化魄之力日夜交斟按治半月病全不減再堅持旬日勢雖稍緩然亦有時復增且沉滑著指之脈仍然不動因謂之曰病雖減而積未除尚非愈也此症頗頑姑忍以待之所喜者傾心信治余益躊躇因思冷積不解欲與景嶽赤金豆攻之然恐久病體衰斷難勝任其藥只得堅守前法再進旬日忽然大便大通所出盡如魚腦其痛如失姑減硫黃丸仍與前藥稍加黃柏每日出魚腦半甌再經半月前藥不輟魚腦方盡冷積始消前此腹肋高突之形泯然無迹厥後露出皺紋一條如蛇蛻之狀乃知先賢人身氣血痰水之積均有澼巢科臼之説為有徵矣血寒腹痛蔣振輝乃室向有腹痛帶下之疾用通經去瘀之藥獲效醫者病家輒稱用藥之妙詎痛雖暫止而經水自此失常逮至旬日一下又旬日點滴不斷纍延半載腹痛仍作痛時少腹有塊觸之則痛愈增痛緩則泯然無迹舊醫猶引舊例更指拒按為實之條用盡通瘀之藥以為通則不痛而有形無形置之弗論自此脹痛愈增無有緩時及加嘔逆不止大便不通醫復於桃仁靈脂藥中更加大黃枳實服下腹中窒塞氣急上衝咽嗌四肢冷汗時出迫切之頃夤夜邀視病家絶不怪前藥之誤尚問巴霜丸猶可及否余曰補之不暇尚可通乎況腹中真氣悖亂愈攻愈散於是以丁蔻附桂小茴川楝猛進二劑所幸少年形體尚旺俾濁陰迷漫之逆藉以潛消後加紫石英枸杞當歸蓯蓉亟進間以歸脾湯吞滋腎丸一月方健緣此症多由房勞過度衝任損傷所致醫者不知端固奇經反行破氣耗血致有此逆最可恨者醫與病家不知定亂反正之功謂余為偶然之中且議少年婦女服此補劑必難懷孕嗣後每一臨月輒用通行之藥致令果不懷孕可勝慨哉歸脾湯方見卷二虛寒門誤表亡陽滋腎丸方見卷二痿證門陽痿不舉積熱腹痛吳嫗初起心腹間微痛越二日痛苦異常汗大如雨水米不入口不作渴小水清利神昏懶言坐難片刻儼然虛極之象自云素屬中寒難以涼劑診得六脈時伏內外一探虛實難決因思痛症脈多停指況陽明痛極必汗若三陰之痛必面青背曲何得汗大如雨勢必內有積熱所以飲食加痛病方入里所以口不作渴痛難支持所以神昏懶言乍觀雖惑細究無疑於是君以芩連白芍平肝清火臣以檳榔厚朴下氣寬中佐以油歸潤腸使以澤瀉下行三劑通利而全愈蓋此症極多治不一法倘大便旬日未解及壯實之體宜承氣湯攻之正所謂痛隨利減通則不痛之意也宿食腹痛傅婦素屬陰虧常宜班龍丸無病求診冀余寫補劑余曰脈來弦緊而沉有凝滯之狀腹中必有宿食秋深恐成痢疾目今調治昔藥非宜況邪氣久居腸胃其臟氣之虛實可知但伏邪未潰豈可暴攻譬之賊兵方聚未張其勢我等只宜先固城郭以示其威令其自散可耳以四君子湯加枳殼一劑服下腹中略響正邪氣緩散之徵詎婦女輩聞余言有滯積竟私煎服濃薑茶二湯一碗下咽之後腹中絞痛難堪下利數十行頭身大熱十指微冷時值傍晚急延余視初不知其服薑茶湯也謂曰四君逐邪果有如此之暴耶因述所誤蓋微積久伏腸胃素薄可知得此薑茶刮決之物豈不大張其勢然至圊雖勤所下甚少餘邪尚存未盡而既已誤治惹動其無如乘其元氣未敗再與疏通盡驅其邪更以小劑行氣之品一劑瀉下腹痛略減但潮熱指冷不除次早復診問所下何物視之一團白沫隱然秋深腸癖之徵此時人事困頓脈仍弦緊是知當理陽氣投建中湯以大建中建立中氣弗投理中以復削其陽氣與金匱小建中湯一劑其症悉痊愈後余不禁自笑蓋初因未病余為尋病治之中因自誤余即以誤治之法治之末因脾陽衰弱余全不以補藥補之見亦奇矣而非見之奇實見之先耳小建中湯芍藥桂枝甘草飴糖薑棗一得集附胸脘脅痛吳鼎三形稟木火之質膏粱厚味素亦不節患脅痛沖脘之病綿纏兩載痛時由左直上撞心煩惋莫耐痛久必嘔稀涎數口方漸安適始則一日一發繼則一日數發遂至神疲氣怯焦躁嘈雜難以名狀醫者不從正旁搜求用控涎導痰諸方治之毫不中竅延磨歲月逮至春升一日痛嘔倍甚吐血兩碗紅白相間結成顆粒是陽明離位之血留久而為瘀者所當審辨也神昏氣湧目瞪如斃即進人參當歸二味漸漸蘇回嗣後神容頓萎杜門靜坐不樂對客交談而氣上撞心胸脹脘悶諸症仍是一日一發守不服藥以攻補兩難惟日進參湯而已值余道經其門邀人診視細詢其由始知原委問曰傷症乎余曰非也曰癆症乎曰非也曰非傷非癆請先生明示何症余曰肝氣病也診得脈來弦大弦為肝強大則病進記讀靈樞經脈篇云足厥陰所生病者胸滿嘔逆又仲景云厥陰之為病消渴氣上撞心心中疼熱飢不欲食故見嘈雜焦躁等症竊意焦躁嘈雜即古人所謂煩寬懊憹之狀知肝氣橫逆鬱火內燔仿仲景治胸中懊憹例用梔子淡豆豉湯以泄鬱火參入葉天士宣絡降氣之法以制肝逆酌投數劑諸症漸愈附方梔子淡豉鬱金當歸鬚降香新絳蔥菅柏子仁厥後診云前進泄郁降逆之法雖兩載痼疾數劑而痊然擬暫行之法未可久恃緣甘平之性少苦辛之味多僅使中病即已勿過用焉亟當善為轉方所謂用藥如用兵更訂四君子加白芍遠志續服多多益善復舅父治腹痛書昨接來諭藉知仁臺舊病尚未全愈晚遍考方書兼參尊體素稟互相酌籌總由命門火衰不能薰蒸脾胃請試飲食惡寒喜暖而脾胃之陽虛可驗更徵腹痛綿綿不絶而臟腑之陰寒可憑藥當溫固中焦宣通腎氣但固中勿令壅閉宣腎毋耗真元如附子骨脂葫巴鹿茸益志等類殆所必需陰味宜減陽味宜加審度於可否之間因應於化裁之內務令真陽健旺陰氣潛消俾中焦丕振脾胃運化有權下焦溫暖腎元開闔有職則身中元氣渾然太和奚患腹痛之不愈也辱承下問謹陳大略如上與長兄治氣痛書屢接來書頗為病纍急欲圖治以保天年弟於手録中查閲甲辰秋有來書偶因醉酒激怒心悸難支服參數錢遂好如故白後每逢喧鬧之地則惕然而驚至幽靜之處方漸安適連年所服之藥無非養心生血近月以來怔忡尤甚動靜無分所幸時驚時止故不服藥尚可耐過惟慮作文之時心悸難以完卷現在精神似實為驚所困時爽時滯難以名狀望為斟酌云云余思兄之舊病根源良由將息失宜耽酒多怒擾動五志之陽下元水虧風木內震肝腎陰耗故多怔忡連年所進湯丸悉責心虛為患是故終難杜絶耳弟於時驚時止之情悟出肝風內震之旨仿葉氏養肝育陰方法佐以潛陽為治服之已獲大效奈停藥半載心悸雖覺如失而氣痛之纍漸至矣己酉春氣痛尤甚橫攻兩脅直衝上咽作噎厄聲進清肝涼血及五磨降氣諸法仍無實效逮至庚春不惟諸症未減而胸脘肩髃間更加痛脹交迫噎症之狀又漸著矣古稱喉間如物阻咯之不出咽之不下曰梅核症又飲食之際如有物梗阻塞之狀者名曰噎兄於此症殆有暗符夫噎與梅核之由皆因七情鬱勃或縱情恣欲或偏嗜酒食令人氣結痰聚陰陽不得升降故也今兄之病既非噎膈又非梅核形症雖異而其因則一也據述胸脹脘痹諸症交迫之時飲酒一甌似覺漸減飲至數甌則漸如失者蓋緣平日之偏造為堅壘必藉酒引轉為輸導乃同氣相求之義也故飲之甚快而不知病之所造益深矣原夫曲麥之性極能升騰橫縱難制亦為各歸五臟而受之故有喜怒憂悲恐五者之不同更有稟陽臟者傷於栗悍之性而終於咳嗽吐血痿躄偏枯之疾也稟陰臟者傷於清冽之氣而終於腫脹關格脫肛噎膈之類也至於偏注肝經而為病者不一而足每觀酒後多言好怒則酒偏投肝已有明徵然酒性雖僅投肝為脹為痛而濁氣必輸於肺為壅為痰是以金失其剛轉而為柔木失其柔轉而為剛橫逆上衝之勢實基於此去春大人用清金之法其心思處治已見一斑故喉間如有物阻皆氣與火互相交成也欲杜此患先宜節酒次宜節煙再以藥餌參以靜功俾肝無助虐肺有清肅則濁邪不致上升肝陽抑之而下謹調半載可望全安弟搜盡枯腸願兄留意謹復淋濁門敗精阻竅潘紹輝得淋濁病溺則管痛艱澀莖口時有敗精溢出凡利濕清熱養陰制火諸法久治不效視其形肥年壯溺出渾濁停久底有膏積據此精溺同出之症決非小腸濕熱細思溺管與精管外竅雖同而內竅各別若果濕熱壅塞溺管則前藥豈無一效者此必少年欲心暗萌或房勞強忍精血離位忽而不泄古云如火之有煙焰豈能復返於薪哉其離位之精出而不出日久必聚為腐穢膠濁且牽引新精妄動故溺欲出而敗精先阻於外是以管痛艱澀也若不急驅精管腐濁徒然滲利溺管豈非南轅北轍乎爰擬宣通竅隧瘀腐之法以牛膝桃仁黃柏山甲金鈴遠志琥珀白果鹿角屑合煎服之穢濁果通溺出如鴉膽子大者六七粒每粒紅白相間更有精裹血者共服四劑始痊須知精道之濁亦有腎虛不攝之症然必滑而不痛耳肝經熱結傅瑞廷之女年十齡時值六月發熱口渴小便淋祕溺則號痛不已延醫以利水之藥渴熱不減而陰戶腫脹又以三黃散馬齒莧敷之遂至潰爛不堪臭穢之極更延瘍醫概以解毒之藥因而益劇腿胯結核稍欲解溺則號痛日甚畏解不解而少腹脹滿難當內服外敷百治不效危急之間請決死生以余非外科也余視斯症內外脈色悉皆火象獨唇舌不燥尚有可疑因思陰器屬肝此必濕熱下陷聚於肝經血分故唇舌不顯燥象若濕熱在於氣分則唇舌必燥也故清利無效但十齡稚女衝任未通亦無熱入血室之症因詢食桃子頗多蓋未熟之桃最能助肝燥血熱結肝經故耳處龍膽瀉肝湯兼龍薈丸大便下血一甌小便乃利陰潰自愈龍膽瀉肝湯當歸龍薈丸二方俱見卷二癇厥門肝火生風按集中各門惟淋濁一症案僅二條概由兵燹之後纂輯故也前凡例中獨於此條病機闡發尤詳語雖不倫理或非誣學者當合觀之倘博覽之士更能搜採補入則幸甚男澍謹識雜症門頰頤浮爛許靜堂內人年近六十素多勞慮患口瘡唇裂頂生痱疹久服祛風清火藥漸至兩頰滿頤浮爛淋滴愈治愈劇時值寇氛靜堂商楚被劫家計蕭條瘍醫亦束手辭之始延余診決一逝期非求治也余視所患處悉白色水液流注並無穢膿自口頰延及胸項亦無漫腫且喜脈象不大肉食不嘔身亦涼便亦利因謂此症七惡不見五善備陳十分可治但取效甚遲耳其家甚喜及見疏方用薛氏加味歸脾法戚友皆蹙眉諸郎君亦咸緘口察其必不能用姑與在庠季子論曰尊堂頰項浮爛孰不謂之毒火夫火猶賊也賊至則驅之固也然有邪盛正虛之時不但賊不受驅且驅之而正反傷此安民攻寇之法即醫家攻補兼行之法況養正之法可轉為驅賊之方當今之世乘正之虛寇盜蜂起孰知亂世之寇匪即治世之良民古之良帥奉行堅壁清野之法以養正安民為懷首逆潛消而脅從歸順通之於醫正所謂養正則邪自除未有伐正而能保身者也況內經原有少火壯火之分後賢更詳有形無形之辨烏可混施而不講乎尊堂稟賦虛弱素多勞慮離宮自燃心火外炎此本身之元氣外越收之養之不暇尚可視為毒火而清之驅之乎考古明賢之論謂無形之火生生息息窈窈冥冥為先天之化為後天之神為死生之母為玄牝之門又豈於形迹所能摹擬者哉夫形迹不能摹擬則雖外顯火象不可斷為真熱概行攻伐然亦非謂無實火也惟在察其真假耳故曰有形之火不可縱無形之火不可殘若能知火之邪正而握其盈虛伸縮之權者則神可全而病可卻是生道在我矣試觀瘍科癰疽潰後氣血已耗每以補藥收功如八珍十全養榮歸脾之法歷歷不爽此豈余之創見乎季子長揖欽服其昆季與戚友謂曰此老用藥似非而所談卻是命煎藥當余面進服後果安余歸時囑臨夜再進一劑旬日中竟服二十劑其爛始斂服至五十劑其功始半但苦流注不幹促餘外藥瘍科余素不嫺敷貼之方未備姑與古礦灰敷之轉進十全保元間服而痊季子感余再造蒙贈詩聯余亦領笑曰此秀才人情也因憶向年朱叔嶽母太夫人孀居有年焦勞憂鬱虛火外炎患口舌糜爛日進清涼虛火愈熾復延外科包治愈增糜爛延及唇外適余歸里招視其色甚白脈息亦微余謂並非外症實皆心脾鬱結虛火爍金夫心主血脈脾主肌肉肺主皮毛故皆受纍急當調養氣血則虛火自藏疏與歸脾湯兼進天王補心丹囑其多服詎意只服數劑余轉滸灣而前醫復至總認熱毒攻注謗余為火上添油嶽家無所依治瘍醫日進丸藥外用膏丹乃至牙宣頰裂爪脫髮落而逝因思瘍醫之藥必是丹鉛之毒方有如此之酷深堪悼惋若知亂世之寇匪即治世之良民通於壯火食氣氣食少火壯火散氣少火生氣之理何至生靈荼毒玉石俱焚耶此余耿耿於衷深為感悼因並志之記讀張氏醫通石頑曰嘗讀內經有脫營失精之病方書罕言近惟陳育仁癰疽圖形僅見失營之名究無方論主治故粗工遇此靡不妄言作名為害不淺夫脫營者營氣內奪五志之火煎迫為患所以動輒煩冤喘促五火交煽於內經久始發於外發則堅硬如石育仁所謂初如痰核久則漸大如石破後無膿惟流血水乃百死一生之證是以不立方論良有以也其形著也或發膺乳腋脅或發肘腕脛膝各隨陰陽偏阻而瘕聚其處久而不已五氣留連病有所並則上下連屬如流注然不可泥於育仁之耳前後及頸間方目之為失營也以始發之時不赤不痛見證甚微是以病者略不介意逮至腫大硬痛蟠根錯節已極豈待破後無膿方為百死一生之證哉原夫脫營之病靡不本之於郁若鬱於臟腑則為噎膈等症此不在臟腑病從內生與流注結核乳宕同源異派推其主治在始萌可救之際一以和營開結為務而開結全賴胃氣有權方能運行藥力如益氣養榮之制專心久服庶可望其向安設以攻堅解毒清火消痰為事必至腫破流水津復外滲至此日進參耆徒資淋瀝其破敗之狀如榴子之裂於皮外蓮實之嵌於房中與翻花瘡形像無異非若流注結核之潰後尚可圖治亦不似失精之筋脈痿躄也詳脫營失精經雖並舉而死生輕重懸殊脫營由於嘗貴後賤雖不中邪精華日脫營既內亡瘕復外聚攻補皆為扼腕良工無以易其情志也失精由於先富後貧雖不傷邪身體日瘦內雖氣結外無瘕聚投劑略無妨礙醫師得以施其令澤也然二者之病總關情志每每交加而有同舟敵國兩難分解之勢故育仁以失營二字括之惜乎但啓其端而肯綮示人之術則隱而不發何怪粗工謬言為道妄用砭石寧免五過四失之咎歟愚竊思石頑之論足與是案互相發明故並録之男澍謹識歸脾湯人參白朮茯神茯苓黃耆當歸遠志棗仁木香甘草龍眼或或丹皮山梔柴胡白芍天王補心湯生地人參元參丹參桔梗遠志棗仁柏仁天冬麥冬當歸五味一方有菖蒲無五味咽喉腫痛陳繼曾尊堂體素清癯高年無病舊冬患傷風咳嗽疏解已痊隨患咽喉微腫小舌垂下鹽點無益守不服藥之戒漸至喉間窒塞飲食維艱始延醫治投疏風化痰之藥口舌糜爛啜芩連知梗之屬喉痛愈增吐出蛔蟲二條人事大困肌膚髮熱醫者群至俱稱風火然見高年形衰色敗究竟不敢下手余視牙關甚松會厭口舌一帶俱白細思咽主胃喉主肺今肺家無恙故呼吸無礙其吞吐甚艱是病在於咽而不在於喉也又赤色為陽白色為陰今滿口色白其為陰火明矣若果陽火為患咽喉出入之地豈能久待纍月乎必高年脾胃既衰中土聚濕新進水穀之濕不能施化與內中素蘊之濕挾身中生生之氣鬱蒸如霧上衝咽嗌故作痛楚延於口舌則糜爛浮於肌膚則身熱是少火變為壯火良民變為匪類矣奈何反進苦寒戕胃致中土濕而且寒故蛔蟲外出而成種種危候急與理中丸五錢青黛為衣令其口含噙化是夕咽痛減半竟得安睡繼進連理湯數劑而安其病愈後同道咸議余為補醫以咽痛爛舌之症從無參朮乾薑之治豈知凡病有陰有陽有虛有實法當隨症施治豈獨咽喉口舌為然哉連理湯方見卷三吐瀉門胃寒腸熱頸項生疽黃榮青項外結喉之間忽生硬疽延瘍醫調治與疏風化痰之劑疽形漸長按之堅而不痛將欲敷藥就正於余余曰豈有不寒不熱不癢不疼之毒乎此症由於思慮鬱結營衛留滯以致氣結不行當進益氣和營之藥不治而治也連服歸脾數十餘劑其核疽自化而消歸脾湯方見前本門頰項浮爛下唇生瘡詹盛林冬月由遠地言旋沿途下唇燥裂時忽干痛謂為霜風所侵屢以豬膏塗潤而掣痛反增質之醫者皆稱風火日與清涼之藥因而糜爛至家就診於余許以一劑可效再劑可痊遂疏椒梅附桂連理湯去甘草盛聞余功限甚速坦然服之果驗門人疑而問曰唇爛不受寒涼之藥愚輩知為虛火矣既舉附桂理中何以復加黃連又何以更用川椒烏梅乎答曰此正所謂下唇生瘡蟲蝕其肛其名為狐若是虛火豈有下唇已爛上唇安然且口舌無恙乎門人退而喜曰毫釐千里良不誣也考狐惑症謂狐惑狐疑不決之狀內熱生蟲之候也上唇生瘡則蟲食其臟曰惑下唇生瘡則蟲蝕其肛名曰狐雄黃丸主之按先君臨治斯症不以雄黃丸而投與椒梅理中湯殆醫之不可盡以成法拘者也男澍謹識雄黃丸雄黃當歸炒各七錢五分檳榔五錢蘆薈二錢五分麝香二錢五分麵糊為丸如桐子大每服二十丸粥飲下日三服火衰目盲黃榮青年近六旬形體素虛今秋忽患目視不清至晚直不見物來寓索補水之方余視其面色萎黃形容憔悴知由憂思抑鬱損傷心脾所致夫水僅能鑑物而火則能燭物今至夜不見則無火不能燭物可知夫心為陽而居上心火過亢則多妄見心火衰微則不能燭照故至夜如盲也與理中加固脂益智間進歸脾湯數十劑乃獲復舊歸脾湯方見前本門頰項浮爛目赤羞明金紹裘內人患兩目紅赤畏日羞明左眼尤甚延目科醫治日進清火散寒目愈難開飲食日減形體日瘦始延余治余於目科素所未嫺諦思經旨有云五臟精華皆上注於目稟氣於脾合於色脈當推中氣久虛五臟失稟精不注目虛火上炎此內因之疾既非發散可解更非沉寒可清當從甘溫瀉火之法授以歸脾湯加柴胡丹皮十餘劑目赤漸退光明如舊且從此氣充血盛已懷孕矣消中喻廷錦能食而疲時飢嘈雜小便赤澀胸膈間微若有痛諸醫咸謂消中誤認為火連服生地麥冬芩連知柏數月不輟遂至時欲得食旋食旋飢面黃形瘦小水愈赤有進竹葉石膏湯者疑而未服余診得脈息屬虛曰君幾誤死能食而疲此乃脾弱胃強法當扶脾抑胃奈何認為實火耶其昆季咸知醫理群起而問曰小便赤澀豈非火乎余曰曷不聞經云中氣大虛溲便為之變耶且從來大小二便豈定為虛實之確據耶今諸君以便赤即認是火則天下皆醫矣遂疏六君子吞左金丸數日稍愈後除左金獨用六君子湯百餘劑而安左金丸方見卷二痿證門陽縮不伸腳氣聶義遠之妻病始畏寒發熱兩足僵硬微腫疼痛步立不能醫者不知為腳氣之病誤與發表漸至氣急上衝腨皮紅赤熱痛難耐又疑為毒氣所致遂付瘍科醫治而氣衝熱痛愈覺不支急迫之間求治於余診得右脈洪而無力左脈伏而不見形羸唇白聲微舌潤詢其體格又屬素虛理直調補氣血但氣衝便祕足腨紅腫熱痛之極此屬氣實明徵且腳氣古稱壅疾是又不可遽補從此酌量先後緩急諸法當先治其標而後其本也緣按症以氣血雖虛而經絡必滯宜先與疏通經絡而後調補氣血方為合法於是將古方雞鳴散除蘇葉恐再散也加生耆以固表也入桑皮以下氣也減桔梗恐載濁也面囑只服一劑次日當視症定方服後大便亦通腫痛少除氣衝大減寒熱悉瘥其家見藥已效更進一劑亦覺相安越日瘍醫適至意在僥圖詐取謬謂毒氣未化當用敷藥更仿余方加防己蒼朮內服外敷是夜寒熱頓起汗出衣發俱濕神魂飄蕩氣上衝心余復視時張口瞑目危險至極急進十全大補湯二劑始得稍安又數十劑方全安原此症內經所言因於氣為腫四維相代陽氣乃壞只因氣衝便祕訂一劑之方者勢不得已也乃病家輕命圖便違囑投藥而瘍醫復貪功射利罔識忌諱嗟嗟此當世通弊獨聶氏哉十全大補湯方見卷一傷寒門同病異治雞鳴散蘇葉吳萸桔梗木瓜橘紅檳榔生薑雞鳴時冷服腸癰文定輝病苦少腹脹滿肛門重墜欲解不解時下膿血諸醫咸稱休息痢百治不愈淹纏半載延余施治視其神色不衰少腹按之愈痛所下或盡是白膿然亦有時汙血診脈舉按皆滑沉候略帶微數疏方與黃耆防風銀花山甲丹皮瓜蔞連翹白芷甘草一劑下白膿帶黑汙而出腥穢不堪者一勺少腹始舒後重乃除再劑除瓜簍加薏苡而痊此腸癰之症因用排膿之藥也
