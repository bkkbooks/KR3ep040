body:
  text: 卷三便閉門二便不通濕熱阻塞遊長萬連值房勞忽患小腹脹痛喜以手按二便阻滯腰膝酸楚屈而不伸食飲難入食即吐出卻無煩熱唇舌如常醫者認為陰症腹痛進參朮附桂之劑病仍如故亦不見燥但腹中愈滿更醫見二便不通又以實熱作痛大進硝黃枳樸車前滑石之屬愈增脹滿腹中窒塞更服巴霜丸欲求一利竟不可得日吐涎水如青菜汁者數升眾皆駭然竟至粒米不入二便不通者五日小腹極痛脹閉難忍百方不效愈治愈危諸醫束手坐以待斃求治於余余思人非金石豈有竭盡攻劑竟不能通者今上不得入下不得出內關外格之證悉具本當死在旦夕何五日尚未死耶仲景云小便不利腹脹喘急者死今幸未喘急所以尚可生也脈得肝部獨強而橫初甚躊躇久之脈症相參始悟與婦人熱入血室一症其義相同夫婦人先因外感傳經熱邪經水適來熱邪既可乘虛而入血室此亦必先因內傷飲食濕熱積聚於中適值房勞精道陡虛所有積聚濕熱亦可乘虛而入精道其內外所傷雖解其乘虛而入一也惟其阻塞經隧脹閉二陰故前後二便皆阻夫少腹者肝經所屬陰器者肝脈所絡今濕熱乘虛阻塞如橫一閂於中濕熱之氣愈阻肝木之氣愈橫所以脹痛難忍下既不通無由疏泄拂逆充溢勢必上衝直侮所克上乘於胃土受木克而為嘔吐觀其吐出如青菜汁者顯然肝威之現形矣此症若不循經引治何以解肝之結搜濕熱之陷通其經絡而消其阻塞乎法用牽牛達腎道走精隧搜熱逐濕為君以吳萸小茴川楝橘核桃仁解肝散結為佐加以苦酒之酸以入肝明粉之咸以入腎二味化水拌炒諸藥引之以入肝腎引上加引使之直達初劑小水長僅得數屁腹中氣響而痛大減二劑前後悉通諸苦如失可見凡病必當曲盡其情悉心審度自有一定之理既得其理自可應手取效若但見病治病不為推求而謂知醫可乎原此症從前未經闡發醫者端守下法屢攻不通愕愕驚奇殊堪浩嘆余臨斯症從傷寒門中婦人經水適來熱入血室悟出男子適值房勞濕熱入精道補前人之缺陷廣後學之見聞詳述受病之由並紀制方之妙俾後之患斯疾者得開一生路也附方牽牛桃仁小茴吳萸苦楝子橘核外用米醋調元明粉拌炒諸藥水煎熱服酒毒內結吳繼文有腹痛病時嘔吐苦水湯水難入二便阻塞而雖屢發得安不過腹中宿積由嘔稍盡究竟綢繆融結之情並未去也今春宿痰舉發倍盛於前四肢厥逆嘔吐口渴小水涓瀝不通大腸壅塞不行延綿旬日遍嘗諸藥未能下咽絕粒不進脈尚弦數沖指攢腹攻痛每痛極時索飲燒酒盞許似若稍可吳問曰陰症乎余曰非也若是陰症當早已入陰矣又問曰熱症乎余曰非也若是熱症豈有湯水不入而反可咽飲燒酒乎吳不悅曰無病乎余曰兄之病乃兄自招良由捨命嗜酒將息失宜以致酒毒內結已成酒癖治療之法未易言也亟宜從此痛戒庶幾希之命得延歲月言未畢痛復作嘔復升急急促令疏方數劑諸苦如失但善後之法猶未盡也越日寓中諸生偶問吳之病經先生手到病除難明其妙而酒癖之義尤所不識請受教焉答曰癖義頗微難以言象當喻而達之酒關甚巨夭枉死亡吾不知其幾許人矣吾儕其操司命之權各有尊生之任可不亟講乎夫酒雖谷造原藉曲水兩性濕熱二氣釀成少飲未必無益過飲暗中損命多飲則亂血恣飲則注肝且酒後食必少中必虛飲入於胃中虛未能施化其濁質雖輸注於小腸而烈性必聚蓄乎肝經故善飲者面常青於此可驗蓋酒性助肝肝性橫逆克於脾則腹痛乘於胃則啘嘔橫於血則肢痹逆於氣則便塞是肝邪為患此又歷歷可徵也又善飲之人其有終於痿厥偏枯之疾者稟陽藏而傷於熱烈之曲性故也有終於腫脹膈噎之疾者稟陰藏而傷於寒冷之水性故也吳之病其始必因過量肝胃受傷氣血多亂由是亂氣亂血隨酒性而溢於絡其氣血酒性交互凝結勢難分解傍依肝胃之膜藏於隱微之中結成囊癖如燕之巢如蜂之窠其積壘非一日也繼是所飲淫質隨飲隨滲由胃肝而入囊癖久之囊癖充塞滿則必溢勢必仰沖肝胃犯肝而為痛厥犯胃而為嘔吐曏者病發嘔吐數日得以安者不過囊癖之蓄積由嘔暫空得以暫息其後仍飲仍聚癖勢日增關隘漸塞故所嘔漸艱未易出也他日此癖為蠱為脹滋蔓難圖者在所難辭然則今日之治尤當亟講矣大抵酒客忌甘酸味助肝最難相適斯義惟喻嘉言透此一關必取其氣味俱雄之藥所謂能變胃而不受胃變者今師其意而擴用之有如寇匪蟠據侵漫已極使非有斬關奪門之將其何以突圍而劫寨乎方中附子吳萸肉桂草蔻之辛熱者用之以通經入絡散痞消症然討寇之兵性情暴烈每多峻厲恐其放肆潛佚不得不以法度制之故以黃柏桃仁明粉苦寒咸下者以制其猛烈且藉以泄熱佐之也但膈膜隱僻之區道路常多曲折非所易入恐難決勝故復使丑牛草烏牙皂氣味俱雄者有鋒銳巧捷之能且有逐水搜濕之功飲之下咽猶號令一舉各皆走而不守直達癖所贊襄成事取功易易然征伐之地難免受傷隱曲之處尚未盡掃故銳兵利導之舉可暫而不可常則善後清淨之法尤不可無越日吳聞余與諸生會講是疾透徹異常於是堅志戒酒亟求善後之方疏平胃散打糊小丸曬令乾堅以攻寇也另以理中加黃連研極細末護曬極堅以安民也每日空心沸湯吞服數錢毋令間斷逾年疾不再發胸膈頓寬色枯者澤肌槁者潤冷積阻格二條胡懋光四肢逆冷面色青白吞酸嘔吐食不得入六脈沉伏大便不通小水短赤細察諸症皆由陽氣不舒理宜先將下部疏通庶幾清氣上升濁氣下降因與大承氣湯疊進三劑毫不為動脈症如故舉家驚怖余亦駭之謂豈有大黃芒硝重劑竟不能通者繼知其人嗜酒每患足疾今足未病濕熱未曾下注致停中焦將成關格之象視舌滑潤非燥症也中焦必有停積冷痰以致閉結膠黏正所謂陽微陰濁僭倨非僅承氣鹹寒可能開者法當通陽泄濁開結驅陰於是以姜附通陽以驅陰硝黃開結以泄濁加草烏皂角名為霹靂通關之將以直劫其巢方成藥煎即忙與服未及片時下穢汙數斗小便清長四肢溫暖食粥二碗不用再劑諸症悉痊此可為冷積繩墨因詳記之附方大黃芒硝附子乾薑草烏牙皂鄧學文初起小水短赤繼則腹脹便秘已服硝黃寒下之藥腹愈窒塞更進車前滲利之藥尿愈涓瀝脹閉欲死危迫之際延余往治至時呃逆嘔吐湯水難入審知素多酒色濕熱壅於膀胱冷積聚於胃腑故前阻小便後塞大腸氣無下降之權只有升逼之勢細察人迎氣口兩脈緊急可駭症屬關格已極勢在難挽舉家苦勸求治勉為推尋因思胃腑冷積當宗熱以攻之辛以通之膀胱濕勢宜遵寒以清之溫以化之於是攻與赤金豆化與滋腎丸連進未嘔晝夜三服俾濁汙升逼之氣方得下降於溝瀆不再劑諸症悉痊景岳赤金豆亦名八仙丹巴霜天竺黃木香皂角硃砂丁香輕粉生附子切略炒燥滋腎丸方見卷二痿證門陽痿不舉脾陽不運二條胡生新科胸腹脹痛大解不通已服枳桔香樸之屬毫無一效又與滾痰丸仍然閉塞飲食雖甘而食不作脹每日探吐痰水數口似覺稍寬有糞結於肛門努掙不下挖之略出延余視時大便未通者已十日矣然脈來浮緩遲弱身無寒熱口不作渴舌無苔積知為陰結之類非陽結可比此必胃氣虛弱津液不布大腸傳送之令不行而胃中所蓄水穀結而為脹雖探吐稍寬究竟津液愈涸傳送愈艱與理中湯加半夏厚朴枳實才一疏方眾皆不悅蓋病家與病者急欲求通大便滿想大黃巴霜之藥余獨吹無和只得詳為辨曰行醫治大便不通僅用大黃巴霜之藥奚難之有但攻法頗多古人有通氣之法有逐血之法有疏風潤燥之法有流行肺氣之法氣虛多汗則有補中益氣之法陰氣凝結則有開冰解凍之法且有導法熨法無往而非通也豈僅大黃巴霜已哉今病原胃氣空虛津液不足即按症投劑亦必三五日始通決非一二劑可效蓋胃氣虛而運行遲也但依吾見力可承任胡生聞言姑信不疑每日二劑腹中毫不為動殊料服至五日藥已十劑仍然如故急欲更醫余恐前功盡墮又苦勸之因思蓄飲不行加入半硫丸四錢仍與前藥吞服再加婉言把持二日共計十七日之便僅得半升溏糞而已自此飲食起居未費調理而健然病家與戚友俱議曰行醫僅通大便如此為難何貴於明耶嗟嗟醫固難知醫則愈難也吳立成素好色多勞吸洋菸忽因憂鬱氣結漸至胸膈不舒醫者妄投消導發散之藥遂至腹脹便秘嘔逆不食大便不通更投承氣湯二劑腹中窒塞痛楚愈增及余視時前醫先至又謂病重藥輕大黃今須加倍余思凡病外感或熱邪傳經或熱結胃腑斷無不發寒熱之理且有一攻不轉矢氣者不可再攻之戒又況攻之愈塞其不可攻也明矣其非熱結也又明矣此脾氣衰敗運行失常出納將廢而腹中所受苦寒之藥一團陰氣瀰漫身中衝和之氣愈攻愈散使非大助脾陽其何以驅此滔滔之陰邪也哉然病音方急索巴霜丸前病專主竟欲與服餘力止之病者病家均覺不悅余不得已乃婉為講辨索紙疏枳實理中湯坐視進藥進畢一劑病者恍然曰平時斷煙癮理中丸亦曾服過但此時腹中脹閉務求先通大便余曰此正所以通大便也病者不答而睡嗣煎一劑又親進之其醫問病者若何曰腹中全無動靜但素日未睡今忽得睡而滿似稍寬其醫寂然而去余復將原方加倍計術一兩增桂一錢服下腹中氣響甚喧二便一齊通利所泄之糞半綠半黃盡是稀糜穢水並無結糞相間此腹中一團陰氣之驗也愈後調理之藥制附桂理中數斤自是飲食漸增煙癮亦止其家雖不以為功余亦竊喜免謗最後其醫猶謂此等之治不過偶中耳癃閉門小便不通獨陽不化都昌舟子大小便秘腰屈不伸少腹脹痛倩人扶持來寓求救狼狽之狀勢甚可駭細視之面色正赤鼻準微黃額汗如珠舌苔中黃詰之曰小便秘乎其倩人曰二日一夜並無半瀝大便亦閉余知鼻黃者多患淋秘淋秘鼻黃者勢必危仲景云無尿額汗者死因謂之曰事急矣恐難治也病者聞言大哭余為之惻然姑為診之尺寸沉小幸勁指有力復慰之曰此症雖危吾可以法求之意仿無陰則陽不化之旨欲舉東垣滋腎之法病者忽云服車前草及六一散大黃藥一劑愈加脹痛難忍此又涼寒不服意者冷結關元乎然脈象症候固非無陽且似有火乃寒之而反重者何耶因思內經有云諸寒之而熱者取之陰所謂求其屬也遂訂六味地黃合滋腎作湯大劑以進滋陰以化氣外用搗蔥合鹽炒熱布包熨臍通中以軟堅自午至戌內外按法不輟俾得關通二便頓解此症生死反掌讀仲景書者方知滋腎丸方見卷二痿證門陽縮不伸六味地黃丸方見卷二痿證門陽痿不起濕熱內阻二條王輔粥初起腹鼓腳浮小水短少大便甚艱氣逆上衝醫用五苓八正諸方愈加腹鼓小水涓瀝不通按脈洪大神彩尚存足徵稟賦甚厚方可耐此重症診畢謂曰此乃濕熱內蓄恐成單脹膀胱氣壅不行以致小水悉閉今欲治此須通小水為急但通小水非氣化不出因問欲湯水否曰極不口渴乃知確由下焦濕熱所致與李東垣先生治王善夫一案大同遂以黃柏知母之苦寒以瀉內蓄濕熱肉桂之辛熱以化膀胱之氣才下咽腹中甚痛小水遂行脹滿亦消後以八味地黃丸數服而痊八味地黃丸方見卷二虛寒門首案黃萬順善飲素嗜炙食每患淋秘醫投以五苓八正散輒小效漸至溺必艱澀少腹覺滿時平時篤已半載矣一日房勞前症倍盛仍進五苓八正之屬服之溺愈不通涓瀝難出腹脹腰屈不可俯仰匍匐就診脈得兩尺堅搏知為素蘊濕熱聚於下焦膀胱之氣不化仿東垣法以知母三錢黃柏三錢肉桂一錢服之半晌安睡一頃諸症如失厥後一月數發或一年數發悉以此方必效惟其酒色不節調理不善宜乎病源不清濕熱日聚腎陽日耗他日腹鼓喘急之患殆所不免矣越歲果患是疾而死木鬱不舒許福生春月腹痛泄瀉小水短澀余門人以五苓散利水止泄尿愈閉腹愈痛痛泄不耐呼吸將危急請余診門人問曰分利而尿愈閉者曷故答曰所謂木斂病耳內經有云生鬱於下病名木斂蓋木者肝也斂者東也肝喜疏放春月木氣當升今木氣抑鬱斂束再被滲利沉降之藥致令生氣愈不得舒是有秋冬而無春夏安望其能疏放乎用六君子湯加防風升麻桑葉數劑遂其條達而愈述治二條小水不通內經稱為淋秘癃閉最當詳審夫小水之源出於肺故經曰水出高源也其道由於三焦故經曰三焦者決瀆之官水道出焉其藏在於膀胱膀胱者州都之官津液藏焉氣化乃出可見小便之通與不通全在氣之化與不化然而氣化二字難言之矣有因濕熱鬱閉而氣不化者用五苓八正禹功舟車之劑清熱導濕而化之有因上竅吸而下竅之氣不化者用搐鼻法探吐法是求北風開南牖之義通其上竅而化之有有陰無陽而陰不生者用八味丸腎氣湯引入腎命熏蒸而化之有因無陰而陽無以化者用六味丸滋腎丸壯水制陽光而化之有因中氣下陷而氣虛不化補中益氣升舉而化之有因冷結關元而氣凝不化真武湯苓薑朮桂之類開冰解凍通陽泄濁而化之有因脾虛而九竅不和者理中湯七味白朮散之類挾土製水而化之古法森立難以枚舉總之治病必求其本奈何近時業醫者日益眾而古法日益荒每遇小水閉塞之症不究其本執用車前木通苓澤沉寒淡滲之藥以為知醫幸遇濕熱聚蓄內結僥倖得功以為能事倘遭一切陽虛之症而用淡滲沉寒之藥其陽愈虛而陰愈盛陰愈盛而便愈不利勢必腹脹仍執檳榔牽牛之藥而陽愈損其氣愈亂轉輸無由勢必上奔而為喘急無救矣仲景云小水不利腹脹喘急者死正因陽亡氣散故也吾先君深知此理曾有治詹姓冷結關元一案足為承先啟後之資今秋盡冬初時有字春和者體肥面白一日二更時忽然腹痛敲門邀視余念鄰誼披衣而往見其腰屈不伸自以兩手撫按小腹膨脹腹中甚痛面唇俱白十指稍冷小水緊迫欲解不出脈來沉遲內外一探陽氣大虛因問曰日間曾服物否應曰清晨無病上午小便時身中忽然戰慄尚有一半未能解出以後微覺小腹帶墜服六一散一文愈覺腹脹腹中大痛余曰起先小便時寒戰足見身之陽虛再進滑石沉寒之物凝而不化是猶雪上加霜自然關元冷結時值二鼓正陰氣充盛之時陽愈不耐故病見劇法宜助陽開結暖其水而冰自解冰解而水自流水流而壅塞自開塞開而脹痛自消矣疏方以附子為君薑桂為臣茯苓甘草為佐沉香為使意用姜附桂以消陰也茯草以泄滿也沉香以鼓升下焦氤氳之氣也藥味精專絲毫不雜因病勢已極重劑與之恐其陰盛亡陽彼疑藥之燥分之重竟不敢服再四叮嚀勉強服之余回寓藥下未半刻彼見病雖未加而痛尚未減即更他醫至則大罪吾藥幸彼亦僅用豬苓澤瀉車前茯苓陳皮桔梗之輕劑藥一下咽小水長行立時而痛脹俱失豈知余劑為之嚮導哉次日醫者病者皆曰昨非後劑幾被薑桂閉死矣嗟乎彼居無功之功我得無罪之罪安得同道高明之士為我一正之記讀先祖著醫卜同源論末附治驗有詹姓癃閉一案云病自腹痛連日服藥未愈一日偶用車前草煎服須臾痛轉加甚小水緊迫膨脹不出延余診時痛悶於床呼吸將危四肢厥冷脈得寸部浮弦時止尺部沉遲而疾潛思陽明實痛熱結膀胱痛極必汗今無汗知非陽症也又初無惡寒頭痛則於表裡無涉此必生冷傷臟是為冷結關元陽氣不化經曰膀胱者州都之官津液藏焉氣化則能出矣重用附桂加苓草佐以枳實合為逐冷化氣一劑後人事稍蘇小便緊急十餘行僅得半盞再劑後安睡一頃下榻小水長行痛止而安此症因案中引而未發故特表而出之男澍謹識吐瀉門下痢紅白症附胃寒腸熱黃平福形瘦面白時當暑熱得嘔吐泄瀉之病醫見口渴溺赤與石膏竹葉湯而嘔泄未止反加心胸脹滿神氣昏冒躁擾不安勢甚危急診之脈來浮數肌熱灼指舌邊紅刺滿舌白苔中心黃黑伊父紹邦年老獨子求治甚切因慰之曰俟吾以二法治之毋庸懼也先與連理湯繼進半夏瀉心湯果得嘔泄頓止熱退納食而安門人問曰吾師治病每預定安危令人莫測此症先定二法服下絲毫不爽其理安在答曰業醫必揣摩有素方有把握內經有云腸中熱胃中寒胃中熱腸中寒腸中熱則出黃如糜胃中熱則消穀善飢胃中寒則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢小腹痛脹斯人斯症合乎胃中寒腸中熱故脹而且瀉也然胃中之寒始先原是盛暑逼於外陰冷伏其中而醫又以大寒之藥清胃則胃愈寒矣故雖寒熱錯雜不得不先與連理調其胃氣分其陰陽也然陽邪內陷已成痞結非苦以瀉之辛以通之其何以解寒熱錯雜之邪耶世醫治病但守寒以熱治熱以寒治倘遇寒熱錯雜之邪不知內經胃熱腸寒胃寒腸熱之旨及仲景諸瀉心嘉言進退黃連湯法者其何以肩斯任也半夏瀉心湯方見卷一傷寒門誤治傳經連理湯人參乾薑白朮黃連茯苓甘草陰寒直中傅德生善飲衣食弗給時值暑月吐瀉交作大汗如洗口渴飲水四肢厥冷尚能匍匐來寓求治余見而駭之忙與附桂理中丸一兩更與附桂理中湯一劑俱嘔不納又託人求診見其吐瀉汗厥惡症未減余益駭之尤可畏者六脈全無四肢冰冷捫之寒徹指骨頃刻間肌肉大奪指掌尤甚急以回陽火焠之諸逆幸挽始獲斟酌處方以大劑附子理中湯加益志又嘔而不納因思胃者腎之關也寒邪直入舍此大熱之藥將安求乎復悟腎胃之關一臟一腑寒邪斬關直入與少陰腎寒之氣滔天莫制大熱之藥勢必拒格夫理中者理太陰也與少陰各別原仲景治少陰病下利厥逆無脈之症格藥不入者有反佐通陽之法用白通加人尿豬膽汁湯按法煎進下咽乃受漸喜脈微續出陰濁潛消陽光復闢九死一生之症賴以生全白通加人尿豬膽湯蔥白附子乾薑人屎豬膽汁按回陽火不惟能回陽於無何有之鄉凡一切暴中陰寒陽縮痰厥氣閉等證用之得當無不立效惟臍下平平三焦中焦宜稍偏病人長則下焦宜疏病人短則下焦宜密診脈之理下指亦然此余趨庭傳受心法未忍私秘但焦之大小焠之輕重與夫按穴不差神而明之存乎其人附夏禹鑄治小兒臍風燈火圖說臍風症初發吮乳必口松兩眼角挨眉心處忽有黃色宜急治之治之最易黃色到鼻治之亦易到人中承漿治之稍難口不撮緊微有吹噓猶可治也至唇口收束舌頭強直不必治矣一見眉心鼻準有黃色即用燈火於囟門一焦人中承漿兩少商穴各一焦臍輪繞臍六焦臍帶未落於帶口一焦既落於落處一焦共十三焦風便止而黃即退矣道光庚戌冬月許柱臣先生初產一子即患此症邀余往視渠母曰已不吮乳胡請醫為余欲回寓柱臣色有不忍勉為視之眉心至鼻俱黃口緊不哭微有吹噓而已即以夏氏十三焦燈火治之遂果蘇吮乳不輟越早復視生機勃然以指迷七氣湯調集成沆瀣丹疏利臟腑而愈用白通湯異症同驗並答門人問周孔昌體肥而弱忽然腹痛泄瀉十指稍冷脈甚微因與理中湯服後泄未止而厥逆愈進腹痛愈甚再診無脈知陰寒入腎蓋理中者僅理中焦與下焦迥別改進白通湯一服而安附次日其堂兄腹痛纏綿漸至厥逆二便阻閉脹悶之極已進攻下而痛愈重促余診治六脈俱無且面青唇白知為寒邪入腎亦與白通湯溺長便利而安門人不解疑而問曰一泄瀉不止一二便阻閉何以俱用白通湯而愈答曰少陰腎者胃之關也前陰利水後陰利谷其輸泄有常度者原賴腎臟司開闔之權耳若腎受寒侵則開闔失職胃氣告止故厥逆無脈也今兩症雖異而受病則同一者有開無闔故下利不止一者有闔無開故二便皆閉均以白通湯復陽散寒溫暖腎氣使腎氣得權復其開闔之舊則開者有合合者有開矣噫此金匱奧義仲景隱而未發者子輩既從吾遊讀書必期悟境悟能通神洵非虛語乃知聖人之法變化無窮也白通湯蔥白附子乾薑木邪侮土熊錦松潮熱泄瀉嘔吐蛔蟲咳逆牽引左脅疼痛歷服清散溫補之藥愈治愈危迨至夜半氣逆神昏面紅目赤汗大如雨儼然虛脫之象但從來熱泄之症最慮陰液消亡斷無戴陽之理診兩寸弦數知其臟體屬陽察脈審症推肝火沖逆犯土侮金是以嘔泄咳疼諸苦並增加以溫補誤投以致熱盛神昏也與溫膽湯加石斛五錢桑葉白附數劑果安溫膽湯方見卷一傷寒門誤治傳經答問門人問曰傳孔英之子夜半腹痛自服麴櫱砂糖次日上則嘔吐而蟲出下則泄瀉而血出醫者以桂枝白芍黃芩木香之藥連下痰血數升四肢厥逆輾轉躁擾極危索飯一碗食畢頻笑頻哭而逝此曷故也答曰大凡治病必先察其外感內傷為吾儕臨症之權衡次究其在營在衛為人身氣血之分別然人有兩死而無兩生故曰脫血者無汗脫汗者無血蓋汗即血血即汗孔翁乃郎吾早見其語聲低陷神彩外揚聲陷而氣必弱神揚而內必空固知其非永壽人也今腹痛自半夜其陽虛陰盛可見奈何誤為食積腹痛而用麴櫱砂糖極力消導大戕其脾胃生氣耶蓋麴櫱能化米為酒而砂糖破血尤速嘗於吾鄉幼科並方脈諸士及處家者皆切戒之乃世俗通弊無論寒熱虛實一見小兒腹痛即以麴櫱服之產後腹痛即以砂糖服之蓋只知其利之小而不知其害之大也幸遇體堅病實者服之雖得取快之一時每多暗損於後日至若病虛體弱之人害可勝言哉且今人之稟氣虛弱者多虛弱之體脾胃既傷安得不上嘔吐胃虛蟲無所養而上出下泄瀉脾虛血無所統而下脫乎當是時中氣大困安之固之猶恐不及奈何醫者尚認為外感實火之證投以發散清上致令陰陽表裡俱傷是其外感內傷之辨不明矣夫其臨危索飯者倉廩空求救填也大凡虛病將危食飲倍常俗云裝路食者此也至此已為除中不治之證除中者言中氣已除盡也躁擾不安者虛陽外絕中氣內斷厥逆脾絕頻笑心絕頻哭肝絕蓋心主血肝臟血脾統血以三臟俱絕而殞豈非寒中決裂之驗耶何孔翁及世俗尚不知曲糖醫藥之誤乃歸咎於方隅鬼祟不亦異哉故醫者能於望聞問切之間先清其內傷外感之由則幾矣子輩後遇此症必當以扶土救陽為先蓋萬物以土為根以陽為生無土不立無陽不長此其大要也門人又問曰此證今先生道破固知其為內傷矣但分明下血即為血虛似宜救陰補血乃言扶土救陽其理安在曰吾早已言之夫汗即血血即汗有形之血不能速生無形之氣所當急固況中虛之病何堪辛散苦寒戕劫之劑當知治此症與仲景治誤汗亡陽救逆之法無少異且中土一臟尤為人身吃緊關頭試以五行言之土能生金不待言矣設使木無土何以載其根遂其生水無土何以御其邊底折其江淮河漢之流又火能生土而實火生於土設使火無土固無從始其赫曦之化又何以蓄其升明伏明之勝復乎蓋上非火不堅非木不疏非金不泄是以一歲之中春夏秋冬木火金水各旺七十二日土寓四季之末每旺十八日大哉地道土膏一動百草蕃茂土氣一收萬物歸藏究而言之萬物歸於土萬物生於土也推而廣之水火相剋水火又同穴設使水中無火則神機寂滅矣火中無水則萬物枯焦矣其實水包火外火胎水腹故仙經曰龍從火里出虎向水中生又道經云兩腎一般無二樣中間一點是陽精學者必須從此推求自然心地頓開所謂知其要者一言而終不知其要者流散無窮讀書若但隨文解義何能精義入神今因子輩不知人身以土為重之要故並及之按陳修園著三字彙經有曰若河間專主火遵之經斷自我注云原病式十九條俱本內經至真要大論多以火立論而不能參透經旨如火之平氣曰升明太過曰赫曦不及曰伏明其虛實不辨若水炭之反也男澍謹識痢疾附勞傷中氣聶安生腹痛下痢紅多白少諸醫以腹痛為積又以紅多為熱屢進消導不應更與芩連歸芍服之潮熱時起下墜難支欲進巴霜丸疑而未決余為診視左關弦大之至唇舌雖紅然不喜茶水脈症相參知為勞傷中氣以致營衛不調蓋營虛則血不藏衛虛則氣不固而為下痢紅白也加之苦寒迭進致使陽虛外擾而潮熱中氣內傷而下墜意擬理中焦之陽使氣血各守其鄉但脈無沉細且有弦大又兼腹痛據症按脈斯制木補土提氣三法在所必須與黃耆建中加薑炭四劑始安後與附桂理中加固脂鹿茸十劑而健孰謂下利膿血定為熱耶黃耆建中湯方見卷二內傷門泄瀉不食脾胃虛冷陳丹林之子十歲病痢發熱嘔惡醫以藿香正氣散二日絕粒不進所下血多白少諸醫見血為熱又稱胃火之嘔進左金二陳之屬腹脹胸高指尖時冷余視其血先下者凝黑成片後下者點滴晦淡知為脾胃虛冷致陽氣浮越而發熱陰氣不守而下奔中焦困乏而不納與乾薑甘草湯一劑嘔吐再劑胃脹已消以早米湯亦受更方與理中湯發熱下痢頓止蓋脾胃得權陽氣乃運使氣血各守其鄉耳腸胃積熱王子儀先生素善病嘗讀醫書艱於嗣息喜補畏涼客春舉子屬胎寒甚小自周以來未進涼藥不知內經所謂久而增氣物化之常也今秋深得挾熱下利症自進止澀之藥利愈甚及延醫言其為熱用連翹黃芩清火之藥更嘔乳於是畏涼如虎日延數醫迄無定見子儀日夕看書對本宣科漫無適從輕劑小試以圖穩當日復一日遂釀成一極重熱症猶自認為虛陽發外即有醫者認其為熱不令開方即行辭去然又不能自主請余往治余見症是一團火毒內焚暴注下迫諸逆衝上之大熱症非大寒不能勝病而力爭明辨不足以破其惑乃佯不發聲疏方附子白朮乾薑肉桂蔻霜才一開出眾皆唯唯共相契賞及開等分朮附一兩其餘俱五錢眾皆緘口子儀親自持方曰承賜妙方大符鄙見但兒小未免分兩過重余勃然曰既不信何勞相請即欲回寓子儀堅留眾共挽又佯為辭曰事至此不可緩矣余有人參補藥丸兩副同進眾謂此中必有真參忙調灌之豈知余用黃連解毒丸及六一散一服嘔住神安再服泄止熱退但口尚渴與六一散令煎洋參麥冬湯調頻服而痊子儀致謝曰多蒙妙藥有費重資余不覺一笑然亦未敢明言其事蓋此乃一時權變之法誠恐不知者將以我為欺人之尤然苟可救人有所弗辭也黃連解毒湯黃連黃芩黃柏梔子各等分一得集附木邪侮土鄒錦元之妻小腹絞痛裡急泄瀉每欲小便腹筋牽引陰中諸醫見泄止泄投盡理脾澀劑月餘不瘳勢甚危篤繼復嘔吐湯水不入胸以上發熱腹以下畏寒余診之曰若果內寒外熱安得月餘痛泄之病尚有弦數之脈此必木邪乘土下寒上熱當推關格之例治之仿進退黃連湯加吳萸木瓜川楝蜀椒烏梅月餘重病不過三服而安蓋仿先君治熊錦松泄瀉吐蛔潮熱咳逆一症推肝火沖逆犯土侮金用溫膽之法擴而充之也嘉言進退黃連湯黃連乾薑人參桂枝半夏大棗按此方本仲景黃連湯而黃連湯有甘草與小柴胡湯同意以桂枝易柴胡以黃連易黃芩以乾薑易生薑余藥皆同和解之意一以和解表裡之寒熱一以和解上下之寒熱仲景心法如此嘉言有進退其上下之法以治關格非中人所能辨也風火門牙緊唇腫陳元東連日微覺惡寒兩耳痛引及腦然飲食自若曾向吳醫診治服川芎茶調散下咽即渾身大熱面紅目赤牙緊唇腫咽喉窒塞癮疹紅塊攢發滿項舉家驚布急延吳醫復視吳醫束手無法陳氏昆季伯侄交口怨為所誤乃一面閉阻吳醫一面各尋別醫及余至時數醫在堂未敢用藥有謂此非桂附不可治者余因問曰此何症也一醫曰誤表戴陽於上陰癍發於皮膚必須桂附方可收陽余笑曰先生可獨領治否其醫曰如此壞症誰肯領治余曰吾可領之遂將吳醫原方加甘草五錢並曰立可呈效其家見余言直切急煎與服藥一入喉微汗熱退疹消頭目俱清一時人事大爽諸醫見余言已驗各自回寓而吳問曰加病是此藥愈病仍此藥且加病甚速愈病仍速如斯奇治令人莫測肯以傳乎答曰五行之速莫如風火此症本風火內伏閣下特未察其隱而未出之故耳原藥升發宣揚治本合法但一劑其伏邪只到肌表宜乎逼蒸發熱頭目赤腫皮膚疙瘩蓋發猶未透也余乘機再劑解肌敗毒攻其汗出則邪可盡達自然風靜火平合乎火鬱發之之義但風火交熾勢甚暴急故重加甘草以緩其火勢乃甘以緩之之意法遵經旨有何奇哉吳長揖曰先生誠高妙勝吾等遠矣牙關緊閉二條傅毓尚長子潮熱畏寒醫以羌防柴葛之屬熱愈甚大汗淋漓四肢怠惰食已即飢醫者猶謂能食為美見其潮熱不退更認為瘧疾復用柴胡檳榔之屬其熱如故問其大便甚難又加大黃枳殼便仍未通乃至牙關緊閉口中流涎面唇俱白大汗嗜臥腹中欲食口不能入前醫束手而去始延余診問其初有潮熱畏寒繼則大汗易飢便堅四體倦怠後乃牙緊床腫涎流診得諸脈弦小惟兩關洪大之至細察此症雖屬三陽經病但與太陽少陽全無相涉悉是陽明胃病蓋胃中伏火為中消候也以瀉黃散加七釐升麻大黃與之方中最妙防風升麻有升陽瀉木之用所以能啟發胃中伏火不致清陽邪火兩遏其中使之盡行舒暢又有七釐誘之石膏涼之大黃泄之梔子引之甘草調之蜂蜜潤之井井有法誠為胃中伏熱之妙劑也下咽後熟睡一頃牙關即開流涎亦止潮熱亦退更以搜風潤腸之藥頻服而健瀉黃湯防風藿香山梔石膏甘草熊婦年十七歲起日畏寒發熱次早大熱不寒不知人事牙關緊閉面唇俱赤膠痰滿口遍身痿軟狀若無骨六脈急數二便阻滯醫者見其身軟咸稱不治不知寒則筋急熱則筋弛此真風火之症古稱類中之屬也詢知食炒豆子過多蓋身中素積內火加以外入之熱繼受外入之風風乘火勢火借風威所以卒倒無知理宜兩徹內外之邪使表裡清而神識朗先以稀涎散吐之隨進疏風清熱通關化痰之藥而痊後以生津之藥而健附方防風荊芥連翹薄荷大黃明粉黃連南星殭蠶草烏牙皂甘草薑汁竹瀝稀涎散方見卷一中風門首案纏喉風熊惟忠女年近二十未出閣素無病六月夜食新炒花生就睡次早日高不起家人視之牙緊氣促遍身大熱昏迷不醒即遣人報知姻家其姻王君植階與余相契邀余同往路途遙遠日晚始至伊家已具棺檳矣熊君邀入書室就歇告余曰早間遣人報請時尚身軟大熱隨後身冷僵硬兩家不幸空勞臺駕姑請歇息余思此症若非虛脫必是閉塞因謂熊君曰人之生死原有定數亦有定理今令愛之病揣理不明欲為一視以明其理熊君止曰小女不幸然勞駕遠來微禮自當奉敬但今將殮斷不敢煩余曰非為利也不過明其死於何症耳於是持燭入室去帛諦視滿面紅色鼻準尚有汗注余曰如此活人何故埋之遂與雄黃解毒丸合稀涎散調勻一杯徹枕從鼻灌下灌至一半藥從齒縫溢出其口忽動牙關忽開觀者大驚復將所餘之藥從口灌入喉內有涎溢出手足一時齊動觀者益驚余益振發精神仍加前藥再灌立時側面而吐又與前藥嘔出膠痰一甌呻吟不已人事始蘇然尚不能發聲時已雞鳴抱入臥床囑其開口細視滿喉膠痰紅絲繞塞乃知纏喉風也迨天色將曉覓取土牛膝搗汁調玄明粉一兩鵝翎卷出其痰隨嘔隨卷乃得發聲開目與疏風清火藥三劑又頻進生津藥而安是時競羨為神究竟不過察其情求其理耳稀涎散方見卷一中風門首案雄黃解毒丸雄黃一錢鬱金二錢巴霜一錢醋糊丸痰飲門喘息不已王毅垣先生平日操勞勞倦思慮俱傷脾氣素有痰飲稍飲食未節或風寒偶感必氣喘痰鳴十餘年來臨病投藥無非括痰降氣之品迄來年益就衰病亦漸進值今秋盡天氣暴寒飲邪大發喘息不休日進陳半香砂之屬漸至氣往上奔咽中窒塞喉如曳鋸密室中重裘擁爐尚覺凜凜痰如浮沫二便艱澀余見其面赤足脛冷陽被陰逼外出兩人靠起扶坐氣逼咽嗌不能發聲脈得左手沉澀右手緩大因思喘急沉澀已屬敗症且四肢雖未厥逆而足脛已冷實未易治繼思胸中乃太空陽位今被飲邪陰類僭踞陰乘於陽有地氣加天之象急以仲景苓薑朮桂湯加附子一兩連進二劑病全不減再診左澀之脈已轉滑象而右大之形仍然如昨乃知中土大虛不能制水飲即水也嘉言喻氏曰地氣蒸土為濕然後上升為云若中州土燥而不濕地氣於中隔絕矣天氣不常清乎遂將原方重加白朮減附子大劑再進而陰濁始消胸次稍展溺長口渴毅翁恐藥過燥余曰非也此症仲景所謂短氣有微飲者當從小便去之況渴者飲邪去也何懼其燥耶仍將前藥疊進乃得陽光復照陰濁下行其善後之計仍仿嘉言崇土填臼之法緣飲水竊踞必有科囊故耳咽喉壅塞陳霽云尊堂年逾五旬形體肥盛平素多痰余每以姜附投之輟效厥後醫者步轍屢進漸有肩髀疼痛手足拘攣之狀醫又云當防中風日進茸附之藥既不知久而增氣之例又不審病因氣變之理竟到危急之極深夜邀視牙關緊急咽喉閉塞且滿面火光炎炎諸醫環睹皆認中風稱為戴陽危症家人忙進參附余見病勢甚急不能與辨令取鹽梅搗汁擦牙俾得牙開始見滿口膠痰壅塞咽喉隨用稀涎散調水卷取其痰約嘔升余其聲稍開然尚不能言又以元明粉攪洗喉中隨嘔隨攪又嘔涎升余方云要睡次日連進控涎丹二日中捋進六十粒始得微泄改進清肝化痰之藥而健肩臂疼痛傅沐初年壯體強性豪善飲患肩臂疼痛每晚痠麻尤甚手不能舉自慮風廢吳城諸醫疏風補血歷嘗不瘳余視其聲音壯厲又大便頗堅知為酒濕內蘊痰飲流入經隧原人身衛氣晝行於陽陽主動動則流故晝輕夜行於陰陰主靜靜則凝故夜重按此症實痰阻滯經隧法當攻刮搜逐先與控涎丹繼進茯苓丸旬日微泄數次而安控涎丹甘遂大戟芥子等分為末糊丸臨臥薑湯服茯苓丸指迷方茯苓一兩半夏曲二兩枳殼五錢風化硝一錢五分薑汁糊丸左右脅痛余素胃氣不清喉間有腐穢結痰如豆粒者時出一日倚欄片刻覺右脅疼痛右肩肘胛重墜莫舉身稍轉側即牽引脅肋疼痛頗甚身略惡寒投發表藥不應因思此症非風非氣必敗痰失道偏注右脅之故以平胃二陳加芥子蔞仁二劑而安附後治周成翁惡寒胃痛醫與疏滲藥胃痛偶減忽加左脅疼痛時發眩暈欲補未決延余診之脈來濡滑因推胃中痰飲流注肝絡故有風旋痰眩之象與二陳加芥子瓜蔞枳實而痊平胃散蒼朮厚朴陳皮甘草二陳湯半夏茯苓陳皮甘草瘧症門獨熱無寒楊有成先生患瘧兩月歷試諸藥弗效其瘧獨熱無寒間日一發口不渴身無汗自覺熱從骨髓發透肌表四肢如焚捫之烙手視舌潤脈又沉遲竊思果屬癉瘧安得脈不弦數口不作渴且神采面色不為病衰耶此必過食生冷抑遏陽氣於脾土之中陽既被郁鬱極不通而脾主信故至期發熱如瘧也治之之法必使清陽出上竅濁陰歸下竅則中焦之抑遏可解與升陽散火湯果汗出便利而安附陳友生病瘧脈象形色悉同惟獨寒無熱醫治三月不痊察其溺短無汗知為外寒內熱伏火畏寒之症蓋火鬱土中而脾土主信故至期如瘧惟有發之一法亦與升陽散火湯而愈按此二症一寒一熱俱用升陽散火湯無非升發脾陽與古人以腎氣湯治消渴溺多又治水腫溺少一開一闔無非蒸動腎氣非深造微妙者難與語也男澍謹識升陽散火湯東垣人參防風柴胡葛根升麻獨活羌活白芍生熟甘草姜棗寒少熱多陳奇生室人妊身九月得瘧病久治弗痊其瘧寒少熱多汗大口渴迨至坐臥不安勢難支持腹中胎氣亂動諸醫以安胎攻病無從措手余診其脈略有躁亂再視其舌已顯鏡光面白唇紅青筋滿露此木邪侮土乃津液大傷胃火掀騰雖年少體強然汗後脈躁最犯禁例蓋恐明日瘧至而正虛邪盛治不得法則母子難保矣因思胃火掀騰而久瘧食減芩連決不能進津液大傷而土敗木賊歸術又難酌投擬補虛清熱之藥惟有純甘可採因舉黃耆五錢石斛五錢人參五錢桂枝八分烏梅一個煎湯已成另搗梨汁一杯薑汁少許沖服囑其即服一劑至夜備煎一劑明早將曙再進病者兩服藥後俱云好藥以味甘可口與胃相適也是日瘧竟不至再與甘溫調理而健但此症脈來躁疾面白唇紅青筋滿露若用柴芍伐肝必斃飲食傷胃周秋帆先生秋間患瘧每日午發寒熱稍平退時有汗頭疼或又不疼口渴或又不渴二便無恙夜寐亦安此客邪尚淺然治經二旬凡發表清裡和解補中諸法投之漸劇況體氣素虛而煩惋莫耐疊投補劑而胸膈加痞余診其脈亦皆和平舌苔黃滑審症察脈似當溫補然又補之不投豈敢再陷前轍乎諦思良久不得其情惟於審症中察其略有噯氣或時以手摸胸知飲食傷胃食滯未消方書稱為食瘧者也法當消補兼行疏通脾胃庶幾中無阻滯營衛自通俾樞機流利其瘧不治而治方以生白朮為君佐以陳半草果藿樸苓澤之屬一劑瘧輕二劑果愈足見醫家治病如老吏審案倘正案難憑當以旁情參之庶不為假證所惑也元氣不足許掄能患瘧間日一發寒時渴飲熱時汗出久治弗痊因而食少困倦予診外邪已透正氣未復掄以病苦為慮瘧未至而先恐余曰俟吾截之爾當膽壯可也令煎人參五錢生薑三錢將曙即服瘧果不至其內人小產後感觸發瘧余以補血桂枝二方合劑與之瘧雖輕而屢發不止仍以參姜二味重用按服其瘧亦止掄問生薑人參二味誠為截瘧之妙藥乎余曰非也凡病虛實多端用藥溫涼不一豈可以一法盡之且古截瘧之方難以枚舉然有效於此者不效於彼甚至因截而誤事者皆由不識元氣之厚薄邪氣之盛衰耳今子夫婦瘧邪已透經絡無阻但元氣未復且中無大寒又無內熱夫參性寒姜性溫寒溫並舉參補脾肺而回元姜通神明而去穢用以平調寒熱之疾故藥不多味而病已痊風溫暑熱許書升之媳秋深患瘧無汗一日瘧至大衄不止促余視之乃風溫暑熱合而為瘧迫蒸營中以致營中擾亂血行清道故也然而血為紅汗瘧邪當從衄解惟衄血過多神氣昏倦令取茅根一握入龍眼二十枚同煎飲之其衄遂止但肺氣未肅疏與瀉白散令其再進其家見次日瘧果不來停藥未服越數日忽然寒熱如瘧牙關不開二便阻閉氣升呃逆忙延數醫咸議中風重症無從措手余至視之知為肺氣鬱痹因慰之曰如此輕症吾一劑可愈疏與紫菀杏仁蔞皮桑葉柿蒂之屬另浸烏梅擦牙牙開進藥頃刻二便通利呃逆頓止諸醫不解歸語門人曰天氣下降則清明地氣上升則晦塞此降令不布則升令必促故經言上焦不行則下脘不通夫下脘不通則地道亦塞總之天失下降則如是耳且人身臟腑肺位最高端司清肅之權當知肺主治節原與大腸相表裡水出高源又與膀胱司氣化故二便之通閉肺之關係常多今肺氣鬱痹治節不行則周身氣機上下皆阻矣故自飛門至魄門亦阻矣爰取微苦微辛之屬用以開降肺氣令其機化流通啟其橐龠故二便自利而愈仿徐之齊輕可去實之義也似瘧非瘧三條許靜常之女于歸後患瘧數月自秋徂冬百治不效轉居母家就治於余視其面黃肌瘦唇淡口和本屬虛象閱前醫成方悉多峻補無一可投詢其病間日一發或二日一發甚或一日一發總無定期此當著眼須知脾主信今無信病不在脾胃也又詢發時或早或晏亦無定候尤屬無信且發時寒則身冷如冰熱則身熱如烙有陰陽分離之象口渴飲水面赤如朱有虛陽外浮之據及診其脈頗覺弦大當推水不生木因謂此症全非瘧疾乃陰陽不協致亢龍有悔故為似瘧非瘧耳處以八味丸全服四劑其瘧不治果愈蒙稱神治安知循古而非新裁也八味丸方見卷二虛寒門首案傅嫗於瘧疾流行之年秋將盡忽然渾身戰慄瞬息大熱煩躁熱去寒復生寒止熱復至先寒後熱心煩意躁脈來洪大無倫兩尺上湧抵指唇紅面赤喜飲熱湯舌上白苔布滿時吐稠痰甚多正內經所謂陽維為病病苦寒熱發為勞瘧證雖瘧名方非瘧治急宜引陽回宅整頓綱維大固中州陰陽調和寒熱自止以六味回陽飲為主加暖中攝下之藥是晚連進三劑寒熱頓止次早精神爽利仍服三劑間日微寒微熱復至再服原劑而痊附方地黃當歸人參附子甘草乾薑以上名六味回陽飲益智肉桂白朮澄茄半夏韻語詳批徐廷達先生瘧病按治獲愈食鱉發瘧陽虛之因先後天弱病劇纏身蹺維失固寒熱交徵非關表裡損在奇經氣虛寒至血虛熱興似瘧非瘧朝惕夕兢治宜扶陽乃中病情消散疊進病何以勝連日受困營衛失真形憔容悴面黃唇青自汗盜汗手足如冰便頻遺泄火衰明徵假瘧夜劇陽損沉淪診脈控弦明者亦驚於期時也藥不可輕甘溫之劑辰戌兩巡通陽泄濁補血益精鮮肉蘿蔔加飧可珍喜飲難禁龍眼壹瓶枸杞八兩烏豆半升窨酒十缶價值連城更有妙要養心安神遠房獨宿保命守真陽固元足福祿駢臻附方辰進首烏當歸枸杞鹿茸鹿角霜黃耆甘草戌進白朮附子乾薑葫巴固脂五味益智牡蠣棗仁甘草龍眼淫氣痹肺三條王云周之子秋間患瘧其瘧二日一發以其邪氣內藏於風府其道遠其氣深故也然病經兩月而神不衰惟發時心中寒寒久熱甚多驚一日偶觸外風以致寒不成寒熱不成熱四肢僵硬醫者不知內風召外風之理猶以歸附燥血羌防升氣乃至氣急上衝兩人挾坐不能著枕危急之頃始延余治診得便秘脈浮許以一劑可愈遂疏桂枝桔梗蔞皮蘇子杏仁紫菀把葉之藥果得便通氣平諸症皆安五弟啟明未識此中妙義問曰此症之最急處似在氣逆上衝但氣逆便阻惟有虛實兩途一則收攝溫通一則破氣攻利今不治氣而氣得平不攻便而便得通且藥味平淡而取效甚捷何也答曰此病見症雖多無非全在於肺察其瘧時心中寒多驚嘗考內經論病惟瘧最詳有云肺瘧者令人心寒注云肺為心蓋也又云熱間善驚注云肝主驚有金剋木之象也夫內風召外風最易成痹然外風既入內風必亂故寒不成寒熱不成熱夫肺主皮毛經云皮痹不已復感外邪內舍於肺因而營衛行澀故四肢僵硬也至於氣逆上衝能坐不能臥者正內經淫氣喘息痹聚在肺也蓋人身之氣全賴肺以運之今肺氣痹矣機關必窒是以肢僵便秘氣逆諸症叢集方中惟桂枝桔梗二味領風邪外出余皆輕清疏降之藥且桔梗能通天氣於地道觀其有升無降但得天氣下降而地道自通也肺氣通調而百體自舒也至於取效甚捷之義原內經所謂風氣勝者尋其治病易已也五弟退而專功內經劉正魁患瘧症先寒後熱發時胸旁氣閉喘咳不伸熱甚口渴自午至酉大熱直至徹曉微汗乃解間日依然屢治弗效余以胸痹喘急之兼症悟出內經肺瘧之例而取法治之夫人身營衛晝夜流行不息今肺素有熱復感外風則肺氣窒痹毛竅不舒經絡乃阻故發為寒熱日晡金旺之時故發熱尤甚胸膈之旁乃肺位之道淫氣痹聚則喘咳不伸法當疏利肺氣使淫氣盡達於表則內可宣通庶幾其瘧不治自愈耳與紫菀杏仁知母桔梗半夏加入桂枝湯中除薑棗一劑而安孰謂不循古而敢自用哉附王衍堂之孫年三十初起咳嗽腹中覺熱命妻煮雞子食之便覺寒凜胸緊氣急四肢發痹若作風痙之狀以後但熱不寒大便閉塞小水亦短諸醫發表攻裡作痙愈形此乃表寒束其內熱亦是內經淫氣喘急痹聚在肺之症仍以此方取用因未得汗不取芍藥之酸收大腸氣閉更加蘇子杷葉以宣肺兼入竹瀝薑汁疏導經絡以通四肢之痹一劑症減六七再劑全愈按此二症當與前治王云周之子一案參看徐錦窗先生年逾六旬患時行瘧症尚未分清醫以柴葛大黃之藥治之寒愈入里反至純熱無寒口渴飲水小水全無時欲登桶溺不得出諸醫日投四苓芩連之屬迨至神識昏迷舌白乾刺奄奄一息無從措手始延余治余曰此症之最急處全在小水不通夫溺閉雖屬下病然有上取之法東垣有云渴而小便不利者熱因上焦氣分故脈之浮數舌之白刺口之渴飲神之昏迷非熱邪蒙閉上焦氣分乎蓋上焦肺部主周身之氣司治節之權今肺熱痹清竅已窒濁竅自阻非與輕清之藥其何以解上焦窒塞之邪上焦不布降令弗行其何以望其輸瀉乎疏以萎蕤石斛知母通草桂枝杏仁紫菀杷葉一派輕清之藥果臻奇驗腫脹門肺氣壅遏陳景階內人初冬忽然遍身浮腫小溲不利醫以利水消導之藥脹滿日甚氣急不能著枕視其形色蒼赤脈象浮大獨肺部沉數舌苔灰黃以蘇葉杏仁防風姜皮四味連進二劑氣急消減再與人參敗毒散加入生黃耆與服小水通腫脹遂消緣此症時當秋盡肺氣消索天氣暴寒衣被單薄風邪內入腠理閉遏營衛不通肺氣愈塞致失清肅之令又無轉輸之權水邪泛溢充斥三焦故啟其皮毛疏其肺竅合內經開鬼門之法蓋腠理疏通天氣下降而水氣自行也人參敗毒散方見卷一傷寒門濕熱內伏陽氣不升龔甥可象時值秋盡偶患咳嗽氣急微有寒熱已服參蘇敗毒之類如故改與瀉白散一劑小水短澀漸次遍身腫滿略與導濕利水之藥更加腹脹氣促竊思治病不過表裡虛實然散之表不除清之裡反逆固非盡屬實邪又脈來弦數鼓指唇皺紅舌灰白此豈盡屬於虛其中錯雜有非一途可盡然既見寒熱咳嗽氣急尿短腹脹無不關乎肺臟肺氣受病既不服散更不容清其挾虛也審矣況時值秋盡燥金之氣已虛天令下降已極人身莫不應之今肺氣已虛便衰其護衛失其治節護衛衰風寒得以外郁治節失濕熱藉以內停由是閉而不行而肺家通調下輸之道其權已廢邪氣正氣清濁相混一概窒塞於中無由輸泄只得散越皮膚再加瀉肺利藥以致陽愈下陷陰愈上衝故見腹脹氣急診其脈來數急者乃陰火上衝之明徵矣法當疏其肺益其氣舉其陽降其陰為法中之法設使疏肺而不益氣則肺氣重虛矣益氣而不疏肺則抑鬱不開矣舉陽而不降陰則陰火不服矣降陰而不舉陽則陽愈下陷矣是必法兼四備無一可缺初欲仿補中益氣方加入知柏之屬雖有舉陽降陰益氣之能卻少疏肺開鬱之力後悟李東垣先生原有升陽益胃一法直取其方加入黃柏一味服之小水倍常乃降陰潔淨府之驗連服十劑諸症悉痊愈後遍身發瘡痍可見里蘊之熱久被表寒外束乃至內外交郁成毒緣得開鬼門之藥逼其外出不致內陷之明徵也方中參朮耆草益氣升陽也柴陳羌獨防風升陽疏肺也芩瀉連柏降陰導濕也白芍斂陰和血散中有收薑棗調和營衛補中有散一舉而諸法兼備可謂先得我心矣夫人知利藥可去濕而不知風以勝濕人知破氣以消腫而不知益氣以收腫又知發表以散邪而不知升陽亦散邪也外此以及通因通用塞因塞用寒因熱用熱因寒用上病下取下病上取陰病取陽陽病取陰醫家諸法最當素諳學者於此一案倘能類推其餘則於諸症皆可得法外之法矣升陽益胃湯黃耆人參甘草半夏白芍羌活獨活防風陳皮茯苓澤瀉柴胡白朮黃連姜棗表實上壅吳應新乃郎腋下腫痛將欲作毒瘍醫外用敷藥已愈隨忽遍身微腫其飲食二便如常復延幼科以消導利水之藥倏然頭痛潮熱腫勢甚急腎囊腫大狀若水晶飲食頓減神氣困倦更醫又議理脾利濕醫者病家見症甚暴疑而未決余謂五行之速莫如風火蓋因氣血凝滯始發癰毒未經疏散氣血不宣加以寒冷抑遏致令邪氣內攻凡陽氣被郁之症必當疏通經絡啟發皮毛庶幾肺氣宣達外則腠理舒暢內則水道通調原肺主一身之氣化也今肺氣窒塞與消導利水理脾行濕何與疏方以人參敗毒散加蘇葉防風杏仁助以熱稀粥令其皮膚津津連服二劑而消蒙稱奇治竊笑世醫一見腫症輒稱腫症多濕咸趨利水見余發汗便覺詫異曷知內經治腫諸法有開鬼門之例乎人參敗毒散方見卷一傷寒門濕熱內伏表虛下陷余玉堂幼郎因患瘡敷藥瘡愈發腫飲食二便如常延醫數手調治多日不識為瘡蠱之症無非五苓平胃之藥漸至下腫尤甚囊若水晶形似魚泡呼吸不利求治於余余思邪氣內陷必當提出於表又思病甚於下者當從舉之之義乃與升陽益胃湯按投二劑寒熱頓起若有瘧狀其家驚布余曰曏者邪氣內陷今已提出乃得表裡交爭方有寒熱相戰不致內結正佳兆耳仍令再進共計十劑始消噫世人但知熱退為病愈抑知發熱亦為病愈乎按二症邪俱在表不在裡故飲食二便無恙一則表實上壅一則表虛下陷表實非發汗不解表虛非提邪不達故治自爾獲效非寢饋東垣者曷克臻此男澍謹識人參敗毒散方見卷一傷寒門濕熱內伏升陽益胃湯方見前本門陽氣不升濕邪內陷二條傅乃謙先感風寒猶不自覺繼以飲食不節遂至腹脹面足俱浮上半身時潮下部足膝常冷目黃尿閉本屬寒濕結聚因重與柴苓湯加蘇葉治之連進數劑小水便利面部及兩手略消而下半身及腹愈加腫脹氣愈急促水囊光亮腫若魚泡因思明是風寒外郁食飲內傷理宜和解利濕合乎開鬼門潔淨府之意何上消而下愈腫沉思良久恍然悟得斯症雖屬外郁內積實由脾胃失健運之權中焦無升發之機藥味滲泄過重胃陽下降至極必當升舉其陽合乎下者舉之之義方為至理然理法雖合而方藥難定曾記東垣書有自病小便不通謂寒濕之邪自外入里而甚暴若用淡滲以利之病雖即已是降之又降復益其陰而重竭其陽也治以升陽風藥是為宜耳斯症寒濕內聚積結胃陽下降不化法當用其方名曰升陽益胃湯善哉方之名也不升陽何以能益其胃乎斯症藥品方名符合殆所謂有是病即有是藥也一劑即效連劑而安升陽益胃湯方見前本門陽氣不升吳樂倫時當盛暑陸路歸里中途發瘧其瘧每日夜發寒少熱多汗出口渴小水短赤面目浮黃舌苔堆積如粉大腹陰囊及腿脛一帶悉皆浮腫又發舊痔每日零星去血約在升余凡涼血消腫治瘧之方俱歷嘗不效按脈屬虛而症似濕熱竊瘧腫便血三症皆虛中挾熱正合內經氣虛身熱得之傷暑之旨蓋病者原因途中暑熱渴而啜瓜濕熱蘊蓄於胃三焦不化四海閉塞以致營衛失常而成斯疾必須先潔淨府以少殺其暑熱之熾順趨水道令膀胱氣化先行然後再提陽陷於陰之瘧邪從鬼門而出則腠理自和俾衛分有氣化之機營中無擾亂之苦而便血不治可自止矣於是以輕清微寒之味解暑滲濕之品方用西瓜滑石石韋丹皮通草服至二劑小便甚長身腫消退隨以清暑益氣湯除蒼朮連服旬日果然三症頓愈所謂病變雖多法歸於一之驗也清暑益氣湯方見卷一傷寒門一得集脾腎陽虛二條傅孔怡病纏服藥十有餘載初起腹痛時脹得食身重時愈時發漸次而甚舊冬足跗有浮氣至春通身浮腫腹皮脹滿腹中鳴響上氣喘急胸前塞緊食飲不運左腎睪丸吊痛遍身之病自難名狀三楚名劑歷嘗不瘳買舟歸里待斃而已邀余告曰今請先生為我決一逝期耳余曰此為單腹脹證古賢皆曰難治病源本深但今診其脈尤有和緩之意可知胃氣以及真陽尚有微存是為先天稟賦之厚急進大藥尚屬可治經曰陽氣者若天與日失其所則折壽而不彰今陽氣所存無幾全是一團陰氣混擾其中所以腹中鳴響哇哇之聲皆陰氣漫彌也陰氣盛則中州無光土被浸潤泥滑矣所以飲食不運胸緊腹鼓者皆土病也至於吊疝跗腫乃命門火衰之徵而上氣喘急由乎腎陽為陰所迫無根之氣端往上奔為症如此安之固之尚且不暇何醫者見病治病不明塞因塞用之法希圖目前之快任行攻伐使非先天稟賦之厚真陽早已撲滅矣吾今許以可治者以崇土為先而土賴火生又當以治火為急火旺則土自堅土堅而萬物生矣火旺則陰自消陰消而陽自長矣方既立何孔翁疑藥之重畏術之補余曰前被劫藥之誤豈可猶陷前轍今僅留殘喘豈能遷延時刻比之黃河壩倒豈擔石培土所能豎立而用燥藥者譬之賊兵鼓眾雖選強與敵使非銃炮為之前焉能直突營圍因親驗其藥面視其服而猶藥輕病重三服始驗告余曰服白朮之攔阻胸前反寬腹中之氣竟走肛門而出余曰此正云開霧散日將出也以後服五十劑毫不改味而腹脹足腫始消七十劑遂奏全效可見陽氣存留得於先天稟賦之厚者終克有濟也附方白朮巴戟附子乾薑熟地炭當歸骨脂葫巴澄茄小茴香肉桂沉香余毓賢堪輿為業冒暑登山因而瘧痢交發醫者不究其勞惟責其暑凡胃苓香薷芩連之藥數手雷同乃致瘧痢未已而氣急腫脹日增延余治時敗症百出忙以補中益氣金匱腎氣日夜交斟按治三日瘧邪不至痢轉滑泄似乎大有起色然細揣尚有三不治焉蓋水腫症脈宜洪大今見沉細一也且囊與莖俱腫二也又滑泄而腫不消三也以此告辭求治不已勉力處治潛思火土傷敗非大劑破格何能逆挽用六味回陽飲加白朮骨脂肉蔻兼進硫黃丸日進三劑按法不歇五日之久病全不減扶至十日附術各進兩斤硫黃丸已下九兩始覺氣急略平便轉溏糞再經旬日進藥不輟方可著枕便堅溺長脈稍有力皮膚始露縐紋旋以歸脾湯吞八味丸再經月餘始克起死而回生也歸脾湯方見卷二虛寒門誤表亡陽八味丸方見卷二虛寒門首案六味回陽飲方見卷二內傷門寒熱如瘧脾虛肺壅汪廷選秋間患瘧發表後疊進附桂理中湯已獲小安惟瘧邪未曾全止急求止截余曉以養正邪自除之義竟私取截瘧膏藥貼背瘧邪雖止漸加浮腫腹脹玉莖腫亮狀似魚泡咳嗽氣促呻吟不已視形容面色舌苔脈象俱屬大虛擬以火土傷敗與朮附薑桂按服數日色脈如原莖腫尤甚改進五皮飲重加苡仁桑皮與服俾得溺倍於常莖腫乃消此症原是脾肺兩臟氣化不行水壅經絡泛溢皮膚徒然益火燠土與皮膚無涉故諸症自若而莖囊原為聚水之地故腫尤甚水溢皮膚以皮行皮之義故腫乃消可見醫貴圓通不可執一也五皮飲五加皮地骨皮桑白皮大腹皮生薑皮腎虛水泛陳敬齋先生年逾八十身體堅強聲音洪亮耄年尚御女不輟舊冬曾舉一子其先天稟賦之厚可知邇值春升面足帶浮語言不利惟眠食猶安諸郎君各延一醫調治咸稱脾腎之虛理中腎氣諸方疊投益甚漸加氣促不能著枕遂謂高年重症無藥可治停藥數日而病益進托友轉請於余余至扶診脈頗浮大遍身腫而面部尤甚語言壅塞涎唾自流予想從來腫症未聞有言謇流涎之例言謇流涎惟中風有之奈何腫症亦有之乎默思內經病機篇云有病腎風者面跗龐然壅害於言緣邪之所湊其氣必虛大凡水病多有由於腎虛者況高年稟賦雖厚而下元已衰或加房勞驚恐俱傷腎氣值此春升風木司令下虛不納腎液奔騰昇越於表適逢風襲中於廉泉舌根下兩旁穴故面跗龐然而兼壅害於言也處以歸杞附桂白芍抑風而制腎水微加辛防獨活用之流利經絡稍開鬼門以逐邪一劑下咽竟獲熟睡小水倍常再劑腫消語言清爽流涎亦止可見聖人之法不可不熟而深求也食停中焦聶錦章乃郎八歲體素堅實葷膩雜進以至面浮腹脹腳腫喘促猶然恃其強盛惜金勿藥迨至鼻血譫語便艱溺短付醫施治屢用連翹茯苓枳殼輕套之藥胸前愈緊脹滿愈加四肢倦怠奄奄一息乃延余診知為停食中焦轉輸未能以至肺氣壅塞蓋脾主運行肺主治節二臟俱病勢非輕渺奈何醫者病重藥輕全無相涉今五實全具非下不除於是以小承氣湯推蕩臟腑壅塞加以疏肺瀉熱之藥數劑始消後因誤食索麵脹滿復作喘促仍加與木香檳榔丸數服即清隨以六君子湯加草果枳殼調理而愈附方熟軍厚朴枳實三味名小承湯蘇子芥子杏仁黃芩梔仁萊菔子木香檳榔丸木香檳榔青皮陳皮枳殼黃柏黃連莪朮山稜大黃丑牛香附芒硝一得集附截瘧成脹楊志榮躬勤力作感冒風寒變成瘧疾自取截方服之果愈越三日胸腹飽悶時現寒熱更醫數手崇事消導延至胸高氣急脹痛交迫手不可觸臥不安枕始請余診視其色如飢聞其聲先重後輕問其苦晚間尤甚切其脈浮大無力知為苦寒攻伐傷中謂曰爾必先服檳榔枳殼其時痛尚可忍後服大黃枳實脹不可當榮曰先生何以知之余曰合症與脈而知之也近世見病治病不用破氣攻下者鮮矣疏以治中湯而重其劑服下半日脹痛未減亦不覺增然腸胃間已漸漸稍舒繼進二劑即可安睡二便通快如常越日復視惟四肢無力胸喜推摩更方以附子理中湯數劑全愈又以附子理中丸數兩而健此正嘉言先生所謂健脾中陽氣第一義也理中湯人參白朮乾薑甘草本方加青皮陳皮名治中湯治腹滿痞悶兼食積者脾腎虛寒織郎侄長兄之次子也素有腹滿食少之困然行動如常未曾加意調攝偶因飲食不節延成瘧疾醫以傷食治之更加下痢紅白又以柴芍芩連木香地榆之屬疊進轉至裡急後重瘧則間日夜發痢則一晝夜數十次兼之噤口不食額冷時汗惡症叢生予見逆症紛更攻補兩難惟憑唇淡舌白足徵臟腑陰寒逕用理中加芍桂一劑如故再劑仍然但藥雖未效而病情已中適侄岳翁程邀一醫來用補中益氣法意欲以升舉脾胃瘧痢交治未始不無卓見只置陰陽之理剛柔之用不講耳姑從權進一劑是夜瘧發雖輕而下痢後重尤甚豈此升舉一端可盡耶予於是又擬理中重薑桂加白芍吳萸一日二劑俾得大勢稍減按服二日瘧亦不至飲食漸進惟下痢純白而已驗唇舌淡白如故口仍不渴毫不為辛熱所偏竊喜此病思過半矣越日傍晚驟然神疲氣怯胸腹鼓滿兩脅俱脹充斥腰圍因思仲景有經病暴變之文法皆秘而不宣內經有暴病非陽之旨俱指陰邪而言仍推原意用理中去參加附桂苓澤以進如故再用肉桂研末調服迨至子丑時腹中呱呱作聲瀉下穢水二三陣諸脹漸消神爽思食足徵腹中之患皆陰邪瀰漫之氣雖藉藥之辛溫猶待天之陽闢始克有濟也於此益悟嘉言先生所謂地氣混天之理非臆說矣古稱痢病轉瀉是腎病傳脾為向愈之機善後果未雜他歧到底辛熱溫補成功非不治瘧而瘧自止不治痢而痢自愈乎愈後半月始聞病變之日竟吃柑橘豆腐等物忘而弗告使余背地苦想幸獲苟全差免不恭之咎也願醫者鑑諸
