body:
  text: 卷五産後門腹脹便閉二條孫康泰內人産後一日畏寒發熱惡露不下滿腹作脹手不可按二便俱閉胸緊氣迫危急邀視知為産後受寒所致蓋血得寒則凝泣而不行非溫不通先與失笑散二錢次進黑神散重用薑桂加漆渣山楂急煎與服頃刻小水先利汙水隨下腹始稍寬氣始稍平是晚再進一劑大便甚通次日泄瀉不止腹痛口渴當斯時也於泄宜補於痛宜通是通補兩難立法詢知臨産食雞湯過多緣腹中所蓄瘀血今得溫通腹中宣暢惡露已從前陰而下食滯又從後陰而出津液暴失宜乎口渴然喜脈無洪大神不昏迷許以無憂但身中之津液下泄精氣不騰之症當從釜底暖蒸庶幾氤氳徹頂疏與苓桂骨脂薑炭木瓜甘草投之渴瀉腹痛俱止黑神散地黃當歸赤芍蒲黃桂心乾薑甘草黑豆童便失笑散蒲黃五靈脂等分醋調服周秋帆茂才之內人産後惡露甚少腹大如箕自言作脹小水甚長大便不通儼似蓄血之症但口雖渴喜飲熱渴兩尺脈亦軟濡可知血寒凝滯投以黑神散不應更醫用大黃紅花枳殼之藥腹脹愈甚腹堅如石再求余治知為寒邪凝結必當溫通連進附桂乾薑歸芍似脹稍寬疊投二日已經四劑而惡露不下竊思舍此溫通之法決無破血可進然非血行脹何由消考古治虛損吐血逐瘀之法有花乳石散之例能化瘀血為水不動臟腑可引以為用遂煎米飲調服二錢少頃腹中氣響前陰出穢水甚多大便亦通疊進前藥脹消一半惟腹右稍堅十指攣急足亦時僵此氣血虛寒今始大露改進理陰煎重加附子諸症悉瘥後進養榮湯數十劑調理全安人參養榮湯方見卷二虛寒門誤表戴陽按花乳石散局方治氣虛血凝瘀積壅聚胸膈作痛宜用重劑竭之花乳石五兩産硫黃山中狀如黃石有黃點如花之心故名近世皆以玲瓏如花乳者偽充欲試真偽煅過置血上血即化水者真硫黃二兩上二味同入煬盛罐內鹽泥封固煅一伏時研如面每用二錢食遠童便調服婦人産後血逆血暈胞衣不下或子死腹中俱宜服之瘀血化為黃水然後以獨參湯調之男澍謹識少腹絞痛周吉人先生內人冬月産後少腹絞痛諸醫稱為兒枕之患去瘀之藥屢投愈重乃至手不可觸痛甚則嘔二便緊急欲解不暢且更牽引腰脅俱痛勢頗迫切急延二醫相商咸議當用峻攻庶幾通則不痛余曰形羸氣餒何勝攻擊乃臨産胎下寒入陰中攻觸作痛故亦拒按與中寒腹痛無異然表裡俱虛脈象浮大法當托裡散邪但氣短不續表藥既不可用而腹痛拒按補劑亦難遽投仿仲景寒疝例與當歸生薑羊肉湯因兼嘔吐略加陳皮蔥白一服微汗而愈得心應手之妙不知其然而然者有矣當歸生薑羊肉湯黃耆人參當歸生薑羊肉煮汁煎藥如惡露不盡加桂行血潮熱腹痛二條吳元初室人産後三日潮熱腹痛八珍五積之屬輒投不效反致潮熱愈盛腹痛愈增至第七日口瘡唇爛有以為實火者投芩連不納有以為虛火者用附桂亦嘔遂至厄噦神昏人事大危諸醫袖手余謂此症唇口雖爛然喜飲熱湯臍腹雖痛而手可重按顯系內寒外熱第寒熱拒格藥當偷關而過所謂求其屬也宜與理中先調其胃法取小丸二兩半青黛為衣石膏為衣或呷或吞任其緩進蓋仿長沙白通加人尿豬膽之遺意也藥下果得胃安不嘔隨選八味地黃湯以導陰火熱收痛止而安八味地黃湯方見卷二虛寒門首案吳顯余內人小産後腹痛夜熱咳嗽醫者作瘀血治之遂爾腰屈不伸痰多食減又以理中四物之屬投之致今夜熱大作少腹極痛脈來遲緊帶弦因謂之曰此中虛而血寒也四物泥膩非痰多食減者所宜理中壅燥豈夜熱咳嗽者能任遂疏黃耆建中湯疊進而安黃耆建中湯方見卷二內傷門泄瀉不食嘔吐脅痛陳飛雲學博之女産後兩月忽然戰栗左脅微痛胸中窒塞屢進表散之劑寒栗愈盛嘔吐清水時值天氣炎熱諸醫莫辨虛實招豫視之診其面色紅中帶青脈象甚微久按覺弦細揣知為久寒在血其左脅微痛是肝氣鬱而不伸肝挾相火是以面色青紅木邪侮土是以胸中窒塞嘔吐清水因思厥陰中寒相火內寄非發表溫經病必不解但發表宜兼養血溫經最忌助陽宗仲景治厥陰久寒之例與當歸四逆加吳萸生薑藥下立安當歸四逆湯方見卷二虛寒門首案寒熱如瘧蕭洪元室人産後偶然寒熱如瘧醫以外感投五積散不效洪元自知醫理又與黑神散不應更醫以為血虛進八珍湯是夜潮熱煩躁次早口乾舌裂又用歸芍芩連服後火勢愈騰唇口愈燥咽喉窒痛胸腹脹迫燥渴異常脈來洪數按之亦皆鼓指內外一占嚴然大熱之象但臨産艱難神氣固喪且血下甚湧陰營亦傷思人身陰陽相抱始得資生今陰精內竭孤陽外擾若非滋液斂神之法勢必陰亡陽滅而已因處大劑理陰煎加附子五味另用龍眼二斤熬湯攙服服後寒戰重復不減唇舌俱淡乃陽微之狀已彰但明知産後血枯陰涸且脈形未斂尚不敢偏行辛溫確守前意滋液斂神甘溫到底而安按婦人産後血虛發熱燥渴諸症愚曾用理陰煎重加薑炭而安蓋産後血奪陽無所依浮散於外薑炭散虛熱之上品引血藥以生血之靈丹也男澍謹識理陰前方見卷二虛寒門誤表戴陽譫語發狂二條戴琪圃室人小産後業已越月忽然渾身戰栗卒倒無知目瞪手散半晌略醒旋發強言或罵或笑或歌或哭一日兩發驅風養血之藥投之無算而病不少衰延余視之見其産後久病猶氣旺神充因笑曰病之情由吾深得之戴曰何謂也余曰令正之稟必素多肝火前之小産必因多進補劑以致血得熱則沸騰而下産後身中之火未息衝任之血未安胞宮之穢未盡則汙瘀之血勢必從火勢而衝心胞以致神魂狂亂稍頃火降而人事清移時火升而神機似亂矣故病發時渾身戰栗者正內經所謂諸禁鼓栗如喪神守皆屬於火病經兩旬若謂血虛風動安得久病而神不衰耶用鐵落飲合當歸龍薈丸加漆渣桃仁花乳石下汙血一片而神清病愈世知藥能治病抑知藥能治鬼乎近時通弊尤屬可笑故記之周捧書乃室小産後數日惡露如崩胸緊腹脹氣迫窒塞怒目而視人事大困自言見鬼於前余臨其帷猶用法師敕符噴水燃火叫喊余見之大為驚駭蓋知其心陽將脫也急以耆朮鹿茸薑炭棗仁五味龍齒約重斤余捧兄以産後瘀血且因天令亢熱疑不敢用因面令煎服進藥時神氣憤亂目已半合身已將僵余為驚怖蓋恐其藥之不及也亟為灌完隨合復煎一劑更服毫不為動於是又煎一劑服之而神少醒自云身非己有渺茫不知所從蓋神魂尚未歸宅之驗耳更加五味一倍又服一劑是晚神魂略安猶然時驚時惕時恐時昏不敢開目次早脈猶未斂按之豁大如空下血痰少仍與前方連進一劑始敢開目飲食大進忽然腸中作痛下血水腥臭不堪意者果有瘀乎於是原方加澤蘭益母生蒲黃肉桂一劑下出朽腐白肉一團衆婦不知何物余曰此雙胎也婦視之果然痛始除脹始消隨以歸脾湯加鹿茸薑炭肉桂連進十劑而健初視時舌白脹滿塞口外以蒲黃乾薑末搽舌遂縮如原譫語自汗黃杏簾先生之媳體氣孱弱素稟肝火且針黹書畫日夕勞神今秋産後即下榻如常因目中覺燥自取舊方藥只熟地白芍二味立時惡露頓止目瞪反張逾時方醒醒而復發昏夜邀視合室驚惶坐視片刻連發二次醒時忽言見鬼一身戰栗余診兩脈幸無洪大知為神魂不藏隔壁喊叫聞之則發探病客至見之亦發立時怒目上視十指緊撮牙關隨閉面若塗朱汗出如雨片時之久稍嘔微涎人事復清余坐二時之久已發三次家人咸稱邪祟又議惡露上攻余曰聞聲則驚見生人則惕顯屬正氣大傷因生懼怯且惡露雖止腹無著痛實因芍地酸寒凝滯之故惟有收斂溫通一法尚何惡露可破邪祟可驅哉重用參歸薑桂龍齒五味茯神鉤藤龍眼疊進不輟其勢漸緩惡露隨下而痊或問曰病因血止而變今用補血而反通者何耶答曰素問病機篇云血氣者喜溫而惡寒寒則凝而不流溫則消而去之耳腹痛自汗吳應新內人産後寒熱腹痛諸醫以芎歸加入行瘀之藥兩投愈痛人事困頓余以血虛腹痛當溫養血液疏以理陰煎畏而弗服明是血虛發熱氣虛生寒之症誤以時行瘧症之治以致大汗如洗衣被皆透舉室慌亂復延余至原知産後津脫之症未敢輕許可治所喜脈無躁擾神明未亂亟以大劑人參養榮湯疊進三劑外以五倍末津調敷臍其汗稍收而寒熱乃除惟腹痛既非瘀血必是內寒無疑但血去液傷辛溫難進爰擬交骨未縫寒入陰中仿仲景産後腹中㽱痛屬寒疝之例與當歸生薑羊肉湯服下腹痛果除後數日又因換衣觸寒寒熱復起舌心灰黑與理陰煎加附子一劑寒熱雖熄而大汗仍來重進養榮湯三劑不應外以蕎麥粉撲之汗亦不止余甚躊躇其家以為尸汗咸稱不治余曰藥雖未效症尚未變且脈亦甚微亦屬吉象仍將原訂養榮湯用五味子八錢外以龍骨牡蠣粉撲之其汗稍息復將原方晝夜三劑其汗始收舌黑始退自云心多驚怖猶是血去液傷重進歸脾養心數十劑始健養心湯黃耆茯苓茯神當歸川芎半夏柏仁甘草棗仁遠志五味人參肉桂當歸生薑羊肉湯方見前本門少腹絞痛口渴自汗吳鶴皋乃室是臨川陳祥光之女産後兩旬忽然汗出二日醫治數日身熱煩擾口乾發渴祥光因鑑媳婦之誤命也請診而任其治焉視其舌光如鏡邊刺紅燥身熱烙指汗出黏手口雖渴而熱渴不畏脈雖洪而重按無力可知汗血同源內液枯涸之故非收神斂液勢必神喪而亡急用黃耆桑葉麥冬五味四味同煎不雜他味者蓋仿血生於氣水生於金之意也直進十餘劑而康祥媳誤案附虛寒門誤表氣脫五更泄瀉吳樂倫乃室年近四旬素患小産每大便必在五更服盡歸脾四神理中之藥屢孕屢墮今春復孕大便仍在五更諸醫連進四神丸不僅解未能移並且沉困更甚商治於余診畢樂兄問曰拙荊虛不受補將如之何余曰此乃八脈失調尾閭不禁病在奇經諸醫叢事臟腑腸胃藥與病全無相涉嘗讀內經骨空論曰督脈者起於少腹以下骨中央女子入系庭孔又曰其脈循陰器合纂間繞纂後別繞臀由是觀之督脈原司前後二陰尊閫督脈失權不司約束故前墮胎而後晨瀉也又沖為血海任主胞治治之之法惟有班龍頂上珠能補玉堂關下穴但久病腸滑恐難以盡其神化當兼遵下焦有病人難會須用餘糧赤石脂如斯處治絲毫無爽五更之泄今已移矣十月之胎今已保矣內經一書可不讀乎按四神丸原為五更火衰泄瀉而設今施於下虛關滑宜乎不中肯綮矧五更為諸陽之會八脈之聚非專固奇經烏乎有濟而餘糧石脂二物人皆泥為重墜傷胎今反不然者內經所謂有故無殞亦無殞也男澍謹識陰菌下墜桂煜堂內人因取乳服藥患陰菌下墜足腹腫滿又誤治半載忽變口噤舌縮諸醫無從措手延余診脈六部按之全無似屬不治蓋心主血脈舌為心苗有內外交絶之象然呼吸調勻神明未亂面無雜色均非死候因原其始而求其理婦人兩乳乃衝任所關故乳汁與月水相應誤投下乳之藥衝任大傷以致子宮脫出又因誤治腎氣散越而為腫滿按少陰腎臟位雖居下然其脈常縈舌本今氣已墜散脈道不能上朝故脈不至而舌本不能縈也此際收攝之法有斷然必用者矣遂處大劑養榮人參湯重加鹿茸艾葉頻進旬日新舊諸恙統獲痊安噫醫可不求其理哉人參養榮湯方見卷二虛寒門誤表戴陽崩漏二條丁桂蘭內人年近五十得崩漏之病始則白帶淫溢繼則經行不止甚則紅白黃黑各色注下綿綿不絶遷延五載肌膚乾瘦面浮跗腫胸脅作脹穀食難進所下已有腥穢自分必死所喜脈無弦大可進補劑然閲前方十全歸脾之藥毫無一效竊思婦人久崩調補氣血不應必是衝脈損傷考內經逆順篇以沖稱血海又為五臟六腑之海又云衝脈起於胞中而胞中原屬命門因推人身自頭至足腹前背後無不稟承於命門以海為百脈之宗經絡發源之地然非獨血海為然也即氣海髓海水穀之海亦皆稟承於命門與人身氣血之盛衰大有關係再考內經於胸脅支滿妨於食時時前後血必因少時有所大脫血或醉入房氣竭肝傷此症雖非醉犯房勞必當年産後胞戶未扃房室不慎損傷衝脈可知夫沖既不蓄則諸脈皆廢不用有職無權由是任脈不為之承任帶脈不為之帶束督脈不為之統督陰陽蹺維不為之擁護故身中之精華散漫無統無所稟承不及變化所以諸般顏色之物注於沖路而下譬之漏卮不竭不已也所服參耆歸術計非不善但甘溫守補豈能趨入奇經仿內經血枯血脫方法特製烏鰂丸義取鹹味就下通以濟澀更以穢濁氣味為之引導參入填下之品立成一方似於奇經八脈毫無遺義且令其買閩産墨魚間日煮服亦是同氣相求之意如此調理兩月按日不輟五載痼疾一方告痊後黃鼎翁之內悉同此症但多有少腹下墜未勞思索徑取前方加黃耆而痊附方熟地枸杞蓯蓉鹿角霜故紙茜草牡蠣鎖陽海螵蛸桑螵蛸鮑魚湯煎按內經四烏鰂骨一蘆茹丸素問治氣結肝傷脫血血枯婦人血枯經閉丈夫陰痿精傷烏鰂骨四兩即烏賊骨蘆茹一兩本草作蘆茹即茜草丸以雀卵大如小豆以五丸為飯後飲以鮑魚汁利腸中及傷肝也竊憶內經之方不多見除此方外惟有治心腹滿旦食則不能暮食名曰鼓脹之雞矢醴一劑知二劑已其方用羯雞矢乾者八合炒香以無灰酒三碗煎至一合濾汁五更熱飲則腹鳴辰巳時行黑水二三次次日覺足面漸有皺紋又飲一次漸皺至膝上則愈及陽氣盛陽蹺之脈不得入於陰陰虛故目不瞑之半夏湯以千里長流水揚萬遍取五升半夏五合煮為升半飲一小杯稍益以知為度覆杯則臥汗出則已而已一劑知謂藥病相知猶言藥與病合二劑已謂病已除也男澍謹識一得集附妄見妄言傅補軒內人産後匝月忽患四肢僵痹呼號鬼神衆驚以為邪祟禱之不靈召余往診脈得右大左伏面青唇白舌苔邊白中黑兼之久未更衣小便短少按此症舌心滯黑便閉溺短當推實熱例治然無口渴痞滿之患舌黑而滑四肢僵冷當推虛寒例治而脈候又非微細遲弱復於色竅細審面青目瞪似屬肝邪為患居多且左脈隱伏應有綢繆鬱結之情原肝為剛臟體陰而用陽魂被火迫外遊故探病客來未至先知虛症亦有肝不藏魂能知宅外之事而婦人産後血虛尤多此證宜養榮湯之類者況肝主筋熱盛筋急故目瞪上視四肢僵痹也又肝主疏泄臟病聯腑故便閉不通也此則肝氣憤郁足為明徵補軒與余素契執前醫方來閲皆參甘歸杞守補之味大概泥於左脈不見惑于丹溪産後當補氣血一語似於憑症審視之道尚未盡善補軒信余甚篤並述右乳腫痛已經數日原乳房屬陽明乳旁屬厥陰經曰營氣不從逆於肉裡乃生癰腫故見症於陽明厥陰之部分又肝之為病足為明驗直疏以逍遙散合龍薈丸進退酌用是夜連進二劑譫語肢痹俱止惟於天曉時前症欲萌旋爾又止是得前方疊進之力設認症不確小劑暫試勢必病重藥輕前症復萌定歸咎於藥之不當又作更方之想則失之遠矣其前症欲萌於天明時者乃肝木旺於寅卯故也後又將原方加疏肝導氣一劑諸症潛消視其乳房果紅腫迸迫欲作膿潰之勢繼將原方加公英香附白芷托裡排膿果得出膿一碗腫痛悉瘥只經數日尚未更衣渠母促用通劑余以下不嫌遲遵王道之治立方用五仁以代通幽連進數日大便漸通未症亦漸以除未費調補而安此雖余臨症審治之不差實補軒信余之不差也倘補軒任前醫參甘穩當之方勢必肝氣愈結四肢漸變厥逆指甲皆青神識愈見昏憒舌卷乳縮有之而參附薑桂又安能禁之不用值此錯亂紛更則余亦無所適從矣逍遙散見卷一傷寒門陰陽易症當歸龍薈丸見卷二癇厥門肝火生風
