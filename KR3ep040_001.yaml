body:
  text: 卷一傷寒門陽症似陰吳雙龍乃室得傷寒病信巫不藥漸至潮熱大作胸前板結譫語耳聾數日未食猶不服藥遂爾神識昏迷眼翻牙緊合室驚惶延余治之脈得細澀十指微冷面色黃白問之不飲湯水潮熱時有時無儼然虛極之象細審此症寒邪成熱為陽其返成陰候者古人謂大實有羸狀即此類也又河間云鬱熱蓄盛神昏厥逆脈又滯澀有微細欲絕之象使投以溫藥則不可救矣蓋其初原因傷寒失表遂入於裡寒鬱成熱熱極變寒理宜表裡兩解治以柴胡薄荷菖蒲大黃枳實甘草等味急服兩劑連泄三次潮熱大作口反大渴知其里舒熱出三焦經絡之熱法當清之以竹葉石膏湯四劑而安竹葉石膏湯仲景竹葉石膏人參甘草麥冬半夏粳米生薑誤下嘔泄危廷階年二十始病發熱惡寒進表散藥二劑汗已大出熱仍不解更醫又用柴葛解肌之法反增氣逆乾嘔胸前板結一醫進大柴胡湯一劑遂爾腹中雷鳴利下不止其父亦知醫理邀集同道相商交口當進七味白朮散余獨議曰仲景云胸中實下利不止者死其父惶悚諸醫默然余又曰此真謂之死症耶但症極險耳俟吾以法治之二劑可收神效其父且驚且喜及見疏方乃生薑瀉心湯又疑芩連不服余曰此症吾揣摩有素非一時之擬用也服下果然嘔熱頓止但渴泄未止更與甘草瀉心湯嘔利隨止歸語門人門人不解因誨之曰此症頭緒錯雜無非汗下傷胃胃中不和客氣上逆伏飲摶結聚膈夫胸前板結即心中痞硬也胃虛火盛中焦鼓激以致腹中雷鳴蓋火走空竅是以上嘔下泄也生薑性溫善助胃陽甘草味甘最益胃陰因仿長沙之訣汗後胃虛是陽氣外傷故用生薑之溫以助陽下後胃虛是陰氣內傷故用甘草之甘以補陰藥僅更一味意則有二先後兩劑欲起一生於九死者敢操無師之智哉門人問曰甘草補陰止利之義先賢開導來學但此症胸前板實生薑散滿固其宜也吾師復用甘草獨不慮其資滿乎答曰甘草味甘補土土健而滿自除也況施火性急迫陰氣不守之症耶且甘草之功用甚長惟仲景之聖方知舉用試觀發表藥中如桂枝麻黃大小青龍輩必用甘草者欲以載邪外達不使陷入陰分也若邪入里必無復用甘草之理如五苓承氣陷胸十棗諸方俱不用也至桃核調胃兩方以其邪兼太陽尚屬用之若陰血大傷竟重用甘草以復脈可見前賢用藥取捨自有法度而後之葉天士黃宮繡輩每視甘草為畏物致令良藥見屈固不識此取捨之妙又不察資滿泄滿之意也又問曰土健而滿自除則凡滿症俱不必忌乎曰非也陰氣內盛之滿法所必忌陰氣下亡之滿法所必施如發表藥中之甘草必不可少攻利藥中之甘草有斷不可用者舉一隅不以三隅反則不復也半夏瀉心湯仲景治傷寒下之早胸滿而不痛者為痞身寒而嘔飲食不下非柴胡症半夏黃芩黃連甘草人參乾薑大棗本方除人參再加甘草名甘草瀉心湯本方加生薑名生薑瀉心湯凡用瀉心者皆屬誤下之症非傳經熱邪也誤下脹滿何挺芳患傷寒病服表散藥而頭痛身痛發熱惡寒諸症已除可知表邪固解惟大小便不利咳唾多涎醫者不察拘於傷寒法中有表邪既除里邪可下之說誤與承氣一服遂至通腹反滿嘔逆上氣前醫再視駭然辭去余視口不渴身不熱且脈來弦滑知無熱邪實結在裡不過痰飲阻滯腸胃承氣苦寒徒損胃氣以致傳化失常濕邪不走痰飲愈逆故胃氣愈亂脹滿愈增也當取五苓散重桂化氣利濕加入陳半甘遂和中逐飲一劑二便俱通病者立時精神爽利未勞再劑而愈蓋氣化濕走又病機中當以小便不通之為標急也五苓散仲景豬苓澤瀉茯苓白朮官桂誤治傳經龔初福初起畏寒發熱腹痛而嘔醫以柴胡當歸之屬治之更加大熱繼以藿香砂仁溫中之藥愈加沉重以致人事昏憒言語聲微通身如火然發熱猶衣被不離四肢時冷有如瘧狀時忽痛泄晝夜不寐欲服歸脾理中藥未決與余商余診之曰此症全為藥誤病之初起原是太陽腑症若以五苓散投之得非對症之藥乎奈何以柴胡引入少陽當歸引入厥陰病劇又誤以藿砂香燥之藥而劫其膽之津液以助其火又安得寐而乃以久病體虛欲服歸脾理中之劑豈相宜耶夫寒邪鬱而成熱顛倒錯誤已成壞症理宜急通經絡而兼以直降其鬱火庶幾寒去而熱除熱除而人事清人事清而寤寐安矣以仲景附子瀉心湯附子以通經芩連以降火正合其宜乃渠猶畏芩連之涼竟不肯服力爭之一劑大便下泄小便紅赤再劑諸症悉除惟不寐加入溫膽湯四劑而痊附子瀉心湯大黃黃連黃芩附子溫膽湯陳皮茯苓竹茹半夏甘草枳實或加薑棗陽邪入里吳秀華時值秋盡頭痛畏寒略有潮熱食減便泄來寓索方予視面色晦黑舌色乾裂因告之曰內有濕熱外感風寒當節口腹免成瘧痢疏與小柴合平胃與服病已霍然殊伊歸里房室不謹食物不節瘧症果起其瘧寒少熱多自汗口渴不能自支自服理中丸次日瘧發頗重延醫稱為熱症與石膏知母之屬熱勢雖輕卻無退刻乃熱邪內陷非熱邪外解果然裡急後重下痢紅白相兼煩渴譫語其勢轉重延予視時人事昏惑細按其脈弦數勁指重按有力上則嘔逆胸滿下則後重逼迫中則腹痛拒按且身雖發熱尚有頭痛畏寒此熱邪內陷氣血怫鬱充斥三焦故有譫語妄見是表裡內外交困棘手重症矣反復思議非表裡交攻之法勢所難挽與仲景治傷寒發熱汗出不解陽邪入里熱結在裡表邪未除里邪又急之例相符處以大柴胡湯寒熱紅白頓除譫語亦息仍與前湯除枳實再進而安後與甘寒而健噫聖人之法布在方策倘能尋其端倪而起一生於九死者豈非仲景之徒哉大柴胡湯柴胡半夏黃芩芍藥枳實大黃薑棗失表發黃二條仁元傭工也躬耕田畝年及半百時值暑月發熱畏寒未藥已痊漸次肢體怠惰頭腰重墜通身帶浮面色黃唇舌指爪皆白二便如常告於余余曰此乃太陽病未經發表邪陷肌膚之中非濕熱發黃之證也次早診脈按得三部浮緊而數時或喘咳復告余曰已服黃疸草藥頭上如蒙腰間愈重四肢忽麻胸前時緊余曰昨之所擬更無疑矣以仲景麻黃湯加厚朴連服四劑每劑令啜熱稀粥以助藥力俱得微汗頭腰方輕症稍減然脈象仍如前與五積散一料藥完而病愈矣五積散白芷陳皮厚朴當歸川芎芍藥茯苓桔梗蒼朮枳殼半夏麻黃乾薑肉桂甘草蔥棗麻黃湯麻黃杏仁桂枝甘草王富春新婚匝月得太陽傷寒病頭痛發熱畏寒誤用補劑邪無出路遍身骨節疼痛滿頭大汗熱蒸其面目如橘色之黃其小便如梔子之汁所服皆清補疏利勢愈迫切諸醫技窮始延余診幸脈無陰象腹無滿結胸無嘔噦謂曰此症雖危吾一劑立愈其家且疑且信服之果然原仲景傷寒論中有太陽病失汗一身盡痛頭汗發熱而黃者有麻黃連翹赤小豆湯之例蓋發汗利水令郁拂之邪表裡兩解之意耳附王富春愈後其妻一日微覺颯颯寒熱少腹疼痛小水緊急欲解不出痛甚牽引腰胯兩目花亂頭重莫舉其家見症急厲告諸母家諸醫群集曰寒曰火莫辨其症余曰小腹痛引腰胯小便不利頭重眼中生花豈非陰陽易之症乎處逍遙湯調燒褌散藥下果驗按陰陽易症男病新瘥與女交其病遂遺於女女病新瘥與男交其病遂遺於男故名褌褲襠也男澍謹識柯韻伯先生云此證無內外因本非傷寒而冠以傷寒者原其因也因淫情之不禁而餘邪得以乘其隙而移患於無病之人頓令一身之精氣神形皆受欲火之害是不病於傷寒而病於陰陽之易故未可以男女分名也夫邪之所湊其氣必虛陰虛而淫邪湊之故少氣颯颯寒熱不能運軀頭重不舉身體皆重精神散亂故眼中生花邪中於陰故陰中拘攣痛引腰胯少腹裡急小便不利耳諒非草木之味所能愈仍須陰陽感召之理以制之斯褌襠之以意相求也褌襠者男女陰陽之衛陰陽之以息相吹氣相聚精相向者也衛乎外者自能清乎內感於無形以之治有形故取其近陰處燒而服之形氣邪感得其隱曲小便自利乃清陽出上竅濁陰歸下竅而諸症悉除矣然女病可服男褌男病亦可服女褌仍合陰陽交易之理格物之義至穢之品為至奇之方愚謂前賢用藥奧旨非立言闡發之烏能使後人測其端倪知所取法而推行之也男澍再識麻黃連翹赤小豆湯麻黃連翹杏仁甘草赤小豆薑棗逍遙散局方柴胡白芍當歸白朮茯苓甘草薄荷煨姜汗不得法辛卯冬月有同道長子患傷寒病畏寒頭痛發熱無汗屢服發散汗不能出熱不能止變痙而逝其次子旋得此症連進發表皮膚乾澀發熱愈熾同道駭怖請視告余曰明是寒邪傷營見症俱屬外感奈何汗之不應又豈死症耶余曰辨症雖真未能相體故耳郎君關弦尺遲面白露筋乃中氣虛而血不足故寒邪外感非滋其血液何能作汗汗既不出熱何由解宜與當歸建中湯同道又欲減除飴糖余曰建中之用妙義正在於此且糖乃米穀所造所謂汗生於穀也如法啜之果微汗熱退而安愈後同道尚不自悔復向余曰吾意亦如是耳余知彼欲掩其過而逞其能也壬辰春復聞乃郎患中虛氣痛緣脾向虛肝木自強且春升木旺之際正宜補土榮肝反以極力消導竟墮前功殊可惜耳仲景建中湯加當歸桂枝生薑芍藥甘草大棗飴糖風濕相搏高漢章得風濕病遍身骨節疼痛手不可觸近之則痛甚微汗自出小水不利時當初夏自漢返舟求治見其身面手足俱有微腫且天氣頗熱尚重裘不脫脈象頗大而氣不相續其戚友滿座問是何症予曰此風濕為病渠曰凡驅風利濕之藥服之多矣不惟無益而反增重答曰夫風本外邪當從表治但尊體表虛何敢發汗又濕本內邪須從里治而尊體裡虛豈敢利水乎當遵仲景法處甘草附子湯一劑如神服至三劑諸款悉愈可見古人之法用之得當靈應若此學者可不求諸古哉甘草附子湯甘草附子桂枝白朮濕熱內攻張懷久乃郎年方及冠遍身忽發瘡疹形如麻粒詢諸瘍科內以涼血托裡之劑外以藥湯沐浴其瘡盡伏以致濕熱內攻惡寒發熱頭痛身疼此表邪確據延醫又誤為瘧症投以清脾飲服之此誤認為半表半裡以致寒不成寒熱不成熱人事昏惑絕粒不進乃叩於余脈頗浮數問之不應捫之身熱視之唇舌俱淡此風熱內蘊抑遏於中若不外達勢必內攻臟腑機竅盡閉而斃當與升陽之藥提出肌表與升陽散火湯二劑遍身發熱躁擾不安其家驚惶促余再視其身雖熱而問之能答則神識將清且粥飲亦進則胃氣有權余曰吉也夫躁擾不安者正邪氣外達之徵明日毒氣外出則內可安更與辛涼解表之法以人參敗毒散二劑果然瘡疹盡皆發出形如綠豆粒再與前法瘡皆灌膿結痂而安仍與清散藥而健須知此症若不如此施治臟腑能堪此毒乎升陽散火湯東垣葛根羌活防風升麻甘草生炙柴胡獨活人參白芍薑棗人參敗毒散活人人參羌活獨活柴胡前胡川芎枳殼桔梗茯苓甘草薄荷生薑同症異治許慶承之子及黃起生之弟年俱二十同患瘟疫醫進達原飲大柴胡湯潮熱不熄燥渴反加因而下利譫語許氏子病經兩旬身體倦怠兩目赤澀譫語聲高脈來數急知其下多亡陰所幸小水甚長足徵下源未絕與犀角地黃湯加蔗汁梨汁烏梅甘酸救陰之法頻進而安附黃氏弟悉同此證但此病不過三日即身重如山軀骸疼痛譫語重複聲微息短脈來鼓指無力此病雖未久然表裡有交困之象陰陽有立絕之勢急進十全大補湯重加附子二十劑始安夫同一潮熱燥渴同一譫語下利而用藥角立毫釐千里豈易言哉犀角地黃湯犀角地黃白芍丹皮或加芩連十全大補湯地黃當歸川芎芍藥人參白朮茯苓甘草黃耆肉桂風溫答問附家萬生廷詔之子春杪遠歸頭痛寒熱默默欲睡醫者不知風溫之症當用清涼之法誤作傷寒之病而以辛溫之藥漸至神識昏迷譫語不食大便不通小瘦或遺與水則啜一口與粥亦啜一口延余兩門人同治汪生爭用附子乾薑陳生爭用芒硝大黃兩爭莫決急延余視兩生俱稱脈象模糊余診亦然及抉齒視舌白乾刺唇雖干而色稍淡脈與症參病邪不在臟腑僅在三焦因謂汪生曰爾以為諸虛乘寒有神虛譫語之例耶但舌不應干刺又謂陳生曰爾以為三陽傳經有胃實譫語之條耶然舌色不應盡白究竟溫臟攻腑俱屬僨事蓋此症乃風溫熱邪蒙閉上焦氣分致令肺氣痹極古稱鬱冒者即此症也但有入氣入血之分若入血分則邪在膻中之內此則僅入氣分耳夫肺主氣氣阻血亦不行故脈模糊然亦重按觸指上焦不清則胞中之絡外蒙閉故神昏譫語也浮障之邪惟與輕清味淡之藥可得去也汪生問小便自遺如何答曰曷不聞肺與膀胱司氣化熱甚而陰挺失職乎陳生又問大便不通如何曰肺與大腸相表裡且天氣不怖地道亦阻之說吾已講明有素何遽忘耶兩生愕然促以疏方僉用杏仁杷葉知母通草蔞皮山梔皮竺黃燈草藥下安睡大便果通次早復視能述病苦再加琥珀鎮心安神而安仍以清肺藥而健越日兩生叩曰風溫邪入氣分之治既聞命矣但未知邪入血分當以何法治之答曰若邪入血分則入胞絡之內舌苔當必黑刺而涼膈導赤黃連阿膠雞子之屬養陰退陽之法按症舉用以積熱藉以宣散而心胸和暢脈漸以生又曰風溫初起脈症如何治當何法曰溫症甚該凡春溫溫熱濕溫暑溫風溫以及溫疫大頭瘟皆不可汗故書曰溫邪忌汗也今僅舉風溫之症言之發熱頭痛狀似傷寒但自汗身重多眠夫身重似傷寒然寒應無汗自汗似傷風而風應身輕此當辨也且鼻息多鼾睡語言多難出脈象尺寸當俱浮唇口齒舌當不潤無非風溫醞釀之機此當辨也總由表邪蓄熱故曰風溫治之之法當與辛涼解表如葛根薄荷防風杏仁連翹通草白薇甘草之屬內清經絡外徹肌膚清溫而不阻風之出路驅風而不助溫之暴虐庶內外之邪表裡兩解為清散法也若犯香蘇羌獨蔥姜陳半是以溫治溫故在禁耳兩生退而喜曰既聞風溫入氣入血之治又聞諸溫忌汗之理真所謂聞一得三夏傷於暑傅瑞廷六月新婚後觸暑病熱頭腦大痛誤用補劑大熱焦渴醫以瘟疫熱症治之凡清解疏利升散養陰之藥治經數月而病不瘳節屆大雪始延余診視其形瘦面垢身熱譫語自汗多渴頭痛有如刀劈脈來長而不洪是時醫巫浩費家計已索病者因頭痛難任其叔孔翁曰尚可治否余曰可治戚友咸問病名余語以暑邪之症眾詫為不然問曰何以知之余曰以氣虛身熱譫語自汗合於面之垢脈之長而知之也因請用藥余曰甘寒解暑之劑惟有天生白虎一方旋重價覓至二枚先將一枚破而與之病者心躁口乾見輒鯨吞虎嗜頓覺神清氣爽因再求瓜家人止之余更與之食畢汗收渴止頭痛如失但暑邪雖解而陰氣被陽熱之傷尚未復也夜仍微熱咽微干睡不寐仿仲景少陰病咽乾口燥不得臥之例處黃連阿膠雞子湯三服而健黃連阿膠雞子湯黃連黃芩芍藥上三味煎去滓入阿膠烊盡少冷入雞子黃攪勻服溫熱傳變車覲廷妻傅羽儀令愛也初日惡寒發熱次日大熱不寒飲水不輟唇焦紅舌燥裂大便閉胸前板痛煩躁莫當余診之脈純躁無靜剛勁沖指謂曰此乃溫熱病非傷寒症也若傷寒症從皮毛而入由傳變漸入於胃結成可下之症至溫熱病從口鼻而入不由傳變直入而附近於胃結成大下之症其來路異其去路一也然此症才二日即一團邪熱內結如火燎原其勢已極亦溫熱病之最速者須防物極則反或有痙厥之變稍遲有朽腸腐胃之事矣是所謂急症急攻無庸迂緩疏方以涼膈散大黃重用藥方煎時掀衣發狂怒目而視牙關略緊面紅目赤揚手擲足乃邪火一概上衝莫可止遏之勢忙進前藥灌至半勢稍平劑終人事略醒自索前藥以其滓再煎服之隨取前方再進一劑其病悉清詎調攝不善半月後因口角盛怒時見微熱初不以為意倏於某日申酉刻自覺難支晬時聲音悉閉奄奄一息問其苦否但點額搖頭可見心地尚明惟啞不能聲耳尤有奇者腰以上發熱去被揚手摸胸腰以下畏寒厚覆兩足僵直醫數輩未敢下藥舉家慌甚羽兄即夜來請余念知己之女戴月而往診脈寸部浮數尺中緊澀似乎上下阻截因其症從未經見方非易擬然目睹其狀心甚憐之兼之房中稚子失乳老姑撫孫相哭吾大為躊躇默以其症證諸經旨以冀一悟其夫含淚問曰前日重恙幸叨再造今復病此先生亦蹙額無法耶答曰斯疾大奇大疑泛泛一視難明其理吾正在諦審且止啼哭吾自當竭誠以報知己因環步思議已而笑謂曰此症雖奇吾得之矣竊思人身之氣全賴肺以運之今上下不通無非治節不行失其常度而為上熱下寒之症其上熱下寒之由蓋前此溫邪未得清解今復加感冒又值大怒其氣愈阻愈阻愈結其氣遂橫於胸其熱邪因氣不流行仍親乎上熱多動必擾其血故見上熱去被之症其寒邪新感亦因氣不流行仍親乎下寒多靜必滯其血故見下寒僵硬之症總因氣結於胸不能周流以故舊熱新寒各隨上下而相親熱自熱寒自寒儼然分疆界焉曰此先生大開生路之論未知古聖亦有此論否余曰大哉問也吾為子悉言之嘗讀經曰氣並於陽血並於陰此上下相親之義也曰其聲啞如何曰夫聲音發於肺肺為嬌臟最易受傷今氣已結更被熱邪傷之又被寒邪塞之欲其出聲其可得乎譬之鐘磬內以物塞之外雖重敲冀其響不可得是其病之所受全在於肺法宜先開肺氣而祛寒使氣宣通熱得下流而胸結可散後瀉其蘊熱則肺可清而壅塞自除時際雞鳴疏方先以烏藥順氣散一劑以開肺氣而祛寒比曉遍體微汗下身發熱減蓋腳可屈伸胸前亦寬惟聲音雖出猶不清時仍啞日出進瀉白散合白虎加桂枝湯此方足以瀉熱而清肺一劑潮熱悉退聲音清亮前後兩劑病如冰釋後以保肺生津之藥調理而健觀者欽服白虎湯石膏知母甘草粳米涼膈散連翹甘草薄荷大黃梔子竹葉芒硝黃芩蜂蜜烏藥順氣散烏藥橘紅麻黃川芎白芷桔梗枳殼殭蠶乾薑甘草加蔥姜瀉白散桑白皮甘草地骨皮粳米咳嗽失血三條李賡揚先生苦誦讀館僧寺冬月衣被單薄就爐向火而嚴寒外束虛熱內蘊漸致咳嗽吐血醫者見其神形不足謬稱癆損日與養陰之藥遂至胸緊減食臥床不起余診其脈六部俱緊重按無力略有弦意並無數大之象密室中揭帳診脈猶云惡風被縟墊蓋尚背心寒凜按脈據症明是風寒兩傷營衛之病若不疏泄腠理則肺氣愈郁邪無出路法當奪其汗則血可止經曰奪血者無汗奪汗者無血奈體質孱弱加以勞心過度不敢峻行麻黃然肺氣久閉營分之邪非麻黃何以驅逐考古治虛人外感法莫出東垣圍範因思麻黃人參芍藥湯原治虛人吐血內蘊虛熱外感寒邪之方按方與服一劑微汗血止再劑神爽思食改進異功合生脈調理而安亦仿古治血症以胃藥收功之意也然余竊為偶中厥後曾經數人惡寒脈緊咳嗽痰血者悉遵此法皆獲全效可見古人制方之妙醫者平時不可不詳考也麻黃人參芍藥湯麻黃芍藥黃耆當歸甘草人參麥冬五味桂枝生脈散人參麥冬五味徐曉窗年逾五十形偉體強忽患潮熱咳血楚南諸醫咸稱血因火動疊進寒涼漸至胸緊頭疼不能自支於是檢囊歸家坐以待斃延醫數手無非養陰清火迨至飲食愈減咳紅日促予按脈象緊數之至且病經數月而形神未衰聲音猶重肌膚雖熱而厚衣不除久病面色蒼黑額痛時如錐刺內外諦審並無內傷確據一派外感明徵伏思表邪入陰擾亂營血必當提出陽分庶幾營內可安乃以參蘇飲除半夏加入止嗽散與服二劑助以熱粥始得微汗似覺頭疼稍減潮熱頗息以後加減出入不越二方或增金釵麥冬或參瀉白散調理一月藥僅十服沉疴竟起未嘗稍費思索也附後李維翰先生畏寒發熱脈緊無汗咳嗽失紅之症醫治弗效慕名虔請及余疏方畏而不服細為講論疑團稍釋奈前醫紛紛既不識表邪入陰之症又不解奪汗無血之義中堅阻之而余獨吹無和以致熱腸不投越月見訃音懸市自恨遇而不遇撫躬一嘆而已參蘇飲人參紫蘇陳皮枳殼前胡半夏乾葛木香甘草桔梗茯苓姜棗止嗽散桔梗甘草橘紅百部白前紫菀瀉白散方見前本門溫熱傳變溫熱不治二條黃成齋學博外艱解組後憂思百倍今春面色如赭坐談口穢神情張皇若有所失蓋顯孤陽不生之機予見而駭之曰足下神形面色陽氣獨治無陰以守然尚不倦得毋出於強勉乎渠曰不然又曰人身負陰抱陽陰陽交戀不露所以生生不息今神形相失急當潛心靜養庶幾亢陽自返所謂靜則陰生也渠曰唯唯厥後聞伊不但應酬不節抑且多方會計延至秋深忽潮熱不退自擬因食物未節屢進消導發散因而汗出嘔逆乃邀余治余固早知其病必重也視之汗大如雨身熱烙手舌苔滿黃口穢難聞抑且絕粒不進徹宵不寐熱微則神識稍清熱甚則神亂妄言及診其脈洪大躁疾非常余以誼關世好而又金丹莫覓直以病在不治之例辭之蓋內經素問篇云有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名陰陽交交者死也人所以汗出者皆生於穀谷生精氣今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪氣勝也不能食者精無俾也病而留者其壽可立而傾也此素問之言已屬吻合矣又靈樞篇云熱病已得汗而脈尚躁盛者死今脈不與汗相應此不勝其病也狂言者是失志失志者死今見三死不見一生雖愈必死也況叔和云汗後脈靜身涼則安汗後脈躁熱盛必難余以揣摩有素莫敢援手蓋攻邪保精兩難立法耳聞余告辭後旋延二醫商從表裡兩解未逾日氣高不返而逝惜哉設當日春升相見之時肯聽予言急搗養陰鎮陽之藥轉剛為柔歸於中和加以潛心靜養雖有此番病累決無汗後洪大躁疾之脈矣筆此以為養生者鑑併為業醫者鑑也車啟南之子年方二十發熱頭痛服表散藥汗出淋漓而熱反熾更狂言亂語口渴粥飲不進其戚友知醫者多特邀余診之脈洪大急疾異常尺膚爍指余知此症為陰陽交矣堅辭不治門人在旁囑其不可用藥余出復延二醫相商與竹葉石膏湯眾皆謂可未晚果卒次早門人問曰昨車姓之病愚輩視之頗輕而先生直云不治者何也答曰此症內經明有開示一款云有病溫者汗出輒復熱而脈尚躁疾不為汗衰狂言不能食病名陰陽交交者死也謂陰陽交盡也凡治溫症若得戰汗理當脈靜身涼傷寒汗後亦然今大汗既出而熱反熾是汗為陰氣之亡而熱為陽氣之喪夫汗為陰液陰氣既出而孤陽獨亢因顯躁疾之脈已屬不治再加狂言亂語是心腎陰精絕於內神明越於外合於脈之躁疾其何以施救援乎若能飲食入胃遊溢精氣或使精生於穀尚可幸圖於萬一今口雖渴而粥飲不入合於脈之躁疾全失和緩之象又無胃氣矣所謂今見三死不見一生雖愈必死也吾儕身肩是任可不見及此乎門人促余筆之以為後學之訓述治張高騰兄暑溫病書予臨斯症時病已四五日矣某月十一日睹神呆色垢煩冤莫耐潮熱微而惡寒脈小數促舌赤唇燥溺短而艱是暑溫之邪深陷於營勢非易治姑與淡滲輕清之藥而溺愈不通脈現澀小因思溫邪固不可緩圖而淋秘尤當急治且數脈轉澀下元陰必不充仿滋陰化氣之法下午隨疏滋腎丸作湯亟進溺始得長次日便泄溺短更用五苓散加知母木瓜而二便無恙十三日復診其寒熱煩冤之狀仍若脈仍小數促蓋溫邪雖陷於營其去路已非從下必當提出於表方為合法遂給蘭草分消飲連服而惡寒發熱之恙稍減其半十五日復診脈舒不促但數小不長諒非滋陰清熱之法不可連日服之而寒熱更減二三神始清耳始聰惟煩冤之狀尚未能解十八日脈轉遲數舌清唇紅但指尖時微冷天庭倏潮熱而不自覺蓋溫邪雖從表達然脈象遲為陽虛數斷陰亢是身中素虛之陰陽尤當亟調夫養正邪自除理所有也因訂附桂八味連服二日而脈皆平諸病稍退自云噯氣猶帶地黃之味意擬丹澤之寒乎故改附桂理陰煎脈來數多遲少固知劑中過助其陽念日更用柔陰扶陽之藥一服而寐已安是日再視二便寤寐如常是暑溫之邪已解但脈來右猶帶遲左猶帶數口甘唇紅當從中治似此陰陽兩虛之體寒熱錯雜餘邪最宜斟酌非剛不足以滌穢非柔何以濟其剛孔氏曰寬以濟猛猛以濟寬政是以和不佞謹以治國之法而通於治病可乎其藥味必嘉言所謂能變胃而不受胃變者宜之故疏連理湯與服連進二日所喜藥與病機相投但未知鄙見有悖而理否至善後之治猶未敢臆揣緣一病變態不常四方水土有異謹陳顛未附質慧眼採鑑而善後之法是有望於高明焉後聞病者至家仍以理中加枸杞服旬余而安一得集附陽症似陰熊清平乃郎將冠得溫熱病自以感冒法治之已不中病延醫更謂陰虛投以六味地黃湯益不中病遷延旬日胸腹飽脹稍按甚痛潮熱漸退四肢冰冷手足爪甲皆黑舌苔乾燥口不知渴與之以水則咽大便五日未通小便赤澀而少咽喉腫塞日不能言耳聾不知所問六脈舉按皆無醫者不審熱深厥深之旨鬱熱蓄盛脈反滯澀之變熱甚神昏口不知渴之情復不將望聞問切四字較勘僅守發厥脈伏之假象冒為真據且將胸腹飽脹為陰寒上逆而可按拒按置之不辨咽喉腫塞妄為虛陽上浮而色之赤白口氣溫冷又置之不辨又以大便燥結謬為陰凝不化而痞滿實堅全具又置之不察直將一切內熱明證概為假熱竟用四逆湯附子用到一兩清夫婦疑而未進就正於余內外一探知為溫熱重病陽邪亢熱已極反兼寒化如酷暑雨雹之象勢亦在危而細勘詳詢明是在表失表在裡失里釀成極重熱症再診其脈舉按雖無而沉候至骨勁指甚堅根蒂未絕喜其可治因謂曰此大熱症也遂疏黃連解毒湯合普濟消毒飲重加大黃囑其日夜兩劑務俾大便通則火不伏而厥可回脈可出清因二醫一用附子乾薑一用黃連大黃冰炭莫辨無所適從然其婦急欲將余方購藥而清究不能決更延一醫匆匆一視又謂為陰毒其婦曰生死有數若服謝先生藥死亦無恨清因妻意甚堅勉為煎就意仍狐疑其婦強為徐灌約二時之久一劑已終小水甚長即索水飲清見人事略醒復煎一劑是夜連得大利果厥回脈出次早復視更以涼膈散重服清胃藥而健後置酒於家道謝清因述曰眾醫謂為陰寒獨先生斷為陽熱小兒幾希之命固蒙再造但承賜妙方若非內子堅意幾乎誤矣余驚疑之嫂何以獨信予也適其婦出房道謝其婦曰先生初視之時面有憂色是憂其難治也及診畢而躊躇深思是思其可治也至再診而面忽有喜色是喜其得法也且審症而戰戰兢兢疏方乃洋洋溢溢是直無所疑也先生慎重若斯無疑若斯予復何疑余聞言深為歎服夫醫家望聞問切而望居其首業醫者往往忽之今熊婦竟能望醫之神色而知醫吾輩昧昧不且有愧於婦人乎黃連解毒湯黃連黃芩黃柏梔子等分普濟消毒散東垣黃芩黃連甘草玄參連翹板藍根馬勃牛蒡子薄荷殭蠶升麻柴胡桔梗陳皮涼膈散方見前本門溫熱傳變水氣頭汗嘗讀醫門八法云傷風自汗用桂枝湯傷暑自汗則不可用又曰人知發汗退熱之法而不知斂汗退熱之法斂也者非五味酸棗之類是謂致病有因出汗有由治得其法汗自斂耳如傅金生一症時當暑月天氣亢燥飲水過多得胸痛病大汗嘔吐不止視之口不渴脈不躁投以溫胃之劑胸痛遂愈而嘔吐未除自汗頭眩加甚其父來寓更方余以昨劑頗效原方加黃耆與服服後亦不見躁惟汗出抹拭不逮稍動則眩暈難支心下悸動舉家咸以為脫吾許以一劑立愈以半夏五錢茯苓三錢生薑一片令即煎服少頃汗收嘔止頭眩心悸頓除蓋緣飲水過多水停心下火位不安故惕惕悸動本僅當心下作痞茲以陽氣素虛更重為心下作痛所以前投溫胃之劑助陽消寒其痛自除但水飲猶未下耳水氣上逆則嘔吐不止水氣上干則汗眩難支舉以大半夏湯行水散逆使水下行則嘔悸汗眩俱止所謂治得其法汗自斂耳由此益悟認症宜真而辨症宜細也試觀瘀血症亦頭汗出然必小便不利而目珠先黃又邪在少陽亦頭汗出雖有嘔吐目眩胸滿之兼症然必有寒熱往來之本症至於傷暑自汗鬱熱陷里自汗陽明熯熱自汗三陽合病自汗更有中寒冷汗表虛自汗陽脫自汗汗多亡陽與夫驚恐房勞風濕漏風產蓐津脫以及盜汗諸症凡陰虛陽勝陽虛陰乘種種汗出不一各有兼症不同且頭與身皆汗又與獨見頭汗迥異烏可概指為虛脫耶此余趨庭傳受心法今並志之小半夏加茯苓湯金匱三因名大半夏湯半夏茯苓生薑本方除茯苓名小半夏湯治支飲嘔吐不渴亦治黃疸本方除茯苓生薑加人參白蜜名大半夏湯治反胃食入即吐李東垣曰辛藥生薑之類治嘔吐但治上焦氣壅表實之病若胃虛穀氣不行胸中閉塞而嘔者惟宜益胃推揚穀氣而已勿作表實用辛藥瀉之故服小半夏湯不愈者服大半夏湯立愈此仲景心法也傷暑自汗丁麒壽時當暑月腹痛泄瀉自汗神疲疊進溫補遂至二便窘急日益危篤適一鄰醫年六十餘謂病經數日汗出不知幾斛兼之四肢逆冷法在不治且補劑服至附子鹿茸仍無寸效今脈絕無可為也其家固貧醫藥已難繼矣又聽鄰醫之言遂無復再生之想奈病人呻吟在床不忍坐視遙聞先君善治危症託人求診適應酬未暇命余前視診得脈虛重按若無審得額汗溺短氣虛煩渴背微惡寒四肢逆冷余笑曰此傷暑也安得以陽虛目之經云氣虛身寒得之傷寒氣虛身熱得之傷暑今症見煩渴溺短氣促脈虛傷暑奚疑議進清暑益氣合桂枝湯一劑囑其即服可效前醫執余方私語病家曰年少之醫孟浪殊甚臨危之症猶謂傷暑今汗出淋漓收斂尚恐不及反用升柴桂枝以發汗非速其斃耶其家雖疑緣病由奔走日中而起信余不謬即進一劑病勢減半繼進二劑兼吞消暑丸一兩腹中呱呱有聲二便一時通利汗收渴止煩退而安復將原方除桂枝二劑全愈越三日來寓酬謝始述前醫之非予不禁為之一快夫暑屬陽邪心屬離火故傷暑必先入心心主血脈故脈虛大不足重按意在鄰醫不知浮中沉三取之法且暑脈多芤狀如蔥管浮沉二候易見中取正在空處故斷為脈絕余用參耆歸木合生脈散養心而裕脈固土以保金其暑熱傷津故口渴溺短飲水過多停聚中脘誤進溫補收斂之藥故二便不利水氣上湧宜其頭汗如雨餘二劑中兼吞消暑丸雖曰消暑亦仿小半夏加茯苓湯治水氣頭汗之意也方中升柴葛澤升清降濁譬之雲行雨施然後溝瀆自通注之不盈而額汗自收矣清暑益氣湯東垣黃耆人參白朮蒼朮神麯青皮陳皮甘草麥冬五味當歸黃柏澤瀉升麻葛根薑棗中風門虛風肝風附牙緊舌脹二條傅品金先生尊壺于歸後即屆大暑天氣炎蒸一日群坐中堂忽身冷怯寒遍體麻木進房加衣猶然不足喚婢取被蓋臥遂昏迷不醒牙緊手散舌脹出於齒外喉間微有曳鋸聲急延鄉醫診治進姜附之藥因牙緊未得下復用通關散吹鼻未能得嚏其醫見病危急束手而去曰此脫絕之症不可救矣舉族群集皆曰今年新生一種啞症概不可治此病近之余至視之既非木舌又非翣舌明是中風之病但喑厥風痱之症從未聞有舌脹出於齒外者殆經所謂廉泉穴虛風邪上入耶夫廉泉舌根小孔也人之津唾出焉此女必然痰涎素蓄風從廉泉內入內涎召外風外風挾內涎結聚於心胞絡中又舌為心苗是胞絡之風涎仰從廉泉上壅遂舌脹牙緊矣撽齒視之舌脹滿口黏涎壅塞湯水難入呼吸難通危在頃刻雖有神丹其何以下然出奇之病非出奇之方必不能濟因自計曰無病忽畏寒麻木是外風內入之徵風為清邪清邪中上故見牙緊舌脹之症今病最急處尤在上也經曰病之高者因而越之非湧劑不可考礬性湧吐風涎最捷且居室易得於是取白礬一塊開水調化鵝翎蘸水撽齒滲入深探喉中立時即嘔出痰涎舌即微縮開聲起身下床自謂醜態難堪蓋不自知其病至斯極也嗟乎以幾死之症旋得回生族眾稱以為神余曰非神術實心術也然此不過暫開其閉尚未盡掃其根隨觀其舌下根兩旁竟生兩小泡狀如蝦眼明若水晶問之別無所苦惟是身不知熱大便數日未通因用疏風化痰之藥比日飲食亦進次早復身麻舌大昏迷不蘇余至遂與稀涎散調灌下喉即嘔涎出即蘇惜乎未得大吐兼之大便未通內中必有結聚膠凝難解之涎恐非攻劑不足以劫飲通幽然宜溫通最忌苦寒遂進雄黃解毒丸十粒熱水調服連泄二次隨飲冷茶立止自云輕快如常遂不肯吃藥雖吐下兼用猶然未盡病情越數日復發如前仍用稀涎散調灌立蘇梳洗如舊厚衣不除足知風涎尚未盡掃於是制霹靂劫巢之藥頻服汗出知熱減衣而安然舌下蝦眼猶然未除與白礬肉桂末放於舌下一宿遂消蓋桂能散風礬能散痰故耳後因瓜果無忌暈腥雜進復發前疾仍與前藥而痊細思此症固奇而治法亦奇因詳錄此案並記其方於下附後九月治範室年近三十悉同此症未費思索直與稀涎散灌之即吐復進霹靂劫巢湯戒口慎寒病隨藥愈因此益悟實邪盤踞上焦脹閉之症隨其上而治之可也如風熱痰飲填食喉風胃癰以及卒忤中惡魘夢中毒之類古人曾有瓜蒂散稀涎散蔥豉湯淡鹽湯萊菔子末生薑汁蔥白酒雄黃丸等古之成方隨症施治歷歷可紀尤有寒痰閉塞以及中臟脫絕之症古人曾有橘紅半夏湯人參附子湯因痰築喉間稍為變通隨灌隨吐痰隨藥出又隨吐隨灌拭出其痰少頃痰開下藥隨症處方其人立蘇此皆古人之成法皆可效為變通者由是觀之吐法所關甚巨奈何近時醫家每將此法置之高閣似乎汗下和溫之外更無吐法可施以致危迫之際坐以待斃者固多即輕者轉重重者愈危亦復不少今勘破迷途尚賴同道好生之士曾而參之為幸自制霹靂劫巢湯草烏牙皂麻黃細辛殭蠶全蠍南星半夏雄黃薑汁竹瀝如便閉加玄明粉如口臭加石膏大解後除牙皂加白朮茯苓以不畏寒為度稀涎散皂角四挺去皮弦炙白礬一兩或加藜蘆考古簡便方云治重舌木舌腫滿強硬或疼不止不能言語宜用粗針線扎箸頭上刺患處甚者數十刺只針舌尖及舌兩傍舌中心及舌下俱不可針犯之令出血不止而刺出之血以紅色者為毒輕紫色者重黑色者最危仍以蒲黃研末擦舌上即消舌或脹大腫硬即時氣絕名為翣舌翣衫入聲用皂礬不拘多少焙新瓦上以火煅成紅色為度放地候冷研細搽舌上立愈重舌木舌皆效晳蔽棺之飾謂如晳之蔽於棺上也舌腫滿不能出聲以梅花冰片研爛敷之或以食鹽百草霜共為末井水調敷即效男澍謹識牙緊咽腫傅婦葉孕四月惡寒體木咽腫牙緊付外科醫治內服外敷直至聲音不出湯水難入危急之頃商治於余其意中仍泥為癰毒之病其延余者欲決生死非求治也診得脈來浮滑身中麻木畏寒悉是風痰為病蓋風邪中上故多有咽喉上痹之症此與前案治品翁內人牙緊舌脹相符余令將外敷之藥洗去先與稀涎散調水灌之涎出口開更有奇者視其舌下另生一齒觀者數十人咸稱從未見聞其齒大如棗核摸之稜指按之似痛遂以白礬肉桂末點於舌下齒旁立時取落敲之即碎外黃內白遂乃開聲疏以驅風消痰之方二劑而痊胎亦無恙然意謂向治品兄內人舌下之蝦眼固奇今治惠先兄室人舌下之鬼齒則又更奇矣究皆風涎所生可見風無定體其為病之變態人難測識類多如此附方防風荊芥薄荷膽星桔梗殭蠶白芷礬石甘草薑汁竹瀝稀涎散方見前本門牙緊舌脹偏頭風痛汪亮輝年逾五十患偏頭風症自汗不止腦中覺有冷涕一陣自鼻而出醫人不識與蒼耳散蓋錯認鼻淵症也汗愈大涕愈冷痛愈甚又與真武湯蓋誤作陽虛頭痛也漸至火升便艱更醫又與茶調散滿頭筋脹二便阻滯蓋不識虛實內外之風故也考虛風內動之症仲景以後罕識其旨惟近代天士葉氏養肝熄風頗得其法今此症脈左浮大風居空竅擾亂不息頭汗不止是為內風虛風可知矣夫風氣通於肝必養肝之中佐驅風之品然頭腦空竅隧隙頗多最難盡逐必兼佐以堵塞之義則空竅之風無隙可乘乃仿金匱侯氏黑散內取桂枝龍骨牡蠣菊花驅風填竅更取葉氏養肝熄風之法如首烏黑芝麻金釵鉤藤桑葉荷葉之屬不數劑諸病如失此症余經驗頗多向未發明學者鑑此當知治法矣腦鳴肢痹趙近仁年將五十須鬢已蒼左䚡自肩臑肘胛麻木不舒腦中鳴響醫者見其滿面油光飲食如常輒稱其氣血之華誰識真陽外露肝風內鼓所服之藥不出獨活寄生湯之法欲為驅風適以招風乃由平時不講內外之風故耳即有進以八珍之屬冀其血行風滅無如杯水車薪不濟所事且值冬初寒風凜冽木葉盡脫之際漸顯頭眩耳鳴肢墮等症余診脈象緩大知水不濡木肝風始張腎氣將騰卒倒痱中之日來矣授以河間地黃飲子加鹿茸大劑煎服欲其火歸水中水能生木兼制扶桑丸用以流利關節祛濕潤燥服至臘月肢體勁強神彩內蓄自覺神魂返宅適因歲暮停藥未進故頭眩雖息而腦鳴未止應知髓海難充亦功虧一簣之過耳地黃飲地黃巴戟山萸蓯蓉附子肉桂石斛茯苓菖蒲遠志麥冬薄荷五味薑棗腸風下血王惠階年壯形偉大便下血醫治半載以平素嗜酒無不利濕清熱以止血如地榆柏葉薑連之類服之不應厥後補中胃風四神之屬投亦罔效求治於余診脈小弦大便或溏或泄不及至圊每多自遺其血清淡間有鮮色更有奇者腹中無痛但覺愊愊有聲鼓動因悟此必虛風內擾以風屬無形有聲與經旨久風成飧泄吻合且脈弦者肝象也肝風內動血不能藏故耳因與玉屏風重防風加白朮乃扶土製木之意更加葛根辛甘屬陽鼓舞胃氣荷葉仰盂象震挺達肝風疊投多劑其症一日或減越日復增輕重無常予思虛風內動按症投劑疾不能瘳者何故潛思累夕不得其解忽記經有虛風邪害空竅之語蓋我居腸間盡是空竅之地非補填竅隧舊風雖出新風復入無所底止故暫退而復進乃從金匱侯氏黑散驅風堵截之義悟出治法填塞空竅將原方加入龍骨石脂兼吞景岳玉關丸不數日果獲全瘳侯氏黑散菊花防風白朮桔梗人參茯苓當歸川芎乾薑桂枝細辛牡蠣礬石玉關丸麵灰枯礬文蛤五味訶子喑厥風痱俞昌大初病惡寒發熱繼則熱而不寒喜睡羞明二便略通醫以為外感進敗毒散症變熱熾譫語又以為瘟疫投達原飲症變神識昏迷更醫斷為虛脫與理中湯舌苔乾黑肢體若僵絕食不進家人治棺待斃姑延一診以決卒期診得左脈沉緩有脈數急面黑目赤昏昏嘿嘿耳聾不知所問上部捫之覺熱下部捫之覺冷統計之有似水衰火炎之象細視左肢微腫捫之覺有痛色於是知為風邪所中誤治而至此也法參喑厥風痱之例以地黃飲子服至二日方醒七日全愈地黃飲方見前本門腦鳴肢痹四肢抽搐三條何允中年二十兩腿瘡毒膿水淋漓醫治半載內服外敷愈加浮爛一日忽微熱身體抽掣兩目上瞪喉中痰響全似小兒驚風之形請余視之方診脈其老嫗捧藥一碗辛散異常診畢問所捧何藥系大秦艽湯也余擲之於地遂疏理陰煎加黃耆附子大劑與之連服兩劑而眼已不戴身已不強隨服十全大補湯數十劑瘡毒全愈然此症實有天幸倘不遇余大秦艽湯已投之矣蓋醫者只知風邪為害不知風從何來彼其陰血先已失守津液枯涸筋脈不榮陽氣不藏是為陰陽兩竭之候此際收攝已晚尚堪辛散耶況古云治風先治血血行風自滅不但瘡家凡誤汗失血泄瀉痘疹以及產後老弱小兒諸人此症最多皆當審察十全大補湯方見卷一傷寒門同病異治理陰煎方見卷二虛寒門內寒外熱吳承先令愛體素孱弱勤於針鑿忽渾身戰慄牙關緊急舌可略露口不能言時露抽搐角弓之狀寒熱悉無小水仍利疏風解表之藥不效病經兩日其勢漸危諸醫見大便未通欲行攻下未決余至眾皆推治診之脈來緩大方思議間手足抽搐角弓反張牙關緊急兩目翻視諸醫告退竊此症其來甚暴應知暴病非陽且無寒熱決非三陽實邪若果外邪固閉其人早已昏迷不醒安得清明若是此必血虛風中筋脈瘛瘲無疑與大劑十全大補湯重肉桂加附子急進抉齒灌入俾得略睡其勢稍止晝夜一周進藥三劑乃得口開能言然猶微搐共進十餘劑始安附厥後郭永明老年獨子稚齡體弱深夜看戲回家立時即病悉同此症明是血虛風中余與前藥畏不敢進競爭疏風化痰兼進法司符水分明可生之症竟至不起誠可惜也須知陽邪之發其來必漸陰邪之發其來必驟人鬼關頭先具成見況閉症多握拳脫症多撒手又凡中症有中腑中臟中血脈中經絡之殊有真中類中之別若不平時領會豈不害人於冥冥中耶十全大補湯方見卷一傷寒門同病異治肝風胎癇傅海翁之媳于歸匝月時值暮春忽然仆地眼翻口噤兩手握固半晌方醒已而復發他醫認為痰火閉竅進大黃檳榔菖蒲桃仁之屬治經半月不痊眾皆束手延余診治見其唇紅面赤脈沉實而滑問得飲食間微若有嘔因稱賀海翁驚問余曰令媳之症乃胎癇懷孕使然因其體素有火即誤服破瀉之藥而體堅病實亦無大礙不治並亦無妨但得藥早愈免合室驚惶耳因以四物加枯芩半夏與之仍然發閉病者瞑目口中囈語曰我要銀子還不然我要索爾命眾議此必邪祟所侵又見其兩手撮空循衣摸床皆曰昨謝某在此妄言胎癇今已將危何不延他一視慌忙來寓急延余往余曰早言胎癇小恙何必如此大驚此女肝家枯燥此刻胎中正肝經主事肝藏魂血燥神魂不安所以目中見鬼口中亂語又肝屬木木喜搖所以手循摸耳今吾以收魂藥招之鎮之的可痊愈疏方與服數日未發然不可停藥停藥數日往往復發如前竟服至足月方已後獲弄璋肥大之甚母子均安眾稱良治附方首烏胡麻茯神棗仁鉤藤小麥菊花法夏麥冬金銀湯代水煎大凡中風中痰氣厥血厥病雖起於倉卒決無屢發不愈兼之婦科患此即不論脈與症亦當擬度其胎況有脈可憑有症可據有因可問是以預許為胎癇之疾今方中具有收魂養神鎮驚消痰補虛潤燥種種妙用全無方書所用胎藥一概出乎心裁男澍謹識肝風眩暈姜吉甫翁令正據述今春分娩得子甚小患胎風症不育今秋燥氣異常患咳者比比及大雪正值腎陰當權得咳嗽氣促畏寒之恙每臨夜兩顴赤如火烙認為寒邪外束與以疏散之藥數日未效然亦不介意偶於五鼓時忽然眩暈四肢如麻倏時冰冷人事默默胸緊氣促喉內痰鳴逾時方醒醒而復發醫者認為虛寒痰厥進附杞陳半之劑未中余見其形體清瘦脈來弦數勁指問知數日不寐寐則口中亂語且睡中每多驚怖如墜於地唇舌二便如常因謂曰尊閫之體肝火太旺以致血燥無以蔭胞所以胎小而多風即今之病亦屬肝風之症夫人之一身心高腎下水火固不相射然須相濟經曰君火之下陰精乘之今元陰澆薄何供所乘所以火愈炎木愈燥風愈張風火相煽心主撩亂而人事眩暈矣治法發散攻下溫補諸方皆不相宜發散而火愈升攻下而陰愈亡溫補而陽愈亢即補水之劑亦後來調養之法施於此際殊屬迂遠大約木喜調達風宜靜鎮火宜滋潤遂其生髮之性不令抑鬱枯槁使守其常而不變吉翁聞余議頗不以為非促令疏方連進數劑而愈附方當歸白芍丹參丹皮桑葉川貝柴胡薄荷棗仁黑麻洋參麥冬天冬甘草金銀煎湯越旬日人事清健諸病頓除更委善後之法余診畢論云尊閫玉體清瘦脈來尺澀關弦夫澀者血虛也弦者肝燥也至於形質在五行之中稟木火而生者其為人也性急主正直主多驚主多怒主善憂主善敏種種不一大抵木有凋謝之日又有生髮之期火有遏止之時又有炎威之候而火生乎木木又畏火前此之眩冒肝風張也吾不用驅風之藥但取養肝潤燥之品既已呈效今囑善後所云補水之劑可參用矣誠能怡情善養藥餌平調滋潤苞根不使枯槁作燃即保無虞管見酌方後如葉夢即當賜音召診附方地黃人參麥冬茯神當歸生芍枸杞萎蕤阿膠肝風撮指楊桂生初起嘔吐繼而呵欠甚長腹中絞痛難以名狀身搖心振十指緊撮自謂爪掏肉痛頭汗氣蒸如雨發經片時已而復發日延數醫用盡驅風化痰之藥而無效驗咸謂方書罕見決無治法余診其脈沉伏中忽顯弦數弦數中忽然沉伏診畢一醫旁問曰先生此何病也余曰木強土弱肝風病耳試觀瘧之初發始必呵欠今嘔吐呵欠腹痛顯系土衰木往乘之所以胃中不能容谷肝陰被火所劫是以筋急而牽引撮緊但肝為剛臟一切逐風辛散之藥反能助火劫陰豈非愈加其病況風熱雖一而木屬有二若病在少陽甲木之風熱固當仿小柴胡之制今病在厥陰乙木之風熱又當變通小柴胡之制仿喻嘉言先生所謂丹田有熱胸中有寒之例治之二劑而愈附方桂枝白芍柴胡姜夏黃連乾薑膽草山梔甘草一得集附四肢拘攣周秋帆茂才內人懷孕數月一日周身痛痹四肢拘攣肌膚及手指掌皮數變如蛇蛻之形驚痛交併恐成廢疾余診脈得浮大按浮為風大為虛此營衛不固血虛風襲之候也原中風有中腑中臟中經絡血脈之分故見症各著其形今起居如故飲食如常外無六經之形症內無便溺之阻格惟苦肢節間病風中血脈奚疑處以當歸四逆湯當歸重用佐以一派祛風之味連進四劑而愈當歸四逆湯方見卷二虛寒門首案頭痛門肝腎陰虛黃錦盛頭左大痛醫以為偏頭風凡疏風清火之藥服之其疼愈甚觀其脈盛筋強縱欲必多以致水因下竭而火愈上熾宜養肝以熄風滋陰以潛陽仿仲景濟陰復脈之例參入嘉言畜魚置介之法與何首烏阿膠胡麻麥冬白芍菊花桑葉牡蠣龜板藥下其痛立止惟其房勞不節加以服藥不堅宜其愈而復發也凡陰虛頭痛之症法當準此清陽不升曾魁星六月由家赴灣舟中被風寒所客惡寒頭痛連進發表頭痛愈甚又與歸附芎芷之屬頭愈不耐呻吟床褥同事中見表之加重補又加重且有呻吟不已之狀莫敢措手余診之脈來浮緩二便胸腹如常問其所苦僅雲頭痛問其畏寒亦惟點額又問飲食若何則曰腹中難過得食稍可又不能多食所以呻吟也余曰此中氣大虛清陽不升濁陰不降以致頭疼不息過辛過溫非中虛所宜本宜補中益氣則清陽可升濁陰自降而頭患自除中虛自實但因前藥辛溫過亢腎水被劫故舌苔滿黃小水短赤故用益氣聰明湯果一劑而愈可見醫貴精思不可拘泥也益氣聰明湯黃耆人參白芍甘草黃柏蔓荊升麻葛根痰火上攻傅璜生苦頭痛嘔吐黃水膠痰口渴喜飲熱湯發熱惡寒診得寸口洪滑此諸逆衝上皆屬於火之症因令先服滾痰丸繼服小承氣一劑頭痛如失嘔吐亦止外症反加熱象目赤鼻乾小水短赤咽喉作痛口渴喜熱細察之悉屬陽明之火其喜熱飲者同氣相求之義有非中寒者比遂與竹葉石膏湯加茶葉一劑請症方清後與六味丸調理而痊可見醫之為道權變在人倘入庸手見其惡寒嘔吐錯認外感誤投散劑其火豈不愈升乎又如口渴喜熱屬寒之論要未可膠柱而鼓瑟也附後治張宇山卒然頭痛因前醫誤服附桂理中等藥以至日晡尤甚診得寸口洪大令服大柴胡倍加大黃兼進滾痰丸加茶葉二劑而愈按此二症乃實熱挾風寒痰火上攻之患也滾痰丸青礞石大黃黃芩沉香小承氣湯大黃厚朴枳實竹葉石膏湯方見卷一傷寒門首案與龔漁莊先生論頭風原委治法書頭風一症古無確論原風雖屬陽邪實有內外之分淺深之別病多委曲治少精詳且更混列於頭痛門悖謬不可勝紀惟近代葉氏黃氏始有頭風失明之說僕鑑頭風害目之流弊頗得其旨知眼科內外諸障即方脈科之內外頭風也日者仁兄語以頭風之病欲為急治且謂多因飲食失宜煩勞過度以致內風為患足下雖未習醫不啻深於醫理者及今診脈益信不誣蓋頭痛一症或風或火或寒或痰而脈遂成或浮或數或緊或滑之形今脈來主緒清晰絲毫不紊且來去應指純靜在叔和則謂六陰永壽之徵在太素則稱脈清品貴之驗正岐伯所言眾脈不見眾凶弗聞然脈既無病則內無實據之風火寒痰可知而其所以頭痛者誠以縈思過度加以夜坐氣升擾動肝陽化風內起夫肝為剛臟體陰而用陽又經言肝為將軍之官謀慮出焉內因之病當從此臟悟之夫肝喜疏泄故常有夢遺精泄之症又上盛而下必虛故見有足寒筋惕之症且肝陽既已化風內動必乘陽明而走空竅故兼有牙齦牽痛之症竊擬頭形象天為清虛之界惟風得以居之夫肝陽伏則風熄而鎮靜肝陽升則風旋而鼓舞足下之頭痛時止時發者關乎肝陽升伏之故也內經以目為肝竅內風日旋肝陰日耗神水消爍清竅遂蒙陽亢陰涸其明漸喪然則頭風害目之弊亟宜除之僕嘗揆人身一小天地天地不外陰陽以為運用人身不外水火以為健行審症當求虛實治法必從標本足下水非不足火非有餘只因肝陽上行逆僭不肯下伏潛藏至於用藥大旨不過和肝熄風育陰潛陽已耳然猶有權宜者務在識機觀變巧施手眼風若鼓時乃標重於本則兼治標以固本凡輕清甘緩抑揚之味不得不為酌投風若靜時乃本重於標則當固本以除標凡介類沉潛柔濡之品不得不為亟進審度於可否之間權衡於化裁之內必使腎陰上注肝陽下降庶幾清空之竅永保光明之舊矣辱承下問敢抒蠡測惟仁兄鑑之一得集附眉稜骨痛夫病有未經臨治之症亦必有未經用過之方果症奇耶抑方奇耶總之內外之因變幻不一未經臨治之症汗吐下消和溫清補八法凡未經主用者皆當觸類旁通分經別絡為之主用其間而收捷效者乃曰善王子冬臨治林用禮心腹氣痛牽引頭巔綿綿半載猶可治事偶因用椒炒雞兩塊下咽頭痛如破神昏氣喘不敢稍動診得脈如平人不疾不徐惟眉稜骨內痛如刀刺天明痛發至午如刺至夜如失余臨症十餘載未嘗一遇即平日所讀書中亦不見載慚愧實甚勉從厥陽上冒雞性助肝之旨且痛甚於左眉骨用熄風和陽兩劑不效更進清肝涼血之劑亦如故竊思痛發天明正肝木旺於寅卯顯屬肝火為患治之不中肯綮其理安在復將三陽頭痛疆界辨別計眉稜骨屬陽明陽明者胃府也經曰葛根陽明藥柴胡少陽藥於太陽有何涉乎此三陽之藥治三陽之病稍遜毫釐尚無干涉今眉稜骨痛果陽明胃火而主治厥陰宜乎罔效乃疏以石膏石斛生地丹皮之屬佐以葛根為使服之果獲全愈余甚愕然怪其速愈也一日檢閱諸書適見張氏醫通於頭痛門中集有眉稜骨痛一條分虛實兩途並用選奇湯虛加歸芍實加葛膏又曰虛而痛者天明時發實而痛者晝靜夜劇此雖與余治驗痛發天明屬熱稍異足徵先賢纂述用心頗苦想張氏當日集頭痛諸症特拈出眉稜骨痛一條多屬陽明風熱之語以一時之心裁啟後人之端緒者多也若曰分門別匯之症先賢皆經臨治溯百歲之師未嘗盡遇也所謂審機之士不拘於文通變之才自符千古亦視乎人之心思耳
