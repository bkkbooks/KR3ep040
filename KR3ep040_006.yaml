body:
  text: 卷六痙厥門太陽傷風熊繼先乃郎半歲肌膚嬌嫩笑舞愛人繼先常與余言可喜余曰凡嬌嫩之物最忌風霜當預防之繼因見其易於撫養乃私議余言之非一日患傷風小恙鼻塞咳嗽醫以二陳蘇防之屬因而得汗即至嗽聲不出氣急神揚尚以不嗽為效蓋不知外感以有嗽為輕以無嗽為重又誤進蘇子枳殼之屬下咽未久忽然目珠上瞪四肢抽掣又誤進鎮驚丸諸醫見其小水短少更與疏風之藥加入淡滲之味繼因見病急未服危迫之頃先自謝罪懇余治之遂疏桂枝附子湯與服爾時變症愈出忙煎灌之一劑而風痙自止再劑而諸恙悉痊嗟嗟藥只一方二劑而成功旦夕者原有自耳此正分經用藥之妙也仲景云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝附子湯主之蓋此兒陽氣素微汗之有亡陽之變夫汗為心之液四肢為諸陽之本小便為陽氣之化誤發其汗陽越於表津弱於里營衛將離機關大亂是皆太陽陽亡之象亦誠危矣欲返太陽之陽必當循經引治故以桂枝色赤屬火入心之品用附子以補心腎之陽元府不密賴白芍酸以斂之也津弱筋急處甘草以緩之也營衛不諧藉薑棗以和之也一方之中如此妙用乃仲景之深心正為太陽救逆之法舉世不察徒事驚風之説千中千死執迷不悟總由不究六經之義耳夾食傷寒吳聚群令愛發熱頭昏目珠上視四肢逆冷然唇燥溺短病情已露於外而醫者泥其發厥更見其軟弱困倦欲以燈火薑附急施適余至而切止之因辨之曰此夾食傷寒症也雖四肢為諸陽之本因食停胃中加以新寒外入以致胃氣抑鬱不能四達故發厥而昏沉乃大實有羸狀即此類也且既無吐瀉之因又大量汗下之後此先熱後厥明是熱深厥深之病安得認為陰症耶以檳榔丸一劑下出膠黏之物一團而人事遂醒但厥回覆厥更以四厥散升散表邪推泄裡熱復微熱微汗而諸逆悉解似此人鬼關頭不過先攻後和兩法未費周張二劑以生此陰陽疑似之症最宜詳辨四逆散柴胡白芍枳實甘草各等分檳榔丸方見卷三腫脹門食停中焦表裡不和三條薑德華之子二歲潮熱不退胸緊氣促諸醫用盡柴前陳半枳桔芩連之屬毫無一效遂爾手足抽掣角弓反張煩擾啼哭夜間尤甚燈火湯藥雜投無數皆言已成驚風必死之症德華來寓邀治視其體肥面白唇焦齒燥舌苔灰白黏涎滿布舌尖略有紅刺胸緊氣促七竅乾燥小水短赤大便通而不燥潮熱異常四肢指尖微冷細詳此症乃風熱痰三字合為病也覽前醫之藥頗是何故更加抽掣反張也此中宜急講矣夫醫只執迷清火化痰之方而不知有下痰瀉熱之法蓋柴胡發散而於驅風無益陳半枳桔雖稱化痰今施風熱之症豈非愈燥痰涎乎芩連只能清火卻無瀉熱磨刮之功延纏日久風無出路痰愈膠黏而熱愈甚小兒筋骨柔脆身中風熱既久津液必然受灼機關愈阻經絡如焚安得不為抽掣反張耶考古惟防風通聖散正為分清表裡兼能驅風瀉熱使風乃從外解熱從下出其痰不治自除其風不截自止定見如是直許可治姑與通聖散開水調灌大解一次其哭稍定反張略止隨進通聖散方除麻黃白朮加蔞仁檳榔二劑遂下膠痰數塊如雞子大黏結腥臭異常乃身中津液痰涎愈蒸愈結之物也病隨藥愈衆稱神治此症小兒頗多皆由在表失表在裡失里延纏多日遂成此候醫者病家多執牛黃蘇合抱龍等丸外用燈火亂燒概不知此取用余治斯疾頗有所悟今録之可為小兒另開生門之法後之幼科得覽是編未必非臨症之一助云防風通聖散方見卷二痿證門表裡風熱郭大興之子因食桃李甚多腹痛口渴四肢厥冷泄瀉半日飲水即吐以後大便不通人事雖困然吐聲甚洪痛聲甚厲舌雖不燥而唇極焦一醫不明先泄後閉之義更不細審內伏之情且不知沉澀之脈妄謂無脈迫以附子理中急投余見而止之與左金合四逆散加元明粉五錢下穢物甚多而痊蓋桃李生硬難化之物最能助肝犯土阻格中焦以致胃氣抑遏故腹痛而厥乃陽不能舒布之象起先腹痛下利不過熱結旁流之泄究竟燥結未下故雖利而痛不減後因水入即吐腸中稿而無下利矣古云食不得入是有火也且因吐瀉甚頻舌雖不燥而唇已焦勢雖篤而聲甚厲種種明證如寶炬當空幽怪悉顯奈何其醫匆匆不察遂有毫釐千里之差古謂醫者意也如操舟之工如對敵之將其可不盡心乎左金丸方見卷二痿證門陽縮不伸四逆散方見前本門夾食傷寒吳啓明之子甫及周歲發熱嘔吐泄瀉迸迫煩躁不能少睡大渴飲水不休醫者誤為脾胃不足之嘔虛陽發外之熱津液下陷之渴與七味白朮散一服遂至兩目上吊角弓反張肢體痙強牙緊氣促唇口齒舌乾燥而不可解余知此症乃疫邪傳胃未經清解以致協熱下利直以葛根黃芩黃連湯一服病氣大退再以小柴胡湯去半夏加花粉二劑而安蓋啞科之病人皆詳其外而略其內所以頭疼身痛胸中膨滿小腹澀痛大便熱泄人所不知而醫者又不詳為諦審徒執白朮散為渴瀉聖藥一語致令疫邪愈熾熇熱偏強小兒筋骨柔脆極為難耐欲其不筋脈牽引變為痙症其可得乎余因解肌清熱將表裡兩症外內合邪一同並解記此一案不僅協熱下利之繩墨尤為幼科疫疾之鼓鍾矣此症著眼處全在泄瀉迸迫唇口齒舌乾燥而不可解上諦審葛根黃芩黃連湯仲景葛根黃芩黃連甘草或加薑棗小柴胡湯仲景人參柴胡黃芩半夏甘草薑棗風濕相搏吳德華之子十歲藜藿之兒血燥之體忽然發熱惡寒小水短赤腹中甚痛醫者誤認食積端行消導次日足不能移並無紅腫撫之甚痛痛聲驚人甚至口喎反張醫者又稱驚風連進鎮驚抱龍等丸病日漸重余曰素稟血燥其筋易急先必涉水濕入內繼必傷風寒濕相搏客於經絡名為痛風非病痙也當與導濕疏風清燥之藥如法治之果愈此亦治病相體之一驗也附方蒼朮黃柏桂枝白芍靈仙防風荊芥山梔防已寒水石甘草生薑大棗熱瘧似驚三條黃應保之子四歲潮熱不退醫以消導發散漸變昏睡露睛默默不食醫者不知有熱甚神昏之例謬認為脾土虛敗誤投參朮之劑愈加昏睡目瞪上視又以牛黃抱龍等丸迭進益趨於危余揣其遍身熇熱內熾舌苔滿布此是溫瘧確據因謂此症乃溫瘧之屬未得分清故變痙耳與達原飲一劑是夜得汗熇熱漸減次早仍熱如前又與達原加元明粉一劑方得表裡兩和汗利熱退身安舉家咸議病愈不樂余曰未可明日瘧至必然又熱但少輕耳轉方以清脾飲藥方煎時果然又熱傍晚汗解次日更加烏梅而退原此症余治經多人成效可紀蓋小兒稚陽之質三陽之邪發熱頭痛畏寒胸滿口苦之症概不能言醫者不加詳審誤治而致死者不知幾許考古法惟夏禹鑄有熱瘧似驚風之説誠足補前人之未發也後黃培蘇先生乃郎悉同此症醫以發散消導養陰理脾誤治變痙余視其神昏熱熾舌苔堆積如粉且有齘齒咬牙明是溫瘧確據賜明胃熱已極奈其家信任前醫執迷不悟猶以養陰理脾之藥瘧邪愈閉出路無由為可惜也達原飲檳榔花粉草果白芍黃芩知母甘草清脾散青皮陳皮厚朴柴胡黃芩茯苓白朮甘草草果生薑一方加檳榔大渴加麥冬知母吳月山乃孫體肥痰盛暑月發熱嘔吐昏迷不醒目往上視角弓反張一二時久汗出略醒醒後微熱不息人事昏沉每日皆然前醫所用之藥一概鎮驚祛風化痰行氣數手雷同其病愈重余視其面色黃滯舌苔浮黃雖嘔吐發熱反張上視然而發作有時知病在脾胃以脾主信故也仿夏禹鑄熱瘧似驚之例連進清脾飲而安須知痙症癇症斷非發作有時耳脾虛癇搐傅芬圃之子忽爾眼翻抽搐喉內痰鳴胸緊氣促發熱汗出蓋不知為虛風之病乃歸咎於神煞所害醫巫雜治合室惶惑余至其廳鑼鼓宣揚男婦雜集聲滿房中急為視之面色黃白浮浮兩眼白珠純青一老婦擎杯灌藥余將藥嗅乃麝片之香因擲其杯大聲曰此等治法真屬可笑先令將鑼鼓停止蓋病全是虛怯正當安神為上鑼鼓聲動驚則氣散其藥雖云截風內有麝片皆能散氣耗神且天氣暑熱加以人氣滿房薰蒸逼熾倉迫之際縱有明者主張醫者高見亦當怵惕塞機將何恃以望生耶品翁敬服辭巫散人診其額熱氣冷胸緊痰鳴便泄尿短黑珠上吊角弓反張此乃脾虛癇搐之證誠由胃氣久弱不能運化乳食痰涎凝滯於胸阻塞靈竅為病蓋陽明胃者主束骨而利機關飲食入胃遊溢散精上歸轉輸宣布灑陳之義全賴胃氣運行之力今胃氣既困機關不利運行失常所以反張直折治之之法全以助胃扶脾為主但使胃氣旺便能復其稼穡之常運行之舊其風豈非不截而自止乎先與理中丸調灌隨以星附六君子湯加天麻鉤藤數劑而安厥陰腹痛王志耕乃郎半歲夜半腹痛啼哭不已以熱手重按其腹似覺哭聲稍可久以仍否延諸幼科無非行氣消食誤治兩日目珠上瞪四肢微搐余視其面色赤中帶青目中白珠頗藍手足指尖略厥小水直無指紋透甲危急之頃靜神默悟詳推此症原是寒邪入里與方脈寒症無異意擬薑桂通陽然細察面色唇舌二便又非無陽可比倘辛熱誤用而稚陽之質勢必血燥津涸愈增筋掣瘛瘲因思肝藏血寒傷營非養血通脈寒可由解痛何以除先以燈火焠腹疏通凝寒以仲景厥陰篇當歸四逆湯一劑霍然肺竅壅塞陳調元之子五歲忽然昏倒目瞪鼻扇咽喉氣壅兩手握拳舉家大哭時已傍晚同輩環視莫敢用藥余用通關散吹入鼻中連搐二管始得一嚏又搐一管連得二嚏復用紅棉散蔥湯調服一錢令其裹取微汗立時即瘥此幼稚肺氣嬌薄腠理不固感陰物惡毒之氣阻塞肺竅清道壅而不宣者取其嚏發其汗則塞者開而壅者通矣紅棉散白礬二錢胭脂一錢燒灰存性通關散細辛皂角等分霍亂門消渴哮喘目盲啼哭附風熱內蘊七條許靜常乃郎素稟陽臟形骸骨立暑月焦哭不安漸至煩渴因而吐瀉醫不察其吐瀉由煩渴而來並不察其煩渴為陽臟所生誤以藿砂燥胃參朮補脾乃至手足搐搦角弓反張余視其頭毛作穗獨左腦側隱隱覺高知為火毒內攻熱盛生風之候所喜危迫之際其腫色隱隱尚紅許以可治時有同道在旁私議余之張大其詞也疏方以石斛為君合麥冬知母桑葉枇杷葉丹皮薄荷荊芥之藥服下而風痙大緩吐瀉頓止隨加生黃耆金銀花再劑其左腦側果然高腫聳突神識清爽乳食寤寐如常尚有微熱微渴更以清胃疏風排膿托毒之藥服至十餘日外膿出而安五弟啓明問曰煩渴吐瀉之病本屬夏月霍亂之症詳考幼科諸書並無此等治法其中原委請明示之答曰此症蓋察其陽臟為患而陽臟多火與焦哭之症相合漸至煩渴吐瀉較之陰臟猝然吐瀉者大不侔也經云暴病非陽久病非陰是已且小兒風火內伏之症吾嘗悟出治法成效可紀蓋仿仲景熱邪下陷嘉言逆流挽舟之法而變通也須知一病當前縱然變態千般必有所以致病之情既得其情病斯起矣試觀小兒夏月之病雖多然有瘡癤者少病無瘡癤者多病況瘡癤出則吉不出則凶乎夫書不盡言言不盡意惟在後人神而明之許先廷之孫暑月吐瀉發熱肢冷躁擾口渴諸醫以藿砂陳半烏梅扁豆之屬不知辛溫之藥已為揚湯止沸再加烏梅扁豆固澀鬱火逮至反張直視已無生機余細視面色既非虛寒亦非實熱無從逆挽只得辭治其家堅留察其滿頭癤毒概已靨陷惟左腦後大癤尚隱隱若紅且腦側及項漫腫頗闊主腦在此余謂此子生機或在於此蓋風熱內蘊未得外達勢必內陷擾亂腸胃以致吐瀉交作而為霍亂之症也醫者不知風為陽邪寒為陰邪之理概以風寒稱之更不究辛涼辛溫之別風火之病誤以辛溫治寒之藥邪火內迫筋膜乾急則反張抽掣近世不察者多更治以抱龍牛黃等丸勢不竭絶不止疏方與連翹乾葛防風薄荷知母丹皮木通山梔燈芯甘草灶土與服乃孫不知藥苦口渴之故立時服畢頃刻安睡吐瀉漸稀風痙亦息次早復視兩癤悉皆高聳仍與前藥二劑小水甚長吐瀉頓止其家見頭項愈腫為慮余曰兩癤必俟透膿其腫方消前方除梔子加參耆貝母二服果得大膿頭項腫處皆消後以清養胃陰之藥洋參石斛苓薏桑葉麥冬甘棗之屬而痊附家滿春之孫亦是吐瀉交作發熱肢冷醫以藿半辛溫之藥致發剛痙察其舌刺唇裂皮膚隱隱帶紅余謂此症風火伏於血分名為流丹不達內攻臟腑告變最急亦同前意加丹皮荊芥果得遍身紅赤更與疏風涼血而安許秀翁之子半歲時屆大暑發熱嘔吐泄瀉色青口渴飲水溫涼補瀉雜投漸次沉困視之舌時外舐苔現黃滑唇紅帶皺喘急氣促且通面火光炎炎時忽驚怖顯屬熱症理宜前醫清劑可效為何不應更視其瀉色純青知有風邪夾雜其中其實熱蘊於表風陷於裡所以揮霍撩亂而為上吐下瀉理宜從感冒而治法當使風邪達之於表而出令熱邪歸之於里而下則表裡清而上下和不治吐而吐自止不治泄而泄自止表邪清則熱可退里邪清則渴可除遂疏防風乾葛連翹赤芍蘇葉白芷半夏黃連甘草燈芯灶土一劑下咽遍身發出紅塊如丹癮甚癢此名疙瘩風乃風熱久客內蘊成毒之驗也再服二劑諸症悉痊然此症若不如此體認為之解肌清熱其丹決不能出必致閉毒而死雖死不明其故記此一案後之學者其知所取用焉許永茂之子三歲六月吐瀉口渴煩躁醫以藿香正氣之屬煩熱愈熾吐瀉愈急可知不受辛溫之藥余視其面色皮膚俱蒼黑二便苗竅俱有熱象而腦後數癤色晦不紅已有陷狀遍身雖熱而指尖略有厥意此是熱深厥深唇乾齒燥揚手擲足熱邪確據其家以為驚風欲與抱龍牛黃等丸強為止之余知為風火擾胃癤毒因吐瀉內陷急以辛涼疏風解表清熱之藥囑其必有紅丹外出便是佳兆服後躁擾不安復延余至仍將原方加入生耆石斛重用防風連翹再劑腦後癤毒悉皆高突出膿俾得安睡再與甘露飲二劑吐瀉頓止熱退而安須知風火內蘊擾亂胃中故見吐瀉交作必使風火外達庶幾中土安謐胃氣一清吐瀉自息此症頗多古罕發明宜留意焉附莊生之子周歲暑月煩渴吐瀉醫以柴葛藿半之藥症變四肢厥逆角弓反張余視其滿頭癤痱已將靨陷且頸項胸膈攢發天疱大如龍眼小如豆粒俱皆平陷知為毒氣內攻辭不可治病家再四挽留惟左耳一癤尚屬鮮紅余擬生機僅在於此疏以參耆荊防翹芷木通甘草燈芯灶土之劑藥下四肢漸溫耳癤出膿煩渴吐瀉減半是晚復視令前方重參耆再進次早又視煩渴吐瀉頓止天疱略起生氣勃然許以無憂蓋風火透於外腸胃得安也然肝木尚旺經絡不舒故四肢搐掣未息復將前方除荊芥白芷加鉤藤羚角米仁緑豆殼疏風清熱囑其再服其家見霍亂已愈風痰未息意謂僅當祛風自取牛黃抱龍蠟丸與服天疱一時自破原此二丸俱有麝片角弓復震促余再視昏沉不醒小蠅叢集拂之不去事不可為嗟嗟余焦思勞神功虧一簣惜哉楊鴻超乃郎陽臟多火煩渴吐瀉病因乳母冒暑赴席醫以夾食傷寒治之乃至大熱躁擾而成危候蓋暑邪內攻之恙反以辛散溫胃之藥而火愈熾耳視其頭面癤瘍已變平黑氣急神昏齘齒咬牙舌苔黃刺口渴不止所泄迸迫如箭余知為陽熱拂鬱於胃與甘露飲日夜頻進二劑諸病大減再加黃耆銀花遂癤瘍奮起仍轉紅潤而安然癤瘍變色有陰邪內盛之黑氣血內衰之黑其顏色苗竅與此不同甘露飲生熟地黃茵陳黃芩枳殼麥冬枇杷葉石斛甘草天冬木邪剋土六條黃杏簾孝廉侄女煩渴吐瀉昏睡露睛醫以丁蔻理中治之反變手足厥冷時靜時擾神形驚怖風木侮土之據面色㿠白唇紅帶皺滿舌白苔心中煩躁此脾虛有火表邪內陷陽氣抑遏不能敷布於四末風木肆侮於脾家與四君子加柴葛知芩服下遍身瘙癢風邪外達之徵再劑而安傅兼金乃孫夏月吐瀉視其神慢眼大白珠帶青發熱口乾所泄澄徹青色知其脾虛胃弱進香砂六君連服數劑其症不減復視之更用柴芍六君加防風三劑而愈此風泄之證乃土虛肝風侮脾所以其色青緑非補土製木兼用宜乎不應可見用意用藥毫釐之不可忽也李貫英乃郎四歲於季夏月初則泄瀉不以為意致加嘔吐口渴時言腹痛泄瀉甚至滿床皆汙瀉後又言腹痛自始至此並無寒熱有云是霍亂者有云是食積者究未能審其病情愈治愈篤逮余至云時下霍亂雖有嘔吐泄瀉必有寒熱之表見今兒始終無之固非霍亂也若云食積固有腹痛泄瀉然瀉後腹痛必減今瀉後而痛不減者知非食積也此兒脾氣久虛肝木得以乘之責之土敗木賊是以吐瀉不止使非補土製木何以匡一時之急乎瀉久胃中必虛蟲無所養諸多蛔蟲必貫膈間吸其津液為之拒食所以嘔吐口渴亦有之今仿劉氏所制痛瀉要方加以制蟲之味豈非病藥相當乎以白朮補脾燥濕為君白芍瀉肝緩痛為臣陳皮利氣為佐防風引經為使加以烏梅之酸川椒之辣既有安蟲止吐之妙又有生津醒脾之功方成藥就數劑而安周祉華乃孫向有疝疾今秋痢後泄瀉已獲小愈而食物未節忽又溏泄身熱嘔渴煩擾躁急乳食不進察其神色均屬脾胃大虛十指稍冷右手尤甚外腎右睪丸脹大紅赤諸醫咸稱當以疝氣為治藥宜辛散余曰此症脾胃大虛土受木克治當大培土氣兼制肝木否則厥陰陽明合病最防吐蛔而生變以苓朮薑桂連柏烏梅酸苦辛熱之劑藥方煎時竟果吐蟲急以藥進始獲略睡再與前藥加入川椒一味是晚安臥熱渴嘔泄頓止睪丸脹大遂消愈後其醫謂余畏薑桂之熱故以連柏監之豈知厥陰之症每多寒熱錯雜之例用藥安得不如是乎楊協勝之女寒熱咳嗽腹痛泄瀉醫者未知痛一陳瀉一陳屬火之例木強反克之理妄用消耗之劑漸至面浮氣促食減羸瘦又誤用耆朮之藥潮熱愈重痛泄愈多延綿兩月衆謂童癆難治乞余診之先與戊己丸作湯二劑痛泄頓止繼以瀉白散合生脈湯二劑潮嗽皆安戊己丸黃連吳萸白芍各等分生脈散方見卷二虛寒門誤表戴陽瀉白散方見卷一傷寒門溫熱傳變鄧維明之子暑月嘔吐泄瀉視其面色青白糞色清澄乃木強土弱肝氣乘脾用益黃散一服兼進六君子加白芍二劑而痊益黃散飛霞治食積盜汗陳皮五錢青皮四錢訶子肉四錢甘草四錢丁香二錢暑邪入里周慶華乃孫因乳母冒暑哺乳暑邪入胃一時吐瀉交作醫以夾食傷寒治之投以正氣散辛溫發散以致大熱躁渴更醫見熱勢升騰又以白虎湯治之大寒重墜以致熱邪入里而成四肢厥逆又復更醫匆匆一視見其肢厥即與附子理中服之殆至奄奄將息冷過肢時不食不嘔不哭不便復延群醫環視咸稱不治棄之一日未見其死始延余治視其四肢雖厥而肌膚尚隱隱微紅唇齒乾燥滿頭猶熱且眼眵乾燥溺出極臭知為暑邪入里與傳經熱症相同所謂熱深厥深熱微厥微之症也意擬解肌清熱使邪氣分消但四肢厥逆已久胃陽抑遏已極不能敷達於四末先當和解表裡宣通胃陽然後解肌清熱方為合法即煎四逆散以柴胡發少陽生氣枳實疏陽明抑遏芍藥斂陰和血甘草和中補土更煎米飲和服取其助胃生津服之片時果然四肢溫和神氣清爽大便亦通立時吮乳食粥復與防風乾葛連翹赤芍燈芯灶土之屬果然遍身紅赤瘙癢之甚再劑而安門人問曰此症暑邪入胃吐瀉交作之時不識何藥可治答曰暑令吐瀉必先辨臟腑陰陽次審陽暑陰暑以及風寒食滯之有無苗竅便溺之症據煩渴之真假病因之傳變所謂必先議病而後議藥也但此症初起既知陽暑若與四味香薷飲服之豈不冰解乎而四肢厥逆一症原有陰厥陽厥自古分晰甚明奈時醫一見肢熱輒投寒劑若遇肢冷靡不溫燥遺害不可勝紀皆由不究陰陽真假之疑似耳考薛立齋治小兒吐瀉之症亦以手足並熱為陽手足並冷為陰教人如此認症未免千慮一失蒙害至今未已可見立言之難非敢駕過前人也春傷於風傅彩鳳之子三歲自春至夏肌膚熇熱形體瘦極慘慘不樂大便泄瀉每多鮮紅諸醫用涼血之劑泄瀉愈頻又與四君子湯潮熱愈大口愈渴余視其慘慘不樂似屬陽氣不舒且潮熱無汗面雖白而帶青舌雖淡而頗紅再視所泄之糞逾時變青此必風邪鬱於土中正春傷於風夏生飧泄之症因風邪內擾則營衛不固而血液迸流致陽氣愈陷矣仿經旨下者舉之之義與升陽益胃湯數服而安升陽益胃湯東垣方見卷三腫脹門陽氣不升冷熱互傷黃錦階先生乃孫飲食未節又誤啜冷水因而吐瀉交作發熱口渴前醫已進藿香正氣散服後躁擾不安揚手擲足號哭不已稍靜則氣急目閉轉瞬間仍嘔渴交作躁擾之極深夜邀視細看苗竅顏色尚非虛象然而情形張惶躁擾可畏竊思此症內傷飲食之寒熱外感不正之邪氣阻遏中焦寒熱交迸上下奔迫腹中絞痛不安故爾躁擾號叫方書稱為濕霍亂俗名絞腸痧是也以寒熱邪氣交迫藥當寒熱解散互用於是取胡椒二十粒緑豆四十粒一寒一熱搗碎煎水一甌用以和其陰陽另以棉紗一扎取其一轉一旋足解其絞結煎水一鷗二湯和勻原口渴不知所辣下咽亦受啜盡乃安次早復視面色淡白舌苔浮黃尚有微熱微泄知脾胃雖傷而虛中挾火當用清補無疑與六君加石斛桑葉而愈按此症急時不得其藥而竟撿俗方用者所謂禮失而求諸野也三焦鬱火胡永隆之子三歲其弟久隆之子四歲時當夏季患煩渴吐瀉之症俱付幼科醫治病勢轉劇惟永隆求治於余視其汗出煩躁飲水即吐泄瀉迸迫小水短赤舌乾芒刺中心黃苔甚厚時時將舌吐出因干刺故也細為思之與仲景所謂太陽中風發熱六七日不解而煩有表裡症渴欲飲水水入即吐名曰水逆治與五苓散者相符但此症煩熱蓄盛三焦有火宜加苦寒之味引之屈曲下行妙在劑中之桂為膀胱積熱化氣之上品又合熱因寒用之旨庶幾小便通而水道分清矣以豬苓茯苓澤瀉白朮肉桂黃連梔仁二劑而愈附脾胃困憊久隆見余治效之速始投余治抱出一視大為驚駭面現五色惟目中神彩尚存生機只在於此謂曰此症全因克伐過傷脾胃中土困憊其唇紅口圈青黑者即脾胃敗也鼻準黃而兩顴獨白者肺氣敗也敗症叢生本屬不治幸得五色之中尚有潤澤真臟尚未枯稿兼之目中精光了然雖有嘔吐猶時可納粥即有泄瀉尚未至於雞口牛後通盤揆之猶在方敗未絶之界所以許為可治但非參朮疊進固不能起久隆問曰昨舍侄之病苦幹煩渴吐瀉小水不通而先生乃用梔子黃連涼之今小兒之症歷歷皆然而先生乃稱重用參朮者何相反若是曰令侄之病全因胃中伏火勢如燔燎焰擾諸經為之揮霍撩亂故用苦寒之藥直清其腸胃之火使由小便而出而諸經自安是以煩渴吐瀉立止今令郎之症相隔天淵先天之體質不足後天之脾胃更虛乃因飢飽乳食致傷復因藥餌攻伐是虛上加虛矣脾胃一虛便失其傳運之職關門失禁所入水穀迸走肛門而出遂使津液下陷不能上升所以口乾煩渴脾失傳運肺亦言傷失其治節下輸之道而小水無矣此與虛陽發外之症同類並稱值此之際亟宜大固中州兼以保肺生津庶中土安而諸經健運有常此必然之理也倘誤認為火妄用苦寒定然神機寂滅成慢脾厥逆不治之症渠竟不信遂曰姑看晚間何如明早再請先生可也余曰醫有好生之心吾不忍其觳觫疏與四君子加附子合生脈散一方並囑勿復疑遲及余回寓旋延二醫或曰寒或曰火商進一派辛散寒涼之藥至以參朮為不可服同聲而和之逮雞鳴陰陽交界之時果變厥逆至黎明木旺之時中土告盡木剋土也忽變角弓反張而殞姑筆之以為擇醫者戒脾胃陰虛二條王啓元之子夏月煩渴吐瀉唇紅舌赤尿短煩躁啓元自知醫理疏就香薷扁豆車前滑石黃連一方未服商治於余視其面白神慢氣急多痰脈息微細顯系脾虛非暑熱之燥謂曰分利止泄解暑除煩固醫門之法則也然必因人而授因證而施今苗竅脈色脾胃大虛與此法全不相涉斯疾唇紅舌赤者津液由吐而上虧也尿短煩渴者津液由泄而下虧也與七味白朮散二劑煩渴略減再進六神散加枸杞十餘劑而安凡泄瀉脾陰虧者當仿此若脾陽虧者六神加乾薑為至穩之法用者詳之七味白朮散人參白朮雲苓木香藿香葛根甘草六神散人參白朮茯苓山藥扁豆甘草吳某三歲時值夏月患煩渴吐瀉醫以消食利水之劑愈治愈劇急延余治視其面色青白兩目神陷初泄迸迫如箭白沫甚多四肢虛軟時忽驚叫似此寒熱虛實錯見必須錯雜之藥仿古香連丸清火以逐垢加熟地補腎生水用白朮健脾燥濕以早米扶胃生金有金水相生之妙脾胃交治之法服之渴止煩減神清泄住人事大清隨令再進毋飲茶湯次日病減大半但時乾嘔不止胃虛發噦何疑微渴微泄津液下陷未升之故耳以前方加入參麥湯正甘酸生津養胃之品加竹茹柿蒂止嘔清火二劑全愈後以六神散調理勝舊此症近今頗多因筆記之胃氣不和李惟貴舉子甚遲今春末得子頗肥奈乳食缺乏夏中天氣燥熱乳母不慎口腹致兒受病患煩渴吐瀉之症付幼科醫治通用清暑利水生津消食之劑病轉危篤逮至慢驚之候目瞪聲直四處乾枯是夜來寓請救視其氣息奄奄面唇青白問其瀉下甚稀只是乳食入口即吐不能少停片刻遍身如火指尖略冷小水短少口渴不止一切敗症殊難逆挽然此症重處正在嘔吐口渴為急至於目瞪聲直都是津枯筋急之故雖用生津之藥奈胃不能受將如之何竊舍安胃一法決無生理仿仲景所謂汗下後噎氣不除食不能下者用旋覆花代赭石湯之例方中有赭石之重墜乃安胃之最妙者有旋覆花旋轉於上誠為胃虛客氣上逆之症而設合之生津解煩允為定法疏方與服其吐瀉煩渴略止二劑不復吐矣仍與安胃理脾之劑調理而痊後臨症此病頗多悉以此法加減治之皆獲全安孰謂幼科治法為易易耶初方人參白朮葛根茯苓麥冬烏梅半夏赭石覆花早米次服人參白朮山藥薏苡仁烏梅石斛扁豆粉葛地骨皮甘草早米陰陽兩虛熊惟謙晚年舉子甫及半周體肥面白先患吐瀉醫以二陳藿香扁豆之屬繼加煩渴更醫進七味白朮散入口即吐人事大困請余視之時靜時擾靜時氣急目閉動時角弓反張遍身如火四肢獨厥唇紅舌光乾燥之極囟沉睛白頭項青筋纍纍此乃陰陽虛竭本屬不治熊君素知醫理曰雖有靈丹奈胃不能受何余曰吾慮亦在此耳因思此症外顯假熱內本真寒四肢發厥元陽亦敗舌燥無津元陰亦損但救陰無速功回陽宜急治今格藥不入可見中寒已極必得反佐嚮導之法庶克有濟遂將人參白通加豬膽汁徐徐與服入口不吐乳食亦受四肢漸和余即回寓仍囑是夜再進一劑熊君慮其膽汁苦寒遂減膽汁仍然吐出因加日間所剩膽汁數滴下咽即受次早邀視身體溫和舌已生苔尚有微泄未除連服八味地黃湯加花椒而愈白通湯八味湯二方俱見卷二虛寒門首案楊甸成之子夏月發熱溏泄醫治兩旬氣短神倦其熱夜重日輕其泄日多夜少毛髮枯稿囟沉枕陷唇舌乾燥余曰陰陽兩虛也楊曰曾服石斛麥冬其泄愈多而食不進服人參白朮之藥其煩愈重而口愈干余曰皆錯也病屬陰陽兩虛藥當剛柔並進麥冬甘寒非陽虛久泄所宜白朮苦燥豈陰虛久渴可投酌為一方連進而愈附方熟地附子枸杞懷山扁豆山萸石脂甘草龍眼慢脾風四條聶秀章之子三歲尚不能行皆由體稟素弱時值長夏患煩渴吐瀉之症醫者不究其脾胃之虛執用外感之治誤投知連陳半之屬延經十日愈治愈危商請於余冒暑視之神已大敗呼吸將絶視其眼生翳膜肌膚削極吐瀉交作脾胃敗也小水赤澀泄多亡陰也口中時渴津液虧也聲微息促氣不相接也昏睡露睛脾敗不能合也四肢厥逆陽氣竭絶也手足微搐喉內痰鳴枯延無統也腦後腹上發熱虛陽外越也通計諸狀皆由脾腎兩敗真脾慢風症然喜尚能飲乳不輟但不能久乳因其虛而乏力之故衆曰此症患者皆死何治之有余亦蹙額躊躇然慢驚之證固由脾腎之虛至古人所制金石腦射之方後賢已闢其謬今極重之症非取後賢所選理中六君之藥大劑急投鮮克有濟遂將古方十全理中六君胃關之意加入驅風之品酌為一方每劑十兩之重每日夜令進三劑緩緩與服如灌溉之法欲其周身空虛之地無處不到每藥囑其戚人聶方兄督進毋令稍減如此三日敗症稍回神已漸醒四日內白珠赤脈貫眼口舌糜爛白垢滿布狀似積粉如月內小兒鵝口之形衆嗟熱藥之誤急欲更醫聶方兄委曲周旋邀余再視衆持改用涼藥之見余曰服補劑而眼紅口爛不但世俗謂之燥即醫者亦多謂之燥矣殊不知虛火上衝陽氣將回遊移不定擾攘於外尚未歸宅斯正岐伯先師所稱陰病見陽者生正屬可喜此時若改用涼藥勢此前功悉廢遂將開水拭去口中白垢仍令原方加熟地三錢以和其陰再進日夜三劑次早視之口中潤滑眼內俱清遂減一劑每日令服二劑逐日漸愈不一月前後共計藥三十斤肌肉充盛遂能趨步行走衆始欽服然余嘗嘆小兒之死於慢驚者多由於此即如此證設認定其虛或知其用藥而不能以重劑多劑救之是為病重藥輕延綿復死即進此方後多有陽回而現陽證者咸疑為熱稍無定見每多意亂心迷乃至大變其法改用涼劑無不立斃余每於斯證臨治之時苦心體察深恨世醫所治小兒吐瀉之證無分寒熱虛實端守辛散清涼之藥實者僥幸得功虛者脾腎兩敗露睛厥逆吐舌抽搐遂曰驚風復不分急慢虛實等情更以涼散香疏湯藥丸散燈火雜投以致二便不禁四肢冰冷五臟竭絶而死至死不明其故良可悲也近時人體稟氣澆薄夏月極多此症堪為痛心是以愈加精研博覽古訓參以拙見似有寸長久欲與同道勘破恐管窺之見有不盡然近年閲歷稍深凡治慢驚悉用此法屢驗不爽敢望同志之士共明夏月伏陰在內之理當先顧脾胃為主後察其六淫兼證戰戰兢兢毋傷其正庶幾得焉因名其方曰大回生湯大回生湯端治小兒夏月吐瀉及雜病誤治成慢脾風症一切脾腎虛寒發驚風實有起死回生之功人參白朮黃耆附子棗仁枸杞乾薑茯苓肉桂丁香白蔻鉤藤全蠍甘草用水一碗煎至不見水提起入夏布巾內取汁調赤石脂緩緩服後如吐不止加赭石調服薑夏同煎肝木旺者羚角汁調服痰盛者加泡星天麻腎陰虧者加熟地枸杞不炒泄止厥未回者加當歸引藥入於血分服數劑後或眼內翳膜不能退清加冬瓜仁二三十粒以潤肝燥小便利者去茯苓方內只有乾薑之性取其大能補火生土陰虛者未免有劫水之弊用者量之肺氣虛及津不生者加五味傅錦翁乃孫端陽後時忽吐乳未曾介意二十日外其吐愈多一幼科用藿香正氣散一劑開腸洞泄大熱發渴延余視之面色浮白兩目無神雖吐次多而無穢氣泄瀉頻而澄徹清冷唇雖燥而無皺紋熱雖重而指尖冷口雖干而熱湯不畏診得脈息沉微最防慢脾遂疏理中附子丁香一方服後諸症漸減但有微渴微煩未除更用七味白朮散一方囑進數劑勿圖速效俟其清陽升而渴可止脾陽健而熱自除適余他往只服二劑更醫大罪吾藥用柴胡知母烏梅花粉藿香半夏之屬連服數劑人事默默乾嘔身冷醫者病家咸以安靜為功偶於途間遇余述及余曰爾以默默為快耶豈不聞人事不醒神識昏迷為重乎爾以嘔吐無物為快耶豈不聞嘔吐有物為輕噦無胃氣為重乎爾以身冷無熱為快耶豈不聞身溫為和肢冷厥逆為重乎此虛風內養脾慢之證已顯危候言未畢其家端人來報云此兒手足牽動睡則露睛喉中痰鳴復延余視之昏迷不醒掏之不哭睡不交睫翳膜遮睛二便長流四肢厥冷時忽抽搐喉如曳鋸內外一探陽氣竭絶因其無陽藥可偏恃但救危須在頃刻藥餌一時難回令研胡椒五錢津唾調敷於臍立時身動似覺微煩口中聞有椒氣哭聲漸出隨調扶陽丹一兩徐徐灌下大嘔一聲膠痰旋出隨吐隨灌隨灌隨吐約吐膠痰半碗其色青碧系由無陽津液冷凝所致隨進大回生湯一劑計十兩之重每日夜三劑連服二三日敗證皆回尤有奇者不過一周之兒服乳後自能以手探吐余甚訝之但胃中全賴乳食充養因束縛其手仍以回生湯加赭石以安其胃前後共服回生湯五十劑厥病方瘳愈後專理脾陽兩旬而健自制扶陽丹端治小兒夏月吐瀉致成慢驚脾腎陽衰之證兼治男婦中寒嘔吐腹痛一切火衰等證並皆神驗白朮附子乾薑砂仁丁香肉桂甘草胡椒川椒洋茄米糊為丸附陳蕃宗之子煩渴吐瀉醫治兩日延余診治視其眼沉囟陷面色青黃唇深紅如豔朱舌深紅而干刺脈得急數無倫睡時煩擾此胃敗津傷五臟精華盡發於外中無所蓄乃陰陽兩竭之候誠為死證救陰礙陽救陽礙陰兩不能受直辭無治隨延別醫是夜果卒然此症倘遇相信之士竭力挽救以盡人工當用理中附子豬膽汁從陽引陰從陰引陽及胃關理陰二煎陰陽兩救之法或可回生於萬一也許受基乃郎時值六月病煩渴吐瀉之症嘗清涼補瀉之藥漸至四肢冰冷額腹發熱手如數物足忽抽掣眼皮連扎目珠瞤動吐泄交作所下白凍甚多小便赤澀時欲飲水一時數醫咸至有疏竹葉石膏湯者有疏黃連解毒湯者有疏潔古芍藥湯者有謂驚風不可治者議論紛紛毫無定見余揣勢在竭絶本不可治但細視其兩目尚黑白分明生機猶在因再三辟其差謬遂疏理中加附子枸杞與之即令購藥面煎灌完回寓次早復視病勢如前因加黃耆大劑面令煎服自早至晚灌藥不輟按治一日諸風皆熄四肢溫和小水已長吐瀉已止次日煩躁之極發出唇腫口瘡舌赤等症衆議藥燥之誤急欲清涼余曰未可更用八味地黃湯導其陰火而愈數日後復發遍身紅腫其家復議附子之毒急於清解余曰未可更進理中加丹皮桑葉收其浮火而痊許兄問曰先生之見與衆不同其理安在請略言之答曰夫藥之寒熱全在虛實之分症之疑似關乎真假之異若非於此道洞徹始終值此垂危之際焉能枯木回春乎八味地黃湯方見卷二虛寒門首案消渴二條附林壽之子三歲脾胃素虧今夏發熱口渴醫者不知其脾虛發熱誤用外感之藥其熱愈盛其渴愈加小便甚多大便甚艱更醫又不究其津液前陰已泄致後陰津枯便艱之理誤投破氣潤腸之藥陡泄數次肌肉消瘦面唇俱白舌光如鏡飲水無度小便不禁飲一溲二喜食酸鹹之物亟求余視謂曰此消渴之候遍身肌肉血脈津液皆從二便消泄而上愈渴若不治其消何以止其渴且敗證種種陰陽兩損前賢已無治法愚何敢任所喜兩目精彩尚存聲音猶響生機或在於此但未審能捨此三分之命服吾十分之藥否曰無不信從遂酌裁一方陰陽兩補之意加以澀精祕氣之藥連服三十劑而愈以後連遇數症消渴泄瀉諸醫執用滋火之方一經余治悉用此法加減出入皆獲全愈以龍眼蓮子湯代茶附方熟地人參白朮乾薑枸杞黃耆菟絲牡蠣五味肉桂鹿茸甘草附子桑螵蛸蕭占春乃郎自恃體質堅強日食桃李因患癤毒頭項及身大如卵者十數枚及癤毒大潰膿血交迸理宜身涼安靜反加身熱躁擾醫者不以清金潤燥日與柴葛知芩胃氣益削口渴飲水小溲無度用盡滋水制火之法消渴愈熾形羸骨立始延余治余曰癰疽潰後氣血耗泄非補氣養血渴不能止處黃耆六錢甘草一錢銀花三錢蓋黃耆補氣忍痛養血氣血充溢渴何由作服之半月果獲全愈哮喘附黃含宇乃郎忽然喘嗽氣促醫用解表之藥其氣愈緊又加汗大鼻扇胸高其家驚怖迫前醫復視誤認氣脫忙以人參五味之屬下咽胸高喘迫不能出聲目瞪上視汗大如雨痰聲如雷促余治之知為胸膈積熱心火凌肺肺脹喘急變幻最速幼科稱為馬脾風者即此是也以集成牛黃奪命散加蘇子以疏肺又入萊蔔子以反參急煎與服危狀皆平更與清肺藥而愈竊此症目不常睹醫者學而不思不亦罔乎牛黃奪命散黑牽牛半生半炒取頭末五錢錦莊黃酒潤曬乾陳枳殼麥麩炒各一兩目盲附聶恆兆乃郎四歲忽眼生翳膜延目科醫治説寒説熱內服外點其翳愈厚遮滿黑珠直不見物其家意為自己瞎定安心不治奈焦煩啼哭晝夜不安始延余治不過欲少止其焦哭耳細為審之病雖久而聲猶大形雖瘦而腹甚高知為熱積生蟲之候所幸白珠尚有紅赤血絲因慰之曰不僅病可愈且目可明遂以胡連黃連膽草梔仁雷丸鶴蝨吳萸雞內金君子石決厚朴一派清火殺蟲之藥研為細末每日用雞肝一具如無以豬肝兩許代之入藥末三錢蒸熟與服所喜伊子不以藥餌為苦且日爭服之服至三日下蟲十餘條目翳漸消遂大安閲半月蟲下數十條果然眼內俱清後以扶脾和胃之劑加清肝之品飲食漸進形肥於舊也啼哭二條附聶秀章舉子甫及旬日苦於啼哭不乳或時驚怖或時搐搦或胸緊氣急或目瞪頭搖衆云驚風之候已服金石腦射之藥余視之曰誤也夫臍風一症月內之兒固有之但雖啼哭不乳必兼撮口噤口之類今兒之病苦於啼哭不止為急至於他證不過時有之所為更緩耳嘗考方書所謂口中之啼多因腹中之痛正所謂月內小兒盤腸氣痛是也因視其腹已果脹滿肚上青筋纍纍隨用燈火焠之其哭稍定更悟此兒因乃父秀章自患氣阻之病曾效四磨湯飲者余前案中已發明之斯兒亦稟受此根仍與四磨飲以散結氣更因大便甚堅用酒大黃水磨以下其腹中之氣不致久羈臟腑一服悉安後數日治許發科之子方月悉同此證但多有嘔乳一病乃臟腑陰陽不和升降未順是胎寒之屬以指迷七氣湯母子同服而愈指迷七氣湯青皮桔梗半夏益智甘草陳皮莪朮肉桂丁香藿香香附生薑紅棗上㕮咀水三碗煎至一碗母子同服陳庶凡之子素稟木火陰虧體質及周時當季夏每多夜啼漸至口糜舌爛唇紅齒燥面白頰赤小便赤短時忽驚叫微有搐掣用盡石膏竹葉芩連木通之藥苦寒疊進其火愈盛前醫束手辭去庶凡來寓請救余視之果屬火症並無他岐前醫之藥種種皆是然涼之不效乃太僕所謂大熱而甚寒之不寒是無水也當滋其腎況此兒陰虧之質純陽之姿內火發外之症豈六淫外入之疾者比以六味地黃湯生脈散數服而安答問門人問曰昨視一小兒起自煩渴吐瀉他醫誤認為火妄用芩連梔子之藥已服兩劑其泄稍止更加厥逆昏睡脈得沉澀面唇俱白明是無火之症投附桂理中下咽反大瀉如傾不止即斃豈苗竅脈息不足以為據耶答曰連服寒藥其泄既減若果熱症自當人事清爽安得厥逆昏睡耶明是陽氣竭絶由此可明寒藥太過窒塞中焦所進寒藥未能轉輸如天寒地凍水不流行今驟進熱藥陽氣通行如開冰解凍決江疏河促之而下奈氣已先虧不能上吸寧不隨瀉而下脫乎此寒則凝熱則流乃醫門之要義也一得集附消渴腹脹徐心田乃郎年僅七齡時值六月患消渴病日夜不寧諸醫稱為實火疊進芩連膏知之屬渴愈甚溺愈多更醫見小溲清利唇舌亦淡連投八味地黃湯燥渴愈甚延余視時病勢已深望其四肢消瘦腹脹如鼓因思三消水火之病斷無腹鼓之症此必脾胃病也幼讀瀕湖綱目曾引夷堅志治奇疾有消渴因蟲之患詢之此兒素啖瓜果內必生蟲蟲在胃脘吸其津液故口中發渴飲水致多土困弗制小溲遂多理當補土製蟲處方以白朮為君兼以史君金鈴胡連川椒烏梅厚朴酸苦辛辣之味只服二劑下蟲十有餘條消渴頓止腹鼓亦消以異功散調理而安嘔吐泄瀉傅鳳翔之子夏月吐瀉口渴身熱無汗手足時冷余知脾胃素虛連投六君子湯更加煩躁唇紅舌刺四肢發厥所泄迸迫如箭糞色形如鶩溏余思此症唇紅舌刺身熱似火而糞溏肢厥又類於寒寒熱錯雜之症其中必有伏匿之情決非一途可治再為詳審見其躁時似有驚惕糞色逾時變青乃知脾胃久虛加以風熱內熾不能外達以致抑鬱不舒肝風乘虛侮土而為揮霍撩亂致成此候若非補土解肌勢必強者莫制弱者將絶不變痙逆不已也於是以四君子湯補脾扶胃為主佐以葛根防風丹皮灶土諸味解肌疏風升陽散火是日連進二劑果然遍體紅赤喜人搔癢發熱如烙時忽戰栗其家見兒躁擾不寧議為藥病不對天未曉復端人來寓請余易方余曰病已愈矣此症先是風邪內攻今已外達正為可喜當用原方再進一劑諸症必除隨進一劑果然微汗熱退紅消及睡醒時則諸態如失此與先君治陳元東風火內伏一案相同見風火門首案述治慢脾李陽升幼子方六歲瘧後惡食醫以傷食治之遂至顆粒不入聊以糕餅度日漸至肌膚瘦削始延余治見其面色浮黃唇舌白指紋淡淡推之不動確知脾胃大傷慢症已成以六君子加乾薑二劑服之如故再以原方重用白朮二劑飲食漸進神氣稍爽越三日復視頭垂涎流呻吟不已安危只在呼吸余愕然問故渠母下淚謂曰數月以來時現寒熱總因瘧未盡除近日腹痛必因糕餅之滯昨進神麯一盞乾嘔作泄腹痛尤甚自此呻吟不已不識尚可治否余曰脾胃已困倉廩久虛溫補尚恐不及反用神麯苦辛開降嘔泄安得不至乎姑以大劑附子理中湯希圖救援即於方末批云小兒脾胃久敗火土交傷嘔噦厥逆難許生機渠家見余言急切復延幼科謂唇紅腹痛火積為患用胡連使君一派苦寒破氣之藥是夜神氣壯旺腹痛求食食方下咽喉響痰鳴而殤嗟嗟此兒如已落井而又下之以石豈慈幼保赤之心哉夫唇紅者脾敗真形露也頭垂者真陽衰竭也種種敗症目所共睹奈何以唇紅之假症立火積之妄名噦泄呻吟置之不講頭垂涎流置之不究可勝嘆哉請詳幼科夏氏之論以明斯症之誤始見余言之不謬也
